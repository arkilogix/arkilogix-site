<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARC ONE</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0d0d0d;
  color: white;
}

/* HERO */
.hero {
  position: relative;
  height: 240px;
  background-size: cover;
  background-position: center;
}

.profile-wrapper {
  position: absolute;
  bottom: -60px;
  width: 100%;
  display: flex;
  justify-content: center;
}

.profile-img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 4px solid #0d0d0d;
  object-fit: cover;
}

/* CONTENT */
.content {
  padding: 90px 24px 30px;
  text-align: center;
  max-width: 480px;
  margin: auto;
}

h1 {
  margin: 12px 0 4px;
  font-size: 22px;
}

h2 {
  margin: 0;
  font-weight: 400;
  color: #9a9a9a;
  font-size: 14px;
}

/* SOCIALS */
.socials {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 12px;
}

.socials a {
  color: white;
  opacity: 0.7;
  transition: 0.3s;
}

.socials a:hover {
  opacity: 1;
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.btn {
  flex: 1;
  padding: 10px;
  border-radius: 25px;
  border: 1px solid #2a2a2a;
  font-size: 13px;
  text-decoration: none;
  color: white;
}

/* SECTION */
.section {
  margin-top: 40px;
  text-align: left;
}

.section h3 {
  font-size: 13px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #777;
  margin-bottom: 12px;
}

.section p {
  font-size: 14px;
  color: #ccc;
  line-height: 1.6;
}

/* PORTFOLIO */
.portfolio {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.portfolio img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 12px;
  cursor: pointer;
}

/* FLOATING */
.floating {
  position: fixed;
  bottom: 25px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.float-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
}

.lightbox.active {
  display: flex;
}

.lightbox img {
  max-width: 90%;
  max-height: 85%;
  border-radius: 10px;
}

.lightbox-close {
  position: absolute;
  top: 20px;
  right: 20px;
  font-size: 22px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero" id="banner">
  <div class="profile-wrapper">
    <img class="profile-img" id="profileImg">
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <h1 id="name"></h1>
  <h2 id="title"></h2>

  <!-- SOCIAL -->
  <div class="socials">
    <a id="instagram" target="_blank">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="1"/>
      </svg>
    </a>

    <a id="facebook" target="_blank">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
      </svg>
    </a>
  </div>

  <!-- BUTTONS -->
  <div class="buttons">
    <a class="btn" id="saveContact">Save Contact</a>
    <a class="btn" id="website">Portfolio</a>
  </div>

  <!-- ABOUT -->
  <div class="section">
    <h3>About</h3>
    <p>Architect specializing in modern residential and commercial design.</p>
  </div>

  <!-- PORTFOLIO -->
  <div class="section">
    <h3>Selected Works</h3>
    <div class="portfolio">
      <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e" onclick="openLightbox(this.src)">
      <img src="https://images.unsplash.com/photo-1494526585095-c41746248156" onclick="openLightbox(this.src)">
      <img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511" onclick="openLightbox(this.src)">
      <img src="https://images.unsplash.com/photo-1502005229762-cf1b2da7c5d6" onclick="openLightbox(this.src)">
    </div>
  </div>
</div>

<!-- FLOATING -->
<div class="floating">
  <a class="float-btn" id="call">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 
      19.79 19.79 0 0 1-8.63-3.07 
      19.5 19.5 0 0 1-6-6 
      19.79 19.79 0 0 1-3.07-8.67 
      A2 2 0 0 1 4.11 2h3"/>
    </svg>
  </a>

  <a class="float-btn" id="sms">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
      <path d="M21 15a4 4 0 0 1-4 4H7l-4 4V5a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
    </svg>
  </a>

  <a class="float-btn" id="email">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
      <path d="M4 4h16v16H4z"/>
      <path d="M22 6l-10 7L2 6"/>
    </svg>
  </a>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="lightbox-close" onclick="closeLightbox()">✕</span>
  <img id="lightbox-img">
</div>

<script>
const profile = {
  name: "Juan Dela Cruz",
  title: "Architect",
  phone: "+639123456789",
  email: "juan@email.com",
  website: "https://yourportfolio.com",
  instagram: "https://instagram.com/yourusername",
  facebook: "https://facebook.com/yourprofile",
  profileImage: "https://images.unsplash.com/photo-1607746882042-944635dfe10e",
  bannerImage: "https://images.unsplash.com/photo-1503387762-592deb58ef4e"
};

document.getElementById("name").innerText = profile.name;
document.getElementById("title").innerText = profile.title;
document.getElementById("profileImg").src = profile.profileImage;
document.getElementById("banner").style.backgroundImage = `url(${profile.bannerImage})`;

document.getElementById("website").href = profile.website;
document.getElementById("call").href = `tel:${profile.phone}`;
document.getElementById("sms").href = `sms:${profile.phone}`;
document.getElementById("email").href = `mailto:${profile.email}`;
document.getElementById("instagram").href = profile.instagram;
document.getElementById("facebook").href = profile.facebook;

document.getElementById("saveContact").onclick = () => {
  const vCard = `
BEGIN:VCARD
VERSION:3.0
FN:${profile.name}
ORG:${profile.title}
TEL:${profile.phone}
EMAIL:${profile.email}
END:VCARD
  `;
  
  const blob = new Blob([vCard], { type: 'text/vcard' });
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = `${profile.name}.vcf`;
  a.click();
};

function openLightbox(src) {
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").classList.add("active");
}

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("active");
}
</script>

</body>
</html>
