<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArkiLogix</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:'Montserrat',sans-serif;}
.section{padding:100px 20px;text-align:center;}
.section-divider{width:80%;height:1px;background:#ddd;margin:80px auto 0;}

.preview-wrapper{display:flex;justify-content:center;gap:60px;flex-wrap:wrap;margin-top:40px;}
.preview-inputs{max-width:300px;text-align:left;}

input,textarea,select{width:100%;padding:12px;margin-bottom:12px;border:1px solid #ccc;border-radius:8px;}

.plan-switch button{
  padding:8px 14px;margin:5px;border:1px solid #000;border-radius:20px;background:none;cursor:pointer;
}
.plan-switch .active{background:#000;color:#fff;}

.card-options button{
  padding:8px;margin:5px;border:1px solid #ccc;border-radius:20px;background:none;cursor:pointer;
}
.card-options .active{background:#000;color:#fff;}

.total-box{margin-top:20px;border-top:1px solid #ddd;padding-top:10px;}
.total{font-size:26px;font-weight:700;}

.submit-btn{margin-top:15px;background:#000;color:#fff;border:none;padding:12px;border-radius:30px;width:100%;}

.preview-phone{position:relative;}
.preview-phone img{width:300px;}

.overlay{position:absolute;left:0;width:100%;text-align:center;}

/* PRO POSITIONS */
.pro .name{top:150px;color:#fff;font-weight:700;}
.pro .profession{top:175px;color:#ccc;font-size:12px;}
.pro .about{top:270px;color:#bbb;font-size:11px;width:80%;left:10%;}

/* BASIC POSITIONS */
.basic .name{top:160px;color:#000;font-weight:700;}
.basic .profession{top:185px;color:#666;font-size:12px;}
.basic .services{top:350px;color:#444;font-size:12px;text-align:left;width:70%;left:15%;}

/* HIDE */
.hidden{display:none;}
</style>
</head>

<body>

<div class="section">
<h2>Pricing</h2>
<p>Choose your plan, then customize below ↓</p>
</div>

<div class="section-divider"></div>

<div class="section" id="preview">
<h2>Preview Your Digital Card</h2>

<div class="preview-wrapper">

<div class="preview-inputs">

<!-- PLAN SWITCH -->
<div class="plan-switch">
<button onclick="setPlan('basic',this)">Basic</button>
<button class="active" onclick="setPlan('pro',this)">Pro</button>
</div>

<input type="text" id="inputName" placeholder="Your Name">
<input type="text" id="inputProfession" placeholder="Your Profession">
<textarea id="inputAbout" placeholder="About (Pro only)"></textarea>

<!-- CARD SELECT -->
<div>
<p>Choose Card Finish</p>
<div class="card-options">
<button onclick="setCard(0,this)" class="active">White</button>
<button onclick="setCard(99,this)">Black +99</button>
<button onclick="setCard(199,this)">Wood +199</button>
<button onclick="setCard(499,this)">Metal +499</button>
</div>
</div>

<!-- TOTAL -->
<div class="total-box">
<p id="planLabel">Pro — ₱1,199</p>
<p id="cardLabel">White — ₱0</p>
<div class="total" id="totalPrice">₱1,199</div>
</div>

<button class="submit-btn" onclick="continueOrder()">Continue with this design</button>

</div>

<!-- PHONE -->
<div class="preview-phone" id="phoneBox">
<img id="phoneImage" src="phone-pro.png">

<div class="overlay name" id="previewName">Juan Dela Cruz</div>
<div class="overlay profession" id="previewProfession">Architect</div>

<div class="overlay about" id="previewAbout">
Designing modern spaces.
</div>

<div class="overlay services hidden" id="previewServices">
• Architectural Design<br>
• Planning<br>
• Renovation<br>
• Consultation
</div>

</div>

</div>
</div>

<div class="section-divider"></div>

<div class="section" id="contact">
<h2>Get Started</h2>

<input id="formName" placeholder="Your Name">
<select id="formPlan">
<option>Basic</option>
<option selected>Pro</option>
</select>

</div>

<script>
let basePrice=1199;
let cardPrice=0;
let currentPlan="pro";

function updateTotal(){
let total=basePrice+cardPrice;
document.getElementById("totalPrice").innerText="₱"+total.toLocaleString();
}

function setPlan(plan,el){
document.querySelectorAll(".plan-switch button").forEach(b=>b.classList.remove("active"));
el.classList.add("active");

currentPlan=plan;

if(plan==="basic"){
basePrice=599;
document.getElementById("phoneImage").src="phone-basic.png";
document.getElementById("planLabel").innerText="Basic — ₱599";

document.getElementById("previewAbout").classList.add("hidden");
document.getElementById("previewServices").classList.remove("hidden");

document.getElementById("phoneBox").classList.add("basic");
document.getElementById("phoneBox").classList.remove("pro");
}else{
basePrice=1199;
document.getElementById("phoneImage").src="phone-pro.png";
document.getElementById("planLabel").innerText="Pro — ₱1,199";

document.getElementById("previewAbout").classList.remove("hidden");
document.getElementById("previewServices").classList.add("hidden");

document.getElementById("phoneBox").classList.add("pro");
document.getElementById("phoneBox").classList.remove("basic");
}

updateTotal();
}

function setCard(price,el){
cardPrice=price;

document.querySelectorAll(".card-options button").forEach(b=>b.classList.remove("active"));
el.classList.add("active");

let label=el.innerText;
document.getElementById("cardLabel").innerText=label;

updateTotal();
}

document.getElementById("inputName").oninput=e=>{
document.getElementById("previewName").innerText=e.target.value||"Juan Dela Cruz";
};

document.getElementById("inputProfession").oninput=e=>{
document.getElementById("previewProfession").innerText=e.target.value||"Architect";
};

document.getElementById("inputAbout").oninput=e=>{
document.getElementById("previewAbout").innerText=e.target.value||"Designing modern spaces.";
};

function continueOrder(){
document.getElementById("formName").value=document.getElementById("inputName").value;
document.getElementById("formPlan").value=currentPlan.charAt(0).toUpperCase()+currentPlan.slice(1);
document.getElementById("contact").scrollIntoView({behavior:"smooth"});
}

// INIT
document.getElementById("phoneBox").classList.add("pro");
</script>

</body>
</html>
