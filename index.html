<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArkiLogix</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<link rel="icon" type="image/png" href="/42895b06-99f6-4362-ad71-da9424d31c63.png">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #000;
  color: #fff;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* LOGO */
.logo {
  width: 140px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.tagline {
  margin-top: 20px;
  font-size: 14px;
  letter-spacing: 2px;
  color: #aaa;
  opacity: 0;
  animation: fadeUp 1s ease forwards;
  animation-delay: 0.3s;
}

.btn {
  margin-top: 30px;
  padding: 12px 28px;
  border: 1px solid #fff;
  color: #fff;
  text-decoration: none;
  border-radius: 30px;
  font-size: 13px;
  letter-spacing: 1px;
  transition: 0.3s;
  opacity: 0;
  animation: fadeUp 1s ease forwards;
  animation-delay: 0.6s;
}

.btn:hover {
  background: #fff;
  color: #000;
}

/* SECTION */
.section {
  padding: 100px 20px;
  text-align: center;
}

.section h2 {
  font-weight: 500;
  margin-bottom: 40px;
}

/* FEATURES */
.features {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 30px;
}

.card {
  max-width: 260px;
  padding: 30px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
  border-color: rgba(255,255,255,0.3);
}

/* CLIENTS */
.clients {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.client-card {
  padding: 18px 24px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 30px;
  transition: 0.3s;
}

.client-card a {
  text-decoration: none;
  color: white;
  font-size: 14px;
}

.client-card:hover {
  background: white;
}

.client-card:hover a {
  color: black;
}

/* FORM */
form {
  max-width: 400px;
  margin: auto;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  background: white;
  color: black;
  border: none;
  border-radius: 6px;
  font-weight: 600;
}

/* FOOTER */
.footer {
  padding: 20px;
  text-align: center;
  font-size: 12px;
  color: #777;
}
</style>

</head>
<body>

<!-- HERO -->
<div class="hero">
  <img src="/42895b06-99f6-4362-ad71-da9424d31c63.png" class="logo">
  <div class="tagline">SMART DIGITAL NFC CARDS</div>
  <a href="#order" class="btn">GET YOUR CARD</a>
</div>

<!-- FEATURES -->
<div class="section">
  <h2>What We Do</h2>

  <div class="features">
    <div class="card">
      NFC-powered business cards for instant sharing
    </div>

    <div class="card">
      Custom digital profiles for every client
    </div>

    <div class="card">
      Modern branding for professionals
    </div>
  </div>
</div>

<!-- CLIENTS -->
<div class="section">
  <h2>Clients</h2>

  <div class="clients">
    <div class="client-card"><a href="/client1/">Client One</a></div>
    <div class="client-card"><a href="/client2/">Client Two</a></div>
  </div>
</div>

<!-- ORDER -->
<div class="section" id="order">
  <h2>Get Started</h2>

  <form action="https://formspree.io/f/yourformid" method="POST">
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <textarea name="message" placeholder="What do you need?"></textarea>
    <button type="submit">Send Request</button>
  </form>
</div>

<!-- FOOTER -->
<div class="footer">
  ArkiLogix © 2026
</div>

</body>
</html>
