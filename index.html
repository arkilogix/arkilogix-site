<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArkiLogix</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
}

/* HEADER */
.header {
  position: fixed;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 60px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  color: white;
  z-index: 1000;
  transition: 0.3s;
}

.header.scrolled {
  background: rgba(0,0,0,0.9);
  padding: 12px 60px;
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-wrap img {
  height: 32px;
}

.logo-wrap span {
  letter-spacing: 3px;
  font-size: 13px;
}

.nav a {
  margin-left: 30px;
  color: white;
  text-decoration: none;
  font-size: 13px;
  position: relative;
}

.nav a::after {
  content:"";
  position:absolute;
  bottom:-4px;
  left:0;
  width:0;
  height:1px;
  background:white;
  transition:0.3s;
}

.nav a:hover::after {
  width:100%;
}

.cta {
  border:1px solid white;
  padding:6px 14px;
  border-radius:20px;
}

.cta:hover {
  background:white;
  color:black;
}

/* HERO */
.hero {
  height:100vh;
  background:url('hero.jpg') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  position:relative;
}

.hero::before {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.75);
}

.hero * { position:relative; }

.btn {
  margin-top:20px;
  padding:10px 25px;
  border:1px solid white;
  border-radius:30px;
  color:white;
  text-decoration:none;
}

/* SECTION */
.section {
  padding:100px 20px;
  text-align:center;
}

/* DIVIDER */
.section-divider {
  width:80%;
  height:1px;
  background:#ddd;
  margin:80px auto 0;
}

/* PRODUCTS */
.products {
  display:flex;
  justify-content:center;
  gap:30px;
}

.product {
  border:1px solid #eee;
  padding:30px;
  border-radius:10px;
}

/* PRICING */
.pricing-tabs {
  display:inline-flex;
  border:1px solid #ddd;
  border-radius:30px;
  padding:5px;
  margin-bottom:40px;
}

.pricing-tabs button {
  border:none;
  background:none;
  padding:10px 20px;
  border-radius:30px;
  cursor:pointer;
}

.pricing-tabs .active {
  background:black;
  color:white;
}

.pricing-wrapper {
  display:flex;
  justify-content:center;
  gap:60px;
  flex-wrap:wrap;
}

.pricing-content {
  border:1px solid #ddd;
  border-radius:16px;
  padding:40px;
  max-width:420px;
  text-align:left;
}

#plan-price {
  font-size:42px;
  font-family:'Playfair Display', serif;
}

.pricing-image img {
  width:260px;
  border-radius:14px;
}

/* PREVIEW */
.preview-wrapper {
  display:flex;
  justify-content:center;
  gap:60px;
  margin-top:40px;
  flex-wrap:wrap;
}

.preview-inputs {
  max-width:300px;
  width:100%;
}

.preview-phone {
  position:relative;
}

.preview-phone img {
  width:300px;
}

/* OVERLAY */
.overlay {
  position:absolute;
  color:white;
  width:100%;
  text-align:center;
  left:0;
}

/* POSITIONING BASED ON YOUR MOCKUP */
.overlay.name {
  top: 155px;
  font-weight:700;
}

.overlay.profession {
  top: 180px;
  font-size:13px;
  color:#ccc;
}

.overlay.about {
  top: 300px;
  font-size:12px;
  width:80%;
  left:10%;
  color:#bbb;
}

/* FAQ */
.faq {
  max-width:600px;
  margin:auto;
  text-align:left;
}

.faq-item {
  border-bottom:1px solid #ddd;
  padding:15px 0;
}

/* CONTACT */
.contact-wrapper {
  display:flex;
  justify-content:center;
  gap:40px;
  flex-wrap:wrap;
}

form {
  max-width:400px;
  width:100%;
}

input, textarea, select {
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #ccc;
  border-radius:8px;
}

.submit-btn {
  background:black;
  color:white;
  border:none;
  padding:14px;
  width:100%;
  border-radius:30px;
}

/* FOOTER */
.footer {
  background:black;
  color:#777;
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header" id="header">
  <div class="logo-wrap">
    <img src="logo.png">
    <span>ARKILOGIX</span>
  </div>
  <div class="nav">
    <a href="#products">Products</a>
    <a href="#pricing">Pricing</a>
    <a href="#preview">Preview</a>
    <a href="#contact" class="cta">Get Started</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>ARKILOGIX</h1>
  <p>SMART DIGITAL NFC CARDS</p>
  <a href="#products" class="btn">Explore</a>
</div>

<div class="section-divider"></div>

<!-- PRODUCTS -->
<div class="section" id="products">
  <h2>Products</h2>
  <div class="products">
    <div class="product">Black Card</div>
    <div class="product">White Card</div>
    <div class="product">Wood Card</div>
  </div>
</div>

<div class="section-divider"></div>

<!-- PRICING -->
<div class="section" id="pricing">
  <h2>Pricing</h2>
  <div class="pricing-tabs">
    <button>Basic</button>
    <button class="active">Pro</button>
    <button>Elite</button>
  </div>
</div>

<div class="section-divider"></div>

<!-- 🔥 PREVIEW SECTION -->
<div class="section" id="preview">
  <h2>Preview Your Digital Card</h2>

  <div class="preview-wrapper">

    <div class="preview-inputs">
      <input type="text" id="inputName" placeholder="Your Name">
      <input type="text" id="inputProfession" placeholder="Your Profession">
      <textarea id="inputAbout" placeholder="About you"></textarea>

      <button class="submit-btn" onclick="continueOrder()">Continue with this design</button>
    </div>

    <div class="preview-phone">
      <img src="phone-pro.png">

      <div class="overlay name" id="previewName">Juan Dela Cruz</div>
      <div class="overlay profession" id="previewProfession">Architect</div>
      <div class="overlay about" id="previewAbout">Designing modern spaces.</div>
    </div>

  </div>
</div>

<div class="section-divider"></div>

<!-- CONTACT -->
<div class="section" id="contact">
  <h2>Get Started</h2>

  <div class="contact-wrapper">
    <form id="orderForm">
      <input type="text" id="formName" placeholder="Your Name">
      <input type="email" placeholder="Your Email">

      <select id="formPlan">
        <option>Basic</option>
        <option selected>Pro</option>
        <option>Elite</option>
      </select>

      <button class="submit-btn">Submit Order</button>
    </form>
  </div>
</div>

<div class="footer">
ARKILOGIX — DIGITAL NFC SYSTEMS
</div>

<script>
// HEADER SCROLL
window.addEventListener("scroll",()=>{
  document.getElementById("header")
  .classList.toggle("scrolled", window.scrollY>50);
});

// LIVE PREVIEW
document.getElementById("inputName").oninput = e=>{
  document.getElementById("previewName").innerText = e.target.value || "Juan Dela Cruz";
};

document.getElementById("inputProfession").oninput = e=>{
  document.getElementById("previewProfession").innerText = e.target.value || "Architect";
};

document.getElementById("inputAbout").oninput = e=>{
  document.getElementById("previewAbout").innerText = e.target.value || "Designing modern spaces.";
};

// CONTINUE BUTTON
function continueOrder(){
  document.getElementById("formName").value =
    document.getElementById("inputName").value;

  document.getElementById("formPlan").value = "Pro";

  document.getElementById("contact").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
