<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="../logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArkiLogix Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --accent: #C9A96E;
  --text: #ffffff;
  --muted: #9ca3af;
}
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  height: 100vh;
  display: flex;
}

/* HERO */
.hero {
  flex: 1;
  display: flex;
  align-items: flex-end;
  padding: 60px;
  background: 
    linear-gradient(rgba(15,17,21,0.65), rgba(15,17,21,0.85)),
    url("../hero.jpg");
  background-size: cover;
  background-position: center;
}

.hero-text h1 {
  font-size: 40px;
  font-weight: 600;
  color: white;
}

/* LOGIN */
.login-side {
  width: 420px;
  background: #0f1115;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 340px;
}

.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo img {
  width: 44px;
}
.logo div {
  color: white;
  font-weight: 600;
  font-size: 14px;
}

.title {
  font-size: 24px;
  color: white;
  margin-bottom: 6px;
}
.subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 24px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  color: white;
  margin-bottom: 14px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #C9A96E, #e6c78f);
  color: #111;
  font-weight: 600;
  cursor: pointer;
}

.signup {
  margin-top:18px;
  text-align:center;
  font-size:13px;
  color:#9ca3af;
}
.signup a{
  color:#C9A96E;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="hero">
  <div class="hero-text">
    <h1>Turn Every Interaction Into Opportunity.</h1>
  </div>
</div>

<div class="login-side">
  <div class="container">

    <div class="logo">
      <img src="../logo.png">
      <div>ArkiLogix</div>
    </div>

    <div class="title">Welcome back</div>
    <div class="subtitle">Access your dashboard</div>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Sign In</button>

    <div class="signup">
      No account yet?
      <a href="signup.html">Create one</a>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
window.login = async function(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if(!email || !password){
    alert("Please enter email and password");
    return;
  }

  try{
    const userCred = await signInWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    console.log("LOGIN UID:", user.uid);

    // ✅ ADMIN CHECK
    const adminDoc = await getDoc(doc(db, "admins", user.uid));
    if(adminDoc.exists()){
      window.location.href = "/dashboard/index.html";
      return;
    }

    // ✅ DIRECT CLIENT CHECK (FIXED)
    const clientRef = doc(db, "clients", user.uid);
    const clientSnap = await getDoc(clientRef);

    if(clientSnap.exists()){
      window.location.href = "/client/index.html";
      return;
    }

    // 🔥 FALLBACK: LINK BY EMAIL
    const q = query(collection(db,"clients"), where("email","==",email));
    const snapshot = await getDocs(q);

    if(!snapshot.empty){
      const ref = snapshot.docs[0].ref;

      await setDoc(ref, { uid: user.uid }, { merge: true });

      window.location.href = "/client/index.html";
      return;
    }

    // ❌ NO CLIENT FOUND → SHOW MODAL
    showUserNotFoundModal();

  }catch(err){

    console.log("LOGIN ERROR:", err.code);

    if(err.code === "auth/user-not-found"){
      showUserNotFoundModal();
      return;
    }

    if(err.code === "auth/wrong-password"){
      alert("Incorrect password");
      return;
    }

    alert(err.message);
  }

};

/* USER NOT FOUND MODAL */
function showUserNotFoundModal(){
  const confirmSignup = confirm("User not found.\n\nCreate an account?");
  if(confirmSignup){
    window.location.href = "signup.html";
  }
}
</script>

</body>
</html>
