<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="../logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArkiLogix Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --accent: #C9A96E;
  --text: #ffffff;
  --muted: #9ca3af;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  height: 100vh;
  display: flex;
}

/* HERO */
.hero {
  flex: 1;
  display: flex;
  align-items: flex-end;
  padding: 60px;
  background: 
    linear-gradient(rgba(15,17,21,0.65), rgba(15,17,21,0.85)),
    url("../hero.jpg");
  background-size: cover;
  background-position: center;
}

.hero-text {
  max-width: 420px;
}

.hero-text h1 {
  font-size: 40px;
  font-weight: 600;
  letter-spacing: -1px;
  line-height: 1.1;
  color: white;
  text-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.hero-text p {
  font-size: 15px;
  color: #d1d5db;
  margin-top: 12px;
  line-height: 1.6;
}

/* LOGIN */
.login-side {
  width: 420px;
  background: #0f1115;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 340px;
}

/* LOGO */
.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo img {
  width: 44px;
  margin-bottom: 10px;
}
.logo div {
  color: white;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.5px;
}

/* TEXT */
.title {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.4px;
  color: white;
  margin-bottom: 6px;
}

.subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 24px;
}

/* INPUT */
input[type="email"],
input[type="password"]{
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  color: white;
  margin-bottom: 14px;
  font-size: 14px;
  font-weight: 500;
  transition: .2s;
}

input::placeholder {
  color: #6b7280;
}

input:focus {
  outline: none;
  border-color: var(--accent);
  background: rgba(255,255,255,0.06);
  transform: scale(1.02);
}

/* REMEMBER */
.remember-wrap{
  display:flex;
  justify-content:center;
  margin-bottom:18px;
}

.remember{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
  color:#9ca3af;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #C9A96E, #e6c78f);
  color: #111;
  font-weight: 600;
  letter-spacing: 0.2px;
  cursor: pointer;
  transition:.25s;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(201,169,110,0.25);
}

button:active{
  transform:scale(0.97);
}

/* RESPONSIVE */
@media(max-width: 900px) {
  .hero {
    display: none;
  }
  .login-side {
    width: 100%;
  }
}
  .signup{
  margin-top:18px;
  text-align:center;
  font-size:13px;
  color:#9ca3af;
}

.signup a{
  color:#C9A96E;
  text-decoration:none;
  font-weight:500;
  margin-left:4px;
}

.signup a:hover{
  text-decoration:underline;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-text">
    <h1>Turn Every Interaction Into Opportunity.</h1>
    <p>Seamlessly connect, present, and convert with ArkiLogix NFC.</p>
  </div>
</div>

<!-- LOGIN -->
<div class="login-side">
  <div class="container">

    <div class="logo">
      <img src="../logo.png">
      <div>ArkiLogix</div>
    </div>

    <div class="title">Welcome back</div>
    <div class="subtitle">Access your dashboard</div>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <div class="remember-wrap">
      <label class="remember">
        <input type="checkbox" id="remember">
        Remember me
      </label>
    </div>
    <button onclick="login()">Sign In</button>
  </div>
</div>
  <div class="signup">
  <span>No account yet?</span>
  <a href="signup.html">Create one</a>
</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, browserSessionPersistence } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients",
  storageBucket: "arkilogix-clients.firebasestorage.app",
  messagingSenderId: "1074947351840",
  appId: "1:1074947351840:web:b077eb79963fff59316345"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

async function login() {

  const emailVal = document.getElementById("email").value;
  const passwordVal = document.getElementById("password").value;
  const remember = document.getElementById("remember").checked;

  try {

    await setPersistence(auth, remember ? browserLocalPersistence : browserSessionPersistence);

    const userCred = await signInWithEmailAndPassword(auth, emailVal, passwordVal);
    const user = userCred.user;

    const adminDoc = await getDoc(doc(db, "admins", user.uid));
    if (adminDoc.exists()) {
      window.location.href = "/admin/index.html";
      return;
    }

    const clientDoc = await getDoc(doc(db, "clients", user.uid));

    if (!clientDoc.exists()) {
      window.location.href = "/onboarding/index.html";
      return;
    }

    const data = clientDoc.data();

    if (data.status === "disabled") {
      alert("Your account is disabled");
      return;
    }

    const plan = data.plan || "basic";
    window.location.href = `/view/${plan}.html?id=${user.uid}`;

  } catch (err) {
    alert(err.message);
  }
}

window.login = login;

</script>

</body>
</html>
