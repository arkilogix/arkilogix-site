<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f5f7fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  background:white;
  padding:30px;
  border-radius:12px;
  width:320px;
}

h2 {
  margin-bottom:20px;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

button {
  width:100%;
  padding:12px;
  background:#111;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.link {
  margin-top:10px;
  text-align:center;
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="link">
    No account? <a href="signup.html">Sign Up</a>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  const adminDoc = await getDoc(doc(db, "admins", user.uid));
  if (adminDoc.exists()) {
    window.location.href = "/admin/index.html";
    return;
  }

  const clientDoc = await getDoc(doc(db, "clients", user.uid));

  if (!clientDoc.exists()) {
    window.location.href = "/onboarding/index.html";
    return;
  }

  const data = clientDoc.data();
  const plan = data.plan || "basic";

  window.location.href = `/view/${plan}.html?id=${user.uid}`;
});
// 🔥 SAME CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// LOGIN FUNCTION
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const userCred = await signInWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    // ✅ ADMIN CHECK
    const adminDoc = await getDoc(doc(db, "admins", user.uid));

    if (adminDoc.exists()) {
      window.location.href = "/admin/index.html";
      return;
    }

    // ✅ CLIENT CHECK
    const clientDoc = await getDoc(doc(db, "clients", user.uid));

    if (!clientDoc.exists()) {
      window.location.href = "/onboarding/index.html";
      return;
    }

    const data = clientDoc.data();

    // 🚫 BLOCK DISABLED
    if (data.status === "disabled") {
      alert("Your account is disabled");
      return;
    }

    // ✅ REDIRECT TO CARD
    const plan = data.plan || "basic";
    window.location.href = `/view/${plan}.html?id=${user.uid}`;

  } catch (err) {
    alert(err.message);
  }
}
// GLOBAL
window.login = login;

</script>

</body>
</html>
