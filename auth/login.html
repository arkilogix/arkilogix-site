<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="../logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArkiLogix Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --accent: #C9A96E;
  --text: #ffffff;
  --muted: #9ca3af;
}
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: row;
}

/* HERO */
.hero {
  flex: 1;
  display: flex;
  align-items: flex-end;
  padding: 60px;
  background: 
    linear-gradient(rgba(15,17,21,0.65), rgba(15,17,21,0.85)),
    url("../hero.jpg");
  background-size: cover;
  background-position: center;
}

.hero-text h1 {
  font-size: 40px;
  font-weight: 600;
  color: white;
}

/* LOGIN */
.login-side {
  width: 420px;
  background: #0f1115;
  display: flex;
  align-items: center;
  justify-content: center;
  max-width: 100%;
}

.container {
  width: 100%;
  max-width: 340px;
}

.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo img {
  width: 44px;
}
.logo div {
  color: white;
  font-weight: 600;
  font-size: 14px;
}

.title {
  font-size: 24px;
  color: white;
  margin-bottom: 6px;
}
.subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 24px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  color: white;
  margin-bottom: 14px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #C9A96E, #e6c78f);
  color: #111;
  font-weight: 600;
  cursor: pointer;
}

.signup {
  margin-top:18px;
  text-align:center;
  font-size:13px;
  color:#9ca3af;
}
.signup a{
  color:#C9A96E;
  text-decoration:none;
}
 /* ================= PREMIUM MOBILE UI ================= */
@media (max-width: 768px){

  body{
    flex-direction: column;
    background: #0f1115;
  }

  /* HERO becomes subtle background */
  .hero{
    position: fixed;
    inset: 0;
    height: 100%;
    padding: 0;
    opacity: 0.25;
    z-index: 0;
  }

  .hero-text{
    display: none;
  }

  /* CENTER EVERYTHING */
  .login-side{
    width: 100%;
    height: 100vh;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    z-index: 2;
  }

  /* FLOATING CARD */
  .container{
    max-width: 360px;
    width: 100%;

    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;

    padding: 28px 22px;

    box-shadow: 
      0 10px 40px rgba(0,0,0,0.4),
      inset 0 0 0.5px rgba(255,255,255,0.2);
  }

  /* LOGO */
  .logo img{
    width: 38px;
  }

  .logo div{
    font-size: 13px;
    letter-spacing: 1px;
  }

  /* TEXT */
  .title{
    font-size: 20px;
    text-align: center;
  }

  .subtitle{
    font-size: 12px;
    text-align: center;
  }

  /* INPUTS */
  input{
    padding: 13px;
    font-size: 14px;

    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
  }

  input:focus{
    border-color: var(--accent);
    outline: none;
  }

  /* BUTTON */
  button{
    padding: 13px;
    font-size: 14px;

    box-shadow: 0 4px 14px rgba(201,169,110,0.25);
  }

  /* SIGNUP */
  .signup{
    font-size: 12px;
  }

}
  /* ===== INPUT FOCUS GLOW ===== */
input{
  transition: all 0.25s ease;
}

input:focus{
  border-color: #C9A96E;
  box-shadow: 0 0 0 2px rgba(201,169,110,0.15);
  outline: none;
}

/* ===== PASSWORD FIELD WRAP ===== */
.input-group{
  position: relative;
}

.input-group input{
  padding-right: 45px;
}

/* 👁 ICON */
.toggle-password{
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 14px;
  color: #9ca3af;
}

/* ===== BUTTON LOADING ===== */
button.loading{
  opacity: 0.7;
  pointer-events: none;
  position: relative;
}

button.loading::after{
  content: "";
  width: 18px;
  height: 18px;
  border: 2px solid rgba(0,0,0,0.2);
  border-top: 2px solid #111;
  border-radius: 50%;
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  animation: spin 0.6s linear infinite;
}

@keyframes spin{
  to{ transform: translateY(-50%) rotate(360deg); }
}

/* ===== IOS INPUT ZOOM FIX ===== */
input, button{
  font-size: 16px;
}
</style>
</head>

<body>

<div class="hero">
  <div class="hero-text">
    <h1>Turn Every Interaction Into Opportunity.</h1>
  </div>
</div>

<div class="login-side">
  <div class="container">
        <a href="/" style="text-decoration:none;">
      <div class="logo">
        <img src="../logo.png">
        <div>ArkiLogix</div>
      </div>
        </a>
    <div class="title">Welcome back</div>
    <div class="subtitle">Access your dashboard</div>

    <input type="email" id="email" placeholder="Email">
    <div class="input-group">
    <input type="password" id="password" placeholder="Password">
    <span class="toggle-password" onclick="togglePassword()">👁</span>
    </div>

    <button id="loginBtn" onclick="login()">Sign In</button>

    <div class="signup">
      No account yet?
      <a href="signup.html">Create one</a>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients",
  storageBucket: "arkilogix-clients.firebasestorage.app",
  messagingSenderId: "1074947351840",
  appId: "1:1074947351840:web:b077eb79963fff59316345",
  measurementId: "G-HFPXDVR2BZ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
window.login = async function(){

  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value;

  if(!email || !password){
    alert("Please enter email and password");
    return;
  }

  // 🔒 LOCK BUTTON
  const btn = document.getElementById("loginBtn");
    btn.disabled = true;
    btn.classList.add("loading");
    btn.innerText = "Signing in";


  try{
    const userCred = await signInWithEmailAndPassword(auth, email, password);
    const user = userCred.user;
   
    console.log("LOGIN EMAIL:", email);
    console.log("AUTH UID:", user.uid);

    // ✅ ADMIN CHECK
    const adminDoc = await getDoc(doc(db, "admins", user.uid));
    if(adminDoc.exists()){
      window.location.replace("/admin/index.html");
      return;
    }

   // ✅ CLIENT CHECK (FIXED — USE QUERY)
    const q = query(collection(db, "clients"), where("authUid", "==", user.uid));
    const snap = await getDocs(q);
    
    if(!snap.empty){
      const clientDoc = snap.docs[0];
      const clientId = clientDoc.id;
    
      console.log("CLIENT FOUND:", clientId);
    
      window.location.replace("/client/index.html?clientId=" + clientId);
      return;
    }


    // ❌ NO USER
  btn.disabled = false;
  btn.classList.remove("loading");
  btn.innerText = "Sign In";

    showUserNotFoundModal();

  }catch(err){

  btn.disabled = false;
  btn.classList.remove("loading");
  btn.innerText = "Sign In";

    if(err.code === "auth/user-not-found"){
      showUserNotFoundModal();
      return;
    }

    if(err.code === "auth/wrong-password"){
      alert("Incorrect password");
      return;
    }

    alert(err.message);
  }
};

/* USER NOT FOUND MODAL */
function showUserNotFoundModal(){
  const confirmSignup = confirm("User not found.\n\nCreate an account?");
  if(confirmSignup){
    window.location.replace("signup.html");
  }
}
  window.togglePassword = function(){
  const input = document.getElementById("password");
  input.type = input.type === "password" ? "text" : "password";
};
  
</script>
</div>


<style>
</style>
</body>
</html>
