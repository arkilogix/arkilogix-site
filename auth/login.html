<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword,
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  getDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients"
};

// 🔥 INIT FIRST (VERY IMPORTANT)
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// =========================
// 🔁 AUTO LOGIN (AFTER INIT)
// =========================
onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  const adminDoc = await getDoc(doc(db, "admins", user.uid));
  if (adminDoc.exists()) {
    window.location.href = "/admin/index.html";
    return;
  }

  const clientDoc = await getDoc(doc(db, "clients", user.uid));

  if (!clientDoc.exists()) {
    window.location.href = "/onboarding/index.html";
    return;
  }

  const data = clientDoc.data();

  const plan = data.plan || "basic";
  window.location.href = `/view/${plan}.html?id=${user.uid}`;
});

// =========================
// 🔐 LOGIN FUNCTION
// =========================
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const userCred = await signInWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    // ADMIN
    const adminDoc = await getDoc(doc(db, "admins", user.uid));
    if (adminDoc.exists()) {
      window.location.href = "/admin/index.html";
      return;
    }

    // CLIENT
    const clientDoc = await getDoc(doc(db, "clients", user.uid));

    if (!clientDoc.exists()) {
      window.location.href = "/onboarding/index.html";
      return;
    }

    const data = clientDoc.data();

    if (data.status === "disabled") {
      alert("Your account is disabled");
      return;
    }

    const plan = data.plan || "basic";
    window.location.href = `/view/${plan}.html?id=${user.uid}`;

  } catch (err) {
    alert(err.message);
  }
}

// 🔥 MAKE GLOBAL (VERY IMPORTANT)
window.login = login;

</script>
