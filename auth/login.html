<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArkiLogix Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --accent: #C9A96E;
  --text: #ffffff;
  --muted: #9ca3af;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  height: 100vh;
  display: flex;
}

/* HERO */
.hero {
  flex: 1;
  background: 
    linear-gradient(rgba(15,17,21,0.65), rgba(15,17,21,0.85)),
    url("../main/hero.jpg");
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: flex-end;
  padding: 60px;
  color: white;
}

/* LOGIN */
.login-side {
  width: 420px;
  background: #0f1115;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 340px;
}

/* LOGO */
.logo {
  text-align: center;
  margin-bottom: 28px;
}
.logo img {
  width: 42px;
  margin-bottom: 10px;
}

/* TEXT */
.title { font-size: 22px; font-weight: 600; }
.subtitle { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  color: white;
  margin-bottom: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #C9A96E, #e6c78f);
  color: #111;
  font-weight: 600;
  cursor: pointer;
}

/* REMEMBER */
.remember {
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
  color:#9ca3af;
  margin-bottom:14px;
}
</style>
</head>

<body>

<div class="hero"></div>

<div class="login-side">
  <div class="container">

    <div class="logo">
      <img src="../main/logo.png">
      <div style="color:white;">ArkiLogix</div>
    </div>

    <div class="title">Welcome back</div>
    <div class="subtitle">Access your dashboard</div>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <!-- ✅ REMEMBER ME -->
    <label class="remember">
      <input type="checkbox" id="remember">
      Remember me
    </label>

    <button onclick="login()">Sign In</button>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, browserSessionPersistence } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients",
  storageBucket: "arkilogix-clients.firebasestorage.app",
  messagingSenderId: "1074947351840",
  appId: "1:1074947351840:web:b077eb79963fff59316345"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
async function login() {

  const emailVal = document.getElementById("email").value;
  const passwordVal = document.getElementById("password").value;
  const remember = document.getElementById("remember").checked;

  try {

    /* 🔥 SET PERSISTENCE */
    await setPersistence(auth, remember ? browserLocalPersistence : browserSessionPersistence);

    const userCred = await signInWithEmailAndPassword(auth, emailVal, passwordVal);
    const user = userCred.user;

    const adminDoc = await getDoc(doc(db, "admins", user.uid));
    if (adminDoc.exists()) {
      window.location.href = "/admin/index.html";
      return;
    }

    const clientDoc = await getDoc(doc(db, "clients", user.uid));

    if (!clientDoc.exists()) {
      window.location.href = "/onboarding/index.html";
      return;
    }

    const data = clientDoc.data();

    if (data.status === "disabled") {
      alert("Your account is disabled");
      return;
    }

    const plan = data.plan || "basic";
    window.location.href = `/view/${plan}.html?id=${user.uid}`;

  } catch (err) {
    alert(err.message);
  }
}

window.login = login;

</script>

</body>
</html>
