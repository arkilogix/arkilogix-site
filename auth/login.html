<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArkiLogix Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --accent: #C9A96E;
  --text: #ffffff;
  --muted: #9ca3af;
}

/* RESET */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  height: 100vh;
  display: flex;
}

/* HERO SIDE */
.hero {
  flex: 1;
  background: 
    linear-gradient(rgba(15,17,21,0.65), rgba(15,17,21,0.85)),
    url("hero.jpg");
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: flex-end;
  padding: 60px;
  color: white;
}

.hero-text {
  max-width: 420px;
}

.hero h1 {
  font-size: 32px;
  font-weight: 600;
  margin-bottom: 10px;
}

.hero p {
  font-size: 14px;
  color: #d1d5db;
}

/* LOGIN SIDE */
.login-side {
  width: 420px;
  background: #0f1115;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CARD */
.container {
  width: 100%;
  max-width: 340px;
}

/* LOGO */
.logo {
  text-align: center;
  margin-bottom: 28px;
}

.logo img {
  width: 42px;
  margin-bottom: 10px;
}

.logo-text {
  font-weight: 600;
  font-size: 16px;
  letter-spacing: 0.5px;
}

/* HEADER */
.title {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 6px;
}

.subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 24px;
}

/* INPUT */
.input-group {
  margin-bottom: 14px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  color: white;
  font-size: 14px;
  outline: none;
  transition: 0.2s;
}

input::placeholder {
  color: #6b7280;
}

input:focus {
  border-color: var(--accent);
  background: rgba(255,255,255,0.05);
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #C9A96E, #e6c78f);
  color: #111;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: 0.25s;
  margin-top: 6px;
}

button:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(201,169,110,0.25);
}

button:active {
  transform: scale(0.98);
}

/* FOOTER */
.footer {
  margin-top: 18px;
  font-size: 12px;
  text-align: center;
  color: var(--muted);
}

/* RESPONSIVE */
@media(max-width: 900px) {
  .hero {
    display: none;
  }

  .login-side {
    width: 100%;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-text">
    <h1>Premium Digital Identity</h1>
    <p>Seamlessly connect, present, and convert with ArkiLogix NFC solutions.</p>
  </div>
</div>

<!-- LOGIN -->
<div class="login-side">
  <div class="container">

    <div class="logo">
      <img src="logo.png" alt="ArkiLogix Logo">
      <div class="logo-text">ArkiLogix</div>
    </div>

    <div class="title">Welcome back</div>
    <div class="subtitle">Access your dashboard</div>

    <div class="input-group">
      <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-group">
      <input type="password" id="password" placeholder="Password">
    </div>

    <button onclick="login()">Sign In</button>

    <div class="footer">
      Secure login • ArkiLogix
    </div>

  </div>
</div>

<!-- 🔥 YOUR ORIGINAL SCRIPT (UNCHANGED) -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword,
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  getDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  const adminDoc = await getDoc(doc(db, "admins", user.uid));
  if (adminDoc.exists()) {
    window.location.href = "/admin/index.html";
    return;
  }

  const clientDoc = await getDoc(doc(db, "clients", user.uid));

  if (!clientDoc.exists()) {
    window.location.href = "/onboarding/index.html";
    return;
  }

  const data = clientDoc.data();

  const plan = data.plan || "basic";
  window.location.href = `/view/${plan}.html?id=${user.uid}`;
});

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const userCred = await signInWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    const adminDoc = await getDoc(doc(db, "admins", user.uid));
    if (adminDoc.exists()) {
      window.location.href = "/admin/index.html";
      return;
    }

    const clientDoc = await getDoc(doc(db, "clients", user.uid));

    if (!clientDoc.exists()) {
      window.location.href = "/onboarding/index.html";
      return;
    }

    const data = clientDoc.data();

    if (data.status === "disabled") {
      alert("Your account is disabled");
      return;
    }

    const plan = data.plan || "basic";
    window.location.href = `/view/${plan}.html?id=${user.uid}`;

  } catch (err) {
    alert(err.message);
  }
}

window.login = login;

</script>

</body>
</html>
