<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* SIGNUP */
async function signup(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirmPassword").value;
  const btn = document.getElementById("signupBtn");

  if(password !== confirm){
    alert("Passwords do not match");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Creating...";

  try{
    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    const params = new URLSearchParams(window.location.search);
    const clientId = params.get("clientId");

    let linked = false;

    // 🔥 CASE 1: WITH clientId (normal flow)
    if(clientId){
      const ref = doc(db, "clients", clientId);
      const snap = await getDoc(ref);

      if(snap.exists()){
        await setDoc(ref, {
          uid: user.uid
        }, { merge: true });

        linked = true;
      }
    }

    // 🔥 CASE 2: NO clientId → AUTO LINK OR CREATE
    if(!linked){
      const q = query(collection(db,"clients"), where("email","==",email));
      const snap = await getDocs(q);

      if(!snap.empty){
        const docRef = snap.docs[0].ref;

        await setDoc(docRef, {
          uid: user.uid
        }, { merge: true });

      } else {
        // 🔥 CREATE NEW CLIENT DOC (fallback)
        await setDoc(doc(db,"clients", user.uid), {
          email: email,
          uid: user.uid,
          status: "processing",
          plan: "basic",
          createdAt: new Date()
        });
      }
    }

    runActivation();

  }catch(err){
    alert(err.message);
    btn.disabled = false;
    btn.innerText = "Create Account";
  }
}

/* ACTIVATION */
function runActivation(){
  document.getElementById("activationScreen").style.display="flex";

  setTimeout(()=>step("step1"),300);
  setTimeout(()=>step("step2"),900);
  setTimeout(()=>step("step3"),1500);
  setTimeout(()=>step("step4"),2100);

  setTimeout(()=>{
    window.location.href="/client/index.html";
  },3000);
}

function step(id){
  document.getElementById(id).classList.add("show");
}

/* GLOBAL */
window.signup = signup;
</script>
