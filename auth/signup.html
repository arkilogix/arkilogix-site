<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account • ArkiLogix</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f1115;
  --card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --text:#ffffff;
  --muted:#9ca3af;
  --accent:#C9A96E;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at top,#1a1d24,#0f1115);
  color:var(--text);
}

/* CARD */
.container{
  width:100%;
  max-width:360px;
  padding:32px;
  border-radius:18px;
  background:var(--card);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* LOGO */
.logo{
  text-align:center;
  margin-bottom:24px;
}

.logo img{
  width:44px;
  margin-bottom:8px;
}

.logo div{
  font-weight:600;
  font-size:14px;
}

/* TEXT */
h2{
  font-size:22px;
  font-weight:600;
  margin-bottom:6px;
}

.sub{
  font-size:13px;
  color:var(--muted);
  margin-bottom:22px;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  margin-bottom:14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:white;
  font-size:14px;
  font-weight:500;
  transition:.2s;
}

input::placeholder{
  color:#6b7280;
}

input:focus{
  outline:none;
  border-color:var(--accent);
  background:rgba(255,255,255,0.06);
  transform:scale(1.02);
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:linear-gradient(135deg,#C9A96E,#e6c78f);
  color:#111;
  font-weight:600;
  cursor:pointer;
  transition:.25s;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(201,169,110,0.25);
}

button:active{
  transform:scale(0.97);
}

/* LINK */
.link{
  margin-top:18px;
  text-align:center;
  font-size:13px;
  color:var(--muted);
}

.link a{
  color:var(--accent);
  text-decoration:none;
  font-weight:500;
  margin-left:4px;
}

.link a:hover{
  text-decoration:underline;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <img src="../logo.png">
    <div>ArkiLogix</div>
  </div>

  <h2>Create your account</h2>
  <div class="sub">Start building your digital identity</div>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Create Account</button>

  <div class="link">
    Already have an account?
    <a href="login.html">Login</a>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients",
  storageBucket: "arkilogix-clients.firebasestorage.app",
  messagingSenderId: "1074947351840",
  appId: "1:1074947351840:web:b077eb79963fff59316345"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    // ✅ CREATE CLIENT RECORD (IMPORTANT CHANGE)
    await setDoc(doc(db, "clients", user.uid), {
      email: email,
      plan: "basic",
      status: "active",
      createdAt: new Date()
    });

    window.location.href = "../onboarding/index.html";

  } catch (err) {
    alert(err.message);
  }
}

window.signup = signup;

</script>

</body>
</html>
