<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account • ArkiLogix</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f1115;
  --card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --text:#ffffff;
  --muted:#9ca3af;
  --accent:#C9A96E;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at top,#1a1d24,#0f1115);
  color:var(--text);
}

/* CARD */
.container{
  width:100%;
  max-width:360px;
  padding:32px;
  border-radius:18px;
  background:var(--card);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* LOGO */
.logo{text-align:center;margin-bottom:24px;}
.logo img{width:44px;margin-bottom:8px;}
.logo div{font-weight:600;font-size:14px;}

/* TEXT */
h2{font-size:22px;font-weight:600;margin-bottom:6px;}
.sub{font-size:13px;color:var(--muted);margin-bottom:22px;}

/* INPUT */
input{
  width:100%;
  padding:14px;
  margin-bottom:14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:white;
  font-size:14px;
  font-weight:500;
  transition:.2s;
}
input::placeholder{color:#6b7280;}
input:focus{
  outline:none;
  border-color:var(--accent);
  background:rgba(255,255,255,0.06);
  transform:scale(1.02);
}

/* PASSWORD */
.password-wrap{position:relative;margin-bottom:14px;}
.password-wrap input{padding-right:60px;}
.toggle{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  display:flex;
  align-items:center;
}
.eye{
  width:18px;
  height:18px;
  stroke:#9ca3af;
  fill:none;
  stroke-width:2;
  transition:.2s;
}
.toggle:hover .eye{stroke:#C9A96E;}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:linear-gradient(135deg,#C9A96E,#e6c78f);
  color:#111;
  font-weight:600;
  cursor:pointer;
  transition:.25s;
}
button:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(201,169,110,0.25);
}
button:active{transform:scale(0.97);}
button:disabled{
  opacity:0.5;
  cursor:not-allowed;
  box-shadow:none;
  transform:none;
}

/* LINK */
.link{
  margin-top:18px;
  text-align:center;
  font-size:13px;
  color:var(--muted);
}
.link a{
  color:var(--accent);
  text-decoration:none;
  font-weight:500;
  margin-left:4px;
}
.link a:hover{text-decoration:underline;}

/* FEEDBACK */
.feedback{
  font-size:12px;
  margin-top:-8px;
  margin-bottom:12px;
  min-height:16px;
  opacity:0;
  transition:.25s;
}
.feedback.show{opacity:1;}
.feedback.error{color:#ef4444;}
.feedback.success{color:#22c55e;}

/* ===== ACTIVATION SCREEN ===== */
.activation{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at top,#1a1d24,#0f1115);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.activation-card{
  width:100%;
  max-width:340px;
  padding:32px;
  border-radius:18px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  text-align:center;
}

.activation h3{
  margin-bottom:14px;
}

.steps{
  font-size:13px;
  color:#9ca3af;
  line-height:1.8;
}
.step{
  opacity:0;
  transition:.4s;
}
.step.show{
  opacity:1;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <img src="../logo.png">
    <div>ArkiLogix</div>
  </div>

  <h2>Create your account</h2>
  <div class="sub">Start building your digital identity</div>

  <input id="email" placeholder="Email">

  <div class="password-wrap">
    <input id="password" type="password" placeholder="Password" oninput="validatePasswords()">
    <span class="toggle" onclick="togglePassword('password', this)">
      <svg viewBox="0 0 24 24" class="eye">
        <path d="M12 5C6 5 2 12 2 12s4 7 10 7 10-7 10-7-4-7-10-7z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </span>
  </div>

  <div class="password-wrap">
    <input id="confirmPassword" type="password" placeholder="Retype Password" oninput="validatePasswords()">
    <span class="toggle" onclick="togglePassword('confirmPassword', this)">
      <svg viewBox="0 0 24 24" class="eye">
        <path d="M12 5C6 5 2 12 2 12s4 7 10 7 10-7 10-7-4-7-10-7z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </span>
  </div>

  <div id="passwordFeedback" class="feedback"></div>

  <button id="signupBtn" onclick="signup()" disabled>Create Account</button>

  <div class="link">
    Already have an account?
    <a href="login.html">Login</a>
  </div>

</div>

<!-- 🔥 ACTIVATION SCREEN -->
<div id="activationScreen" class="activation">
  <div class="activation-card">
    <h3>✔ Account Created</h3>
    <div class="steps">
      <div id="step1" class="step">Linking your order...</div>
      <div id="step2" class="step">Preparing your digital card...</div>
      <div id="step3" class="step">Setting up your dashboard...</div>
      <div id="step4" class="step">Redirecting...</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= ELEMENTS ================= */
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const confirmInput = document.getElementById("confirmPassword");
const signupBtn = document.getElementById("signupBtn");
const feedback = document.getElementById("passwordFeedback");

const toggles = document.querySelectorAll(".toggle");

/* ================= PASSWORD VALIDATION ================= */
function validatePasswords(){
  const password = passwordInput.value;
  const confirm = confirmInput.value;

  if(!password && !confirm){
    feedback.className = "feedback";
    feedback.innerText = "";
    signupBtn.disabled = true;
    return;
  }

  if(password === confirm && password.length >= 6){
    feedback.className = "feedback success show";
    feedback.innerText = "Passwords match";
    signupBtn.disabled = false;
  } else {
    feedback.className = "feedback error show";
    feedback.innerText = "Passwords do not match";
    signupBtn.disabled = true;
  }
}

/* ================= TOGGLE PASSWORD ================= */
function togglePassword(input){
  input.type = input.type === "password" ? "text" : "password";
}

/* ================= SIGNUP ================= */
async function signup(){

  const email = emailInput.value.trim();
  const password = passwordInput.value;

  signupBtn.disabled = true;
  signupBtn.innerText = "Creating...";

  try{
    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    const params = new URLSearchParams(window.location.search);
    const clientId = params.get("clientId");

    let linked = false;

    // 🔥 LINK VIA clientId
    if(clientId){
      const ref = doc(db, "clients", clientId);
      const snap = await getDoc(ref);

      if(snap.exists()){
        await setDoc(ref, { uid: user.uid }, { merge: true });
        linked = true;
      }
    }

    // 🔥 FALLBACK LINK BY EMAIL
    if(!linked){
      const q = query(collection(db,"clients"), where("email","==",email));
      const snap = await getDocs(q);

      if(!snap.empty){
        await setDoc(snap.docs[0].ref, { uid: user.uid }, { merge:true });
      } else {
        // 🔥 CREATE NEW CLIENT
        await setDoc(doc(db,"clients", user.uid), {
          email,
          uid: user.uid,
          plan: "basic",
          status: "processing",
          createdAt: new Date()
        });
      }
    }

    runActivation();

  }catch(err){
    alert(err.message);
    signupBtn.disabled = false;
    signupBtn.innerText = "Create Account";
  }
}

/* ================= ACTIVATION ================= */
function runActivation(){
  document.getElementById("activationScreen").style.display = "flex";

  const steps = ["step1","step2","step3","step4"];

  steps.forEach((id, i)=>{
    setTimeout(()=>{
      document.getElementById(id).classList.add("show");
    }, 300 + i*600);
  });

  setTimeout(()=>{
    window.location.href = "/client/index.html";
  }, 3000);
}

/* ================= EVENT LISTENERS ================= */

// password typing
passwordInput.addEventListener("input", validatePasswords);
confirmInput.addEventListener("input", validatePasswords);

// signup click
signupBtn.addEventListener("click", signup);

// toggle buttons
toggles.forEach(toggle => {
  toggle.addEventListener("click", () => {
    const input = toggle.parentElement.querySelector("input");
    togglePassword(input);
  });
});

</script>

</body>
</html>
