<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Card</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Montserrat',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#e5e7eb,#f9fafb);
}

/* CARD */
.card{
width:92%;
max-width:420px;
padding:40px 24px;
border-radius:22px;
text-align:center;
background:linear-gradient(145deg,#ffffffcc,#e5e7ebcc);
backdrop-filter:blur(14px);
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* PROFILE */
.profile-wrap{
width:110px;height:110px;margin:auto;
border-radius:50%;
overflow:hidden;
border:2px solid #d1d5db;
margin-bottom:18px;
}
.profile-wrap img{
width:100%;
height:100%;
object-fit:cover;
}

/* TEXT */
.name{font-size:22px;font-weight:600;}
.position{font-size:13px;color:#555;}

/* ICONS */
.actions{
display:flex;
justify-content:center;
gap:18px;
margin:20px 0;
}

.icon{
width:20px;
height:20px;
stroke:#374151;
fill:none;
stroke-width:2;
}

.icon-btn{
width:42px;height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:#fff;
box-shadow:0 3px 6px rgba(0,0,0,0.08);
cursor:pointer;
transition:.2s;
}
.icon-btn:hover{
background:#111;
}
.icon-btn:hover .icon{
stroke:#fff;
}

/* SOCIAL */
.socials{
display:flex;
justify-content:center;
gap:12px;
margin-bottom:16px;
}

/* BUTTON */
.btn{
padding:12px;
border-radius:30px;
border:1px solid #ddd;
cursor:pointer;
font-size:12px;
}
.btn.primary{
background:#111;
color:#fff;
}

/* SERVICES */
.services{margin-top:20px;}
.service{
display:inline-block;
padding:6px 14px;
border-radius:999px;
font-size:11px;
background:rgba(0,0,0,0.05);
margin:4px;
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111;
color:#fff;
padding:10px 16px;
border-radius:999px;
font-size:12px;
opacity:0;
transition:.3s;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:.3s;
}

.modal.active{
opacity:1;
pointer-events:auto;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:16px;
width:280px;
text-align:center;
}
</style>
</head>

<body>

<div class="card">

<div class="profile-wrap">
<img id="profile" src="https://arkilogix.com/logo.png">
</div>

<div class="name">Your Name</div>
<div class="position">Your Position</div>

<!-- ACTION ICONS -->
<div class="actions">

<div class="icon-btn">
<svg class="icon" viewBox="0 0 24 24">
<path d="M22 16.92V21a2 2 0 0 1-2.18 2
19.79 19.79 0 0 1-8.63-3.07
19.5 19.5 0 0 1-6-6
19.79 19.79 0 0 1-3.07-8.67
A2 2 0 0 1 3 2h4.09
a2 2 0 0 1 2 1.72
c.12.9.37 1.78.73 2.6
a2 2 0 0 1-.45 2.11L8.09 9.91
a16 16 0 0 0 6 6l1.48-1.28
a2 2 0 0 1 2.11-.45
c.82.36 1.7.61 2.6.73
A2 2 0 0 1 22 16.92z"/>
</svg>
</div>

<div class="icon-btn">
<svg class="icon" viewBox="0 0 24 24">
<path d="M21 15a4 4 0 0 1-4 4H7l-4 4V5
a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
</svg>
</div>

<div class="icon-btn">
<svg class="icon" viewBox="0 0 24 24">
<rect x="4" y="4" width="16" height="16"/>
<path d="M22 6l-10 7L2 6"/>
</svg>
</div>

</div>

<!-- SOCIAL -->
<div class="socials">

<div class="icon-btn">
<svg class="icon" viewBox="0 0 24 24">
<path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7
a1 1 0 0 1 1-1h3z"/>
</svg>
</div>

<div class="icon-btn">
<svg class="icon" viewBox="0 0 24 24">
<rect x="2" y="2" width="20" height="20" rx="5"/>
<circle cx="12" cy="12" r="4"/>
<circle cx="17.5" cy="6.5" r="1"/>
</svg>
</div>

</div>

<!-- SAVE CONTACT -->
<div class="btn primary" onclick="openModal()">
Save Contact
</div>

<!-- SERVICES -->
<div class="services" id="services"></div>

</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box">
<h3>Unlock this feature</h3>
<p>Enable contact saving with Pro ✨</p>
<br>
<button class="btn primary">Unlock Features</button>
<br><br>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<script>

/* SERVICES */
let services = ["Design","Build","Consult"];

function render(){
const el=document.getElementById("services");
el.innerHTML="";
services.forEach(s=>{
const d=document.createElement("div");
d.className="service";
d.innerText=s;
el.appendChild(d);
});
}
render();

/* LIMIT */
function addService(s){
if(services.length>=3){
showToast("Add unlimited services with Pro ✨");
return;
}
services.push(s);
render();
}

/* TOAST */
function showToast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.opacity="1";
setTimeout(()=>t.style.opacity="0",2000);
}

/* MODAL */
function openModal(){
document.getElementById("modal").classList.add("active");
}
function closeModal(){
document.getElementById("modal").classList.remove("active");
}

</script>

</body>
</html>
