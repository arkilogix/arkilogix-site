<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArkiLogix</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* BACKGROUND */
body{
margin:0;
font-family:'Montserrat',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background: linear-gradient(135deg,#e5e7eb,#f9fafb);
}

/* CARD */
.card{
width:92%;
max-width:420px;
padding:42px 28px;
border-radius:22px;
text-align:center;
background: linear-gradient(145deg,#ffffffcc,#e5e7ebcc);
backdrop-filter:blur(14px);
border:1px solid rgba(0,0,0,0.08);
box-shadow:0 10px 30px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.6);
opacity:1;
transform:translateY(0);
}

/* PROFILE IMAGE */
.profile-wrap{
width:110px;
height:110px;
margin:auto;
border-radius:50%;
overflow:hidden;
border:2px solid #d1d5db;
margin-bottom:18px;
}
.profile-wrap img{
width:100%;
height:100%;
object-fit:cover;
}

/* TEXT */
.name{
font-size:24px;
font-weight:700;
color:#111827;
}
.position{
margin-top:6px;
font-size:14px;
color:#4b5563;
}
.company{
margin-top:4px;
font-size:12px;
letter-spacing:1px;
color:#9ca3af;
}

/* ACTION ICONS */
.actions{
display:flex;
justify-content:center;
gap:22px;
margin:22px 0;
}
.actions a{
width:42px;
height:42px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:linear-gradient(145deg,#ffffff,#e5e7eb);
box-shadow:inset 0 1px 2px rgba(255,255,255,0.6), 0 3px 6px rgba(0,0,0,0.08);
transition:.2s;
}
.actions a:hover{
transform:scale(1.1);
background:#111827;
}
.icon{
width:20px;
height:20px;
stroke:#374151;
fill:none;
stroke-width:2;
transition:.2s;
}
.actions a:hover .icon{
stroke:white;
}

/* SOCIAL BUTTONS */
.socials{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:18px;
}
.social-btn{
padding:8px 14px;
border-radius:20px;
font-size:11px;
text-decoration:none;
font-weight:600;
border:1px solid #d1d5db;
color:#374151;
}
.social-btn:hover{
background:#111827;
color:white;
}

/* BUTTONS */
.btn{
display:block;
padding:12px;
border-radius:30px;
border:1px solid #d1d5db;
color:#374151;
text-decoration:none;
font-size:12px;
font-weight:600;
margin-top:10px;
background:#f9fafb;
}
.btn.primary{
background:linear-gradient(145deg,#374151,#111827);
color:white;
border:none;
}
.btn.primary:hover{
opacity:0.9;
}

/* SERVICES */
.services{
margin-top:28px;
text-align:left;
}
.services-title{
font-size:11px;
letter-spacing:2px;
color:#6b7280;
margin-bottom:12px;
text-transform:uppercase;
}
.service{
font-size:13px;
margin-bottom:6px;
color:#0f172a;
padding-left:10px;
position:relative;
}
.service:before{
content:"•";
position:absolute;
left:0;
color:#6b7280;
}

/* FOOTER */
.footer{
margin-top:22px;
font-size:10px;
color:#9ca3af;
letter-spacing:1px;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
}
.footer-logo{
width:40px;
margin-bottom:8px;
display:block;
}

</style>
</head>

<body>

<div id="loader" style="
position:fixed;
inset:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-weight:600;
">
  Loading...
</div>

<div class="card">

<div class="profile-wrap">
<img id="profile" src="">
</div>

<div class="name" id="name"></div>
<div class="position" id="position"></div>
<div class="company" id="company"></div>

<div class="actions">

<a id="phoneLink" href="#">
<svg class="icon" viewBox="0 0 24 24">
<path d="M22 16.92V21a2 2 0 0 1-2.18 2
19.79 19.79 0 0 1-8.63-3.07
19.5 19.5 0 0 1-6-6
19.79 19.79 0 0 1-3.07-8.67
A2 2 0 0 1 3 2h4.09
a2 2 0 0 1 2 1.72
c.12.9.37 1.78.73 2.6
a2 2 0 0 1-.45 2.11L8.09 9.91
a16 16 0 0 0 6 6l1.48-1.28
a2 2 0 0 1 2.11-.45
c.82.36 1.7.61 2.6.73
A2 2 0 0 1 22 16.92z"/>
</svg>
</a>

<a id="smsLink" href="#">
<svg class="icon" viewBox="0 0 24 24">
<path d="M21 15a4 4 0 0 1-4 4H7l-4 4V5a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
</svg>
</a>

<a id="emailLink" href="#">
<svg class="icon" viewBox="0 0 24 24">
<path d="M4 4h16v16H4z"/>
<path d="M22 6l-10 7L2 6"/>
</svg>
</a>

</div>

<div class="socials">
<a id="facebook" href="#" class="social-btn">Facebook</a>
<a id="instagram" href="#" class="social-btn">Instagram</a>
<a id="portfolio" href="#" class="social-btn">Portfolio</a>
</div>

<a id="saveContact" class="btn primary" href="#">Save Contact</a>
<a id="companyProfile" class="btn" href="#" target="_blank">Company Profile</a>

<div class="services" id="services">
  <div class="services-title">Services</div>
</div>

<div class="footer">
  <img src="https://arkilogix.com/logo.png" class="footer-logo">
  ARKILOGIX
</div>

</div>
<script type="module">

// 🔥 IMPORT FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG (same as index)
const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients"
};

// 🔥 INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 GET ID FROM URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// ❌ NO ID
if (!id) {
  document.body.innerHTML = "Missing ID";
  throw new Error("No ID");
}

// 🔥 GET DATA FROM FIREBASE
const docRef = doc(db, "clients", id);

getDoc(docRef).then((docSnap) => {

  if (!docSnap.exists()) {
    document.body.innerHTML = "Client not found";
    return;
  }

  const data = docSnap.data();
  console.log("DATA:", data);

  // 🔥 HIDE LOADER
  document.getElementById("loader").style.display = "none";

  // 🔥 PROFILE
  document.getElementById("profile").src = data.profile || "";
  document.getElementById("name").textContent = data.name || "";
  document.getElementById("position").textContent = data.position || "";
  document.getElementById("company").textContent = data.company || "";

  // 🔥 ACTIONS
  document.getElementById("phoneLink").href = "tel:" + (data.phone || "");
  document.getElementById("smsLink").href = "sms:" + (data.phone || "");
  document.getElementById("emailLink").href = "mailto:" + (data.email || "");

  // 🔥 SOCIALS
  if (data.facebook) document.getElementById("facebook").href = data.facebook;
  if (data.instagram) document.getElementById("instagram").href = data.instagram;
  if (data.website) document.getElementById("portfolio").href = data.website;

  // 🔥 SERVICES
  const servicesDiv = document.getElementById("services");

  if (data.service1) servicesDiv.innerHTML += `<div class="service">${data.service1}</div>`;
  if (data.service2) servicesDiv.innerHTML += `<div class="service">${data.service2}</div>`;
  if (data.service3) servicesDiv.innerHTML += `<div class="service">${data.service3}</div>`;
  if (data.service4) servicesDiv.innerHTML += `<div class="service">${data.service4}</div>`;

}).catch(err => {
  console.error(err);
  document.body.innerHTML = "Error loading data";
});

</script>

  
</body>
</html>
