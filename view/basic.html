<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Card</title>
<link rel="icon" type="image/png" href="../logo.png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Montserrat',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#e5e7eb,#f9fafb);
}

/* CARD */
.card{
opacity:0;
transform:translateY(10px);
transition:all .5s ease;
width:92%;
max-width:420px;
padding:40px 24px;
border-radius:22px;
text-align:center;
background:linear-gradient(145deg,#ffffffcc,#e5e7ebcc);
backdrop-filter:blur(14px);
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* PROFILE */
.profile-wrap{
width:110px;height:110px;margin:auto;
border-radius:50%;
overflow:hidden;
border:2px solid #d1d5db;
margin-bottom:18px;
}
.profile-wrap img{
width:100%;
height:100%;
object-fit:cover;
}

/* TEXT */
.name{font-size:22px;font-weight:600;}
.position{font-size:13px;color:#555;}

/* ICONS */
.actions{
display:flex;
justify-content:center;
gap:18px;
margin:20px 0;
}

.icon{
width:20px;
height:20px;
stroke:#374151;
fill:none;
stroke-width:2;
}

.icon-btn{
  width:42px;
  height:42px;
  border-radius:50%;
  align-items:center;
  justify-content:center;
  background:#fff;
  box-shadow:0 3px 6px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:.2s;
  display:none; /* ✅ ONLY this */
}
.icon-btn:hover{
background:#111;
}
.icon-btn:hover .icon{
stroke:#fff;
}

/* SOCIAL */
.socials{
display:flex;
justify-content:center;
gap:12px;
margin-bottom:16px;
}

/* BUTTON */
.btn{
padding:12px;
border-radius:30px;
border:1px solid #ddd;
cursor:pointer;
font-size:12px;
}
.btn.primary{
background:#111;
color:#fff;
}

/* SERVICES */
.services{margin-top:20px;}
.service{
display:inline-block;
padding:6px 14px;
border-radius:999px;
font-size:11px;
background:rgba(0,0,0,0.05);
margin:4px;
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111;
color:#fff;
padding:10px 16px;
border-radius:999px;
font-size:12px;
opacity:0;
transition:.3s;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:.3s;
}

.modal.active{
opacity:1;
pointer-events:auto;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:16px;
width:280px;
text-align:center;
}

/* BRANDING */
.branding{
margin-top:30px;
text-align:center;
opacity:0.7;
text-decoration:none;
display:block;
transition:0.2s;
}

.branding:hover{
opacity:1;
transform:translateY(-2px);
}

.branding img{
width:35px;
margin-bottom:6px;
opacity:0.85;
}

.branding p{
font-size:11px;
color:#555;
letter-spacing:0.5px;
}

  /* SERVICES HEADER */
.services-header{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-top:25px;
margin-bottom:10px;
}

.services-header p{
font-size:10px;
letter-spacing:1.5px;
color:#777;
white-space:nowrap;
}

/* DIVIDER */
.divider{
height:1px;
width:75px; /* controls length */
background:rgba(0,0,0,0.15);
flex-shrink:0;
}
  
/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:#0f1115;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:opacity .5s ease;
}

.loader-content{
  text-align:center;
  color:#fff;
  animation:fadeIn .6s ease;
}

.loader-content img{
  width:60px;
  margin-bottom:10px;
  opacity:0.9;
}

.loader-content p{
  font-size:12px;
  letter-spacing:1px;
  color:#aaa;
}

/* FADE */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
</style>

</head>
  
<!-- LOADER -->
<div id="loader">
  <div class="loader-content">
    <img src="../logo.png" alt="Arkilogix">
    <p>Powered by <strong>Arkilogix</strong></p>
  </div>
</div>
  
<body>

<div class="card">

<div class="profile-wrap">
<img id="profile" src="https://arkilogix.com/logo.png">
</div>

<div class="name">Your Name</div>
<div class="position">Your Position</div>

<!-- ACTION ICONS -->
<div class="actions">

<div class="icon-btn" id="phoneBtn" onclick="handlePhone()">
<svg class="icon" viewBox="0 0 24 24">
<path d="M22 16.92V21a2 2 0 0 1-2.18 2
19.79 19.79 0 0 1-8.63-3.07
19.5 19.5 0 0 1-6-6
19.79 19.79 0 0 1-3.07-8.67
A2 2 0 0 1 3 2h4.09
a2 2 0 0 1 2 1.72
c.12.9.37 1.78.73 2.6
a2 2 0 0 1-.45 2.11L8.09 9.91
a16 16 0 0 0 6 6l1.48-1.28
a2 2 0 0 1 2.11-.45
c.82.36 1.7.61 2.6.73
A2 2 0 0 1 22 16.92z"/>
</svg>
</div>

<div class="icon-btn" id="smsBtn" onclick="handleSMS()">
<svg class="icon" viewBox="0 0 24 24">
<path d="M21 15a4 4 0 0 1-4 4H7l-4 4V5
a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
</svg>
</div>

<div class="icon-btn" id="emailBtn" onclick="handleEmail()">
<svg class="icon" viewBox="0 0 24 24">
<rect x="4" y="4" width="16" height="16"/>
<path d="M22 6l-10 7L2 6"/>
</svg>
</div>

</div>

<!-- SOCIAL -->
<div class="socials">

<div class="icon-btn" id="instagramBtn" onclick="handleInstagram()">
<svg class="icon" viewBox="0 0 24 24">
<path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7
a1 1 0 0 1 1-1h3z"/>
</svg>
</div>

<div class="icon-btn" id="facebookBtn" onclick="handleFacebook()">
<svg class="icon" viewBox="0 0 24 24">
<rect x="2" y="2" width="20" height="20" rx="5"/>
<circle cx="12" cy="12" r="4"/>
<circle cx="17.5" cy="6.5" r="1"/>
</svg>
</div>

</div>

<!-- SAVE CONTACT -->
<div class="btn primary" onclick="downloadVCard()">
Save Contact
</div>

<!-- SERVICES HEADER -->
<div class="services-header">
  <div class="divider"></div>
  <p>SERVICES OFFERED</p>
  <div class="divider"></div>
</div>

<!-- SERVICES -->
<div class="services" id="services"></div>

<!-- BRANDING -->
  <a href="https://arkilogix.com" target="_blank" class="branding">
  <img src="../logo.png" alt="Arkilogix Logo">
  <p>Powered by <strong>Arkilogix</strong></p>
</a>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box">
<h3>Unlock this feature</h3>
<p>Enable contact saving with Pro ✨</p>
<br>
<button class="btn primary">Unlock Features</button>
<br><br>
<button onclick="closeModal()">Cancel</button>
</div>
</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients",
  storageBucket: "arkilogix-clients.firebasestorage.app",
  messagingSenderId: "1074947351840",
  appId: "1:1074947351840:web:b077eb79963fff59316345"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* GET ID */
const params = new URLSearchParams(window.location.search);
const id = params.get("id"); // ✅ IMPORTANT

let currentPlan = "basic";

function toggleIcon(id, value){
  const el = document.getElementById(id);
  if(!el) return;
  el.style.display = value ? "flex" : "none";
}

/* MAIN INIT */
async function init(){

  await signInAnonymously(auth); // ✅ ensure auth BEFORE firestore

  if(!id){
    console.log("NO ID");
    return;
  }

  const ref = doc(db, "clients", id);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    console.log("NO DATA FOUND FOR:", id);
    return;
  }

  const data = snap.data();

  window.userData = {
    phone: data.phone || "",
    email: data.email || "",
    facebook: data.facebook || "",
    instagram: data.instagram || ""
  };

  toggleIcon("phoneBtn", data.phone);
  toggleIcon("smsBtn", data.phone);
  toggleIcon("emailBtn", data.email);
  toggleIcon("instagramBtn", data.instagram);
  toggleIcon("facebookBtn", data.facebook);

  if (data.status === "disabled") {
    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f1115;color:white;">
        <div>
          <h2>Account Disabled</h2>
          <p>This digital card is no longer available.</p>
        </div>
      </div>
    `;
    return;
  }

  /* TEXT */
  document.querySelector(".name").innerText = data.name || "Your Name";
  document.querySelector(".position").innerText = data.position || "Your Position";

  /* PROFILE */
  if(data.profile){
    document.getElementById("profile").src = data.profile;
  }

  /* SERVICES */
  renderServices(data.services || []);

  /* TRACK VIEW */
  await updateDoc(ref, {
    "stats.views": increment(1)
  });

  /* SHOW UI */
  setTimeout(() => {
    document.getElementById("loader").style.opacity = "0";

    setTimeout(() => {
      document.getElementById("loader").style.display = "none";

      const card = document.querySelector(".card");
      card.style.opacity = "1";
      card.style.transform = "translateY(0)";
    }, 500);
  }, 300);
}

/* SERVICES */
function renderServices(list){
  const el = document.getElementById("services");
  el.innerHTML="";
  list.slice(0,3).forEach(s=>{
    const d=document.createElement("div");
    d.className="service";
    d.innerText=s;
    el.appendChild(d);
  });
}

/* ACTIONS */
window.trackClick = async function(){
  if(!id) return;
  await updateDoc(doc(db, "clients", id), {
    "stats.clicks": increment(1)
  });
};

window.handlePhone = function(){
  if(!window.userData?.phone) return;
  trackClick();
  window.location.href = "tel:" + window.userData.phone;
};

window.handleSMS = function(){
  if(!window.userData?.phone) return;
  trackClick();
  window.location.href = "sms:" + window.userData.phone;
};

window.handleEmail = function(){
  if(!window.userData?.email) return;
  trackClick();
  window.location.href = "mailto:" + window.userData.email;
};

window.handleInstagram = function(){
  if(!window.userData?.instagram) return;
  trackClick();
  window.open(window.userData.instagram, "_blank");
};

window.handleFacebook = function(){
  if(!window.userData?.facebook) return;
  trackClick();
  window.open(window.userData.facebook, "_blank");
};

/* INIT CALL */
init();

</script>

</body>
</html>
