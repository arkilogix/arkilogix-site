<script>
async function loadClient(){

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if(!id){
    document.body.innerHTML = "❌ No ID provided";
    return;
  }

  try{
    const res = await fetch("/arkilogix-site/clients/" + id + ".json");

    if(!res.ok){
      throw new Error("Client not found");
    }

    const data = await res.json();

    document.getElementById("name").innerText = data.name || "";
    document.getElementById("profession").innerText = data.profession || "";
    document.getElementById("company").innerText = data.company || "";
    document.getElementById("about").innerText = data.about || "";

    console.log("Loaded client:", data);

  }catch(err){
    document.body.innerHTML = "❌ Client not found";
    console.error(err);
  }
}

loadClient();
</script>
