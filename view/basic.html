<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArkiLogix</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* BACKGROUND */
body{
margin:0;
font-family:'Montserrat',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background: linear-gradient(135deg,#e0f2fe,#ffffff);
}

/* CARD */
.card{
width:92%;
max-width:420px;
padding:42px 28px;
border-radius:22px;
text-align:center;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(12px);
border:1px solid rgba(14,165,233,0.2);
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* PROFILE IMAGE */
.profile-wrap{
width:110px;
height:110px;
margin:auto;
border-radius:50%;
overflow:hidden;
border:2px solid #0ea5e9;
margin-bottom:18px;
}
.profile-wrap img{
width:100%;
height:100%;
object-fit:cover;
}

/* TEXT */
.name{
font-size:24px;
font-weight:700;
color:#0f172a;
}
.position{
margin-top:6px;
font-size:14px;
color:#334155;
}
.company{
margin-top:4px;
font-size:12px;
letter-spacing:1px;
color:#64748b;
}

/* ACTION ICONS */
.actions{
display:flex;
justify-content:center;
gap:22px;
margin:22px 0;
}
.icon{
width:22px;
height:22px;
stroke:#0ea5e9;
fill:none;
stroke-width:2;
transition:.2s;
}
.icon:hover{
transform:scale(1.15);
stroke:#0284c7;
}

/* SOCIAL BUTTONS */
.socials{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:18px;
}
.social-btn{
padding:8px 14px;
border-radius:20px;
font-size:11px;
text-decoration:none;
font-weight:600;
border:1px solid #0ea5e9;
color:#0ea5e9;
}
.social-btn:hover{
background:#0ea5e9;
color:white;
}

/* BUTTONS */
.btn{
display:block;
padding:12px;
border-radius:30px;
border:1.5px solid #0ea5e9;
color:#0ea5e9;
text-decoration:none;
font-size:12px;
font-weight:600;
margin-top:10px;
}
.btn.primary{
background:#0ea5e9;
color:white;
}
.btn.primary:hover{
background:#0284c7;
}

/* SERVICES */
.services{
margin-top:28px;
text-align:left;
}
.services-title{
font-size:11px;
letter-spacing:2px;
color:#0ea5e9;
margin-bottom:12px;
text-transform:uppercase;
}
.service{
font-size:13px;
margin-bottom:6px;
color:#0f172a;
padding-left:10px;
position:relative;
}
.service:before{
content:"•";
position:absolute;
left:0;
color:#0ea5e9;
}

/* FOOTER */
.footer{
margin-top:22px;
font-size:10px;
color:#94a3b8;
letter-spacing:1px;
}

</style>
</head>

<body>

<div class="card">

<!-- PROFILE IMAGE -->
<div class="profile-wrap">
<img id="profile" src="">
</div>

<!-- NAME -->
<div class="name" id="name"></div>

<!-- POSITION -->
<div class="position" id="position"></div>

<!-- COMPANY -->
<div class="company" id="company"></div>

<!-- ACTION ICONS -->
<div class="actions">

<a id="phoneLink" href="#">
<svg class="icon" viewBox="0 0 24 24">
<path d="M22 16.92V21a2 2 0 0 1-2.18 2
19.79 19.79 0 0 1-8.63-3.07
19.5 19.5 0 0 1-6-6
19.79 19.79 0 0 1-3.07-8.67
A2 2 0 0 1 3 2h4.09
a2 2 0 0 1 2 1.72
c.12.9.37 1.78.73 2.6
a2 2 0 0 1-.45 2.11L8.09 9.91
a16 16 0 0 0 6 6l1.48-1.28
a2 2 0 0 1 2.11-.45
c.82.36 1.7.61 2.6.73
A2 2 0 0 1 22 16.92z"/>
</svg>
</a>

<a id="smsLink" href="#">
<svg class="icon" viewBox="0 0 24 24">
<path d="M21 15a4 4 0 0 1-4 4H7l-4 4V5a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
</svg>
</a>

<a id="emailLink" href="#">
<svg class="icon" viewBox="0 0 24 24">
<path d="M4 4h16v16H4z"/>
<path d="M22 6l-10 7L2 6"/>
</svg>
</a>

</div>

<!-- SOCIALS -->
<div class="socials">
<a id="facebook" href="#" class="social-btn">Facebook</a>
<a id="instagram" href="#" class="social-btn">Instagram</a>
<a id="portfolio" href="#" class="social-btn">Portfolio</a>
</div>

<!-- BUTTONS -->
<a id="saveContact" class="btn primary" href="#">Save Contact</a>
<a id="companyProfile" class="btn" href="#" target="_blank">Company Profile</a>

<!-- SERVICES -->
<div class="services" id="services">
  <div class="services-title">Services</div>
</div>

<div class="footer">
ARKILOGIX
</div>

</div>

<script>
function setLink(id, value, prefix = "") {
  const el = document.getElementById(id);

  if (value) {
    el.href = prefix + value;
  } else {
    el.style.display = "none";
  }
}
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

fetch("/clients/" + id + ".json")
.then(res => {
  if(!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
})
.then(data => {

  document.getElementById("name").innerText = data.name || "";
  document.getElementById("position").innerText = data.position || data.profession || "";
  document.getElementById("company").innerText = data.company || "";
  document.getElementById("profile").src = data.profile || "";

  setLink("phoneLink", data.phone, "tel:");
  setLink("smsLink", data.phone, "sms:");
  setLink("emailLink", data.email, "mailto:");
  
  setLink("facebook", data.facebook);
  setLink("instagram", data.instagram);
  setLink("portfolio", data.portfolio);
  setLink("companyProfile", data.companyProfile);

  const servicesContainer = document.getElementById("services");

  if(data.services){
    data.services.forEach(service => {
      const div = document.createElement("div");
      div.className = "service";
      div.innerText = service;
      servicesContainer.appendChild(div);
    });
  }

})
.catch(err => {
  console.error("ERROR:", err);
});

</script>

</body>
</html>
