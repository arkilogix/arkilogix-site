<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Digital Card</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== COLOR SYSTEM ===== */
:root{
  --bg: #f5f5f7;
  --card: #ffffff;
  --text: #111;
  --subtext: #6b7280;
  --border: #e5e7eb;
  --black: #111;
}

/* ===== BASE ===== */
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:var(--bg);
  color:var(--text);
  padding-bottom:120px;
}

/* ===== CONTAINER ===== */
.wrapper{
  max-width:430px;
  margin:0 auto;
  background:var(--card);
  min-height:100vh;
}

/* ===== HERO ===== */
.hero{
  position:relative;
  height:260px;
  overflow:hidden;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:16px;
  background:linear-gradient(transparent, rgba(0,0,0,0.6));
}

.highlight-title{
  font-size:15px;
  font-weight:600;
  color:#fff;
}

.company{
  font-size:12px;
  color:#ddd;
}

/* ===== PROFILE ===== */
.profile{
  text-align:center;
  margin-top:-60px;
  padding:0 20px;
}

.profile img{
  width:110px;
  height:110px;
  border-radius:50%;
  border:5px solid #fff;
  object-fit:cover;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.name{
  font-size:20px;
  font-weight:600;
  margin-top:10px;
}

.position{
  font-size:13px;
  color:var(--subtext);
}

/* ===== ACTION ICONS ===== */
.actions{
  display:flex;
  justify-content:center;
  gap:14px;
  margin:20px;
}

.icon-btn{
  width:48px;
  height:48px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;

  background:linear-gradient(145deg,#ffffff,#e9edf3);
  border:1px solid var(--border);

  box-shadow:
    inset 0 2px 4px rgba(255,255,255,0.9),
    inset 0 -3px 6px rgba(0,0,0,0.08),
    0 6px 15px rgba(0,0,0,0.08);

  transition:.25s;
}

.icon-btn svg{
  width:20px;
  height:20px;
  stroke:#5b6f8f;
}

/* ===== BUTTON SYSTEM ===== */
.center{
  display:flex;
  justify-content:center;
  margin-top:15px;
}

.btn{
  padding:12px 24px;
  border-radius:30px;

  background:linear-gradient(145deg,#ffffff,#e9edf3);
  border:1px solid var(--border);

  box-shadow:
    inset 0 2px 4px rgba(255,255,255,0.9),
    inset 0 -3px 6px rgba(0,0,0,0.08),
    0 6px 15px rgba(0,0,0,0.08);

  text-decoration:none;
  color:var(--text);
  font-size:14px;
  font-weight:500;
}

/* ===== SECTION TITLE ===== */
.section-title{
  margin:30px 20px 10px;
  font-size:14px;
  color:var(--subtext);
}

/* ===== GALLERY (SCROLL) ===== */
.projects{
  display:flex;
  gap:14px;
  overflow-x:auto;
  padding:0 20px 25px;
}

.projects img{
  height:200px;
  border-radius:16px;
  object-fit:cover;
}

/* ===== CTA GLASS ===== */
.cta-wrap{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:430px;

  padding:12px 16px 20px;

  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
}

.cta{
  display:flex;
  justify-content:center;
}

.cta a{
  width:100%;
  max-width:360px;
  text-align:center;
  padding:16px;
  border-radius:50px;

  background:var(--black);
  color:#fff;
  text-decoration:none;
  font-weight:600;
}

/* ===== FOOTER ===== */
.footer{
  text-align:center;
  padding:40px 20px 120px;
}

.footer img{
  width:60px;
  opacity:0.7;
}

.footer-text{
  font-size:11px;
  letter-spacing:1.5px;
  color:#9ca3af;
}

</style>
</head>

<body>

<div class="wrapper">

<!-- HERO -->
<div class="hero">
  <img id="highlightImage">
  <div class="hero-overlay">
    <div id="highlightTitle" class="highlight-title"></div>
    <div id="company" class="company"></div>
  </div>
</div>

<!-- PROFILE -->
<div class="profile">
  <img id="profileImage">
  <div id="name" class="name"></div>
  <div id="position" class="position"></div>
</div>

<!-- ACTIONS -->
<div class="actions">
  <a id="phoneBtn" class="icon-btn"></a>
  <a id="smsBtn" class="icon-btn"></a>
  <a id="emailBtn" class="icon-btn"></a>
</div>

<!-- SAVE -->
<div class="center">
  <a id="saveContact" class="btn">Save Contact</a>
</div>

<!-- TITLE -->
<div class="section-title">Project Highlights</div>

<!-- GALLERY -->
<div class="projects">
  <img id="project1">
  <img id="project2">
  <img id="project3">
</div>

<!-- CTA -->
<div class="cta-wrap">
  <div class="cta">
    <a id="ctaBtn">Book a Shoot</a>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <img src="../logo.png">
  <div class="footer-text">POWERED BY ARKILOGIX</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let currentPlan = "basic";

async function loadUser(){

  const snap = await getDoc(doc(db, "clients", id));

  if(snap.exists()){
    const data = snap.data();
    currentPlan = data.plan || "basic";
  }
}

/* ELITE LOCK */
window.openGallery = function(){

  if(currentPlan !== "elite"){
    showModal("Upgrade to Elite to unlock gallery ✨");
    return;
  }

  // actual gallery logic later
};

/* MODAL */
function showModal(msg){
  document.getElementById("modal").classList.add("active");
  document.querySelector("#modal p").innerText = msg;
}

window.closeModal = function(){
  document.getElementById("modal").classList.remove("active");
};
if (data.status === "disabled") {
  document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:50px;'>Account Disabled</h2>";
  return;
}
loadUser();

</script>

</body>
</html>
