<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" sizes="32x32" href="/logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="/logo.png">
<link rel="apple-touch-icon" sizes="180x180" href="/logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Digital Card</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f5f5f7;
  color:#111;
}

/* ===== CONTAINER ===== */
.wrapper{
  max-width:430px;
  margin:auto;
  background:#fff;
  min-height:100vh;
  padding-bottom:120px;
}

/* ===== HERO ===== */
/* ===== HERO ===== */
.hero{
  position:relative;
  height:280px;
  overflow:hidden;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.05);
}

/* 🔥 SMOOTH PREMIUM GRADIENT */
.hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0) 30%,
    rgba(0,0,0,0.4) 65%,
    rgba(0,0,0,0.75) 100%
  );
}

/* ===== PROFILE FLOAT ===== */
.profile{
  position:absolute;
  bottom:-55px;
  left:50%;
  transform:translateX(-50%);
}

.profile img{
  width:110px;
  height:110px;
  border-radius:50%;
  border:4px solid #fff;
  object-fit:cover;
  box-shadow:0 12px 30px rgba(0,0,0,0.25);
}

/* ===== TEXT ON HERO ===== */
.hero-text{
  position:absolute;
  bottom:15px;
  width:100%;
  text-align:center;
  color:#fff;
  padding:0 20px;
}

.name{
  font-size:20px;
  font-weight:600;
}

.position{
  font-size:13px;
  color:#ddd;
}
  .company{
  font-size:12px;
  color:#cbd5e1;
  margin-top:4px;
  letter-spacing:0.3px;
}

/* ===== ACTIONS ===== */
.actions{
  display:flex;
  justify-content:center;
  gap:14px;
  margin:20px;
  margin-top:70px;
}

.icon-btn{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:#fff;border:1px solid #eee;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  transition:.2s;
}

.icon-btn svg{
  width:20px;
  height:20px;
  stroke:#5b6f8f;
  fill:none;
  stroke-width:2;
}

.icon-btn:active{
  transform:scale(0.95);
}

/* ===== BUTTONS ===== */
.center{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin:15px 20px;
}

.btn{
  padding:14px;
  border-radius:30px;
  text-align:center;
  text-decoration:none;
  font-size:14px;
}

.btn.primary{
  background:#111;
  color:#fff;
}

.btn.secondary{
  background:#f3f4f6;
  color:#111;
  border:1px solid #e5e7eb;
}

/* ===== PROJECTS SCROLL (ELITE) ===== */
.projects{
  margin-top:25px;
  padding:0 20px;

  display:flex;
  gap:14px;
  overflow-x:auto;

  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;

  scroll-behavior:smooth;
}

/* hide scrollbar */
.projects::-webkit-scrollbar{
  display:none;
}

/* ===== CARD ===== */
.project-card{
  min-width:80%;
  flex-shrink:0;
  scroll-snap-align:center;

  transition:transform .3s ease, opacity .3s ease;
  opacity:0.6;
  transform:scale(0.92);
}

/* ACTIVE CARD */
.project-card.active{
  opacity:1;
  transform:scale(1);
}

.project-card img{
  width:100%;
  height:210px;
  object-fit:cover;
  border-radius:18px;

  box-shadow:0 15px 35px rgba(0,0,0,0.2);
  transition:.25s;
}

.project-card img:active{
  transform:scale(0.97);
}

/* ===== CTA ===== */
.cta-wrap{
  position:fixed;
  bottom:0;
  width:100%;
  max-width:430px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(12px);
  padding:12px;
}

.cta a{
  display:block;
  background:#111;
  color:#fff;
  padding:16px;
  border-radius:50px;
  text-align:center;
  text-decoration:none;
  font-weight:600;
}
#loader{
  position:fixed;
  inset:0;
  background:#0f1115;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:opacity .5s ease;
}

.loader-content{
  text-align:center;
  color:#fff;
}

.loader-content img{
  width:60px;
  margin-bottom:10px;
}

.loader-content p{
  font-size:12px;
  letter-spacing:1px;
  color:#aaa;
}
  .lock-premium{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
}

.lock-card{
  text-align:center;
  padding:40px 30px;
  border-radius:20px;
  max-width:320px;
  width:90%;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(16px);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.lock-logo{
  width:50px;
  margin-bottom:15px;
}

.lock-title{
  font-size:20px;
  color:#fff;
}

.lock-sub{
  font-size:13px;
  color:#aaa;
}

.lock-note{
  font-size:12px;
  color:#777;
}

.lock-loader{
  display:flex;
  justify-content:center;
  gap:6px;
  margin-top:15px;
}

.lock-loader span{
  width:6px;
  height:6px;
  background:#fff;
  border-radius:50%;
  animation:pulse 1.2s infinite;
}

.lock-loader span:nth-child(2){animation-delay:.2s;}
.lock-loader span:nth-child(3){animation-delay:.4s;}

@keyframes pulse{
  0%{opacity:.3;}
  50%{opacity:1;}
  100%{opacity:.3;}
}
</style>
</head>

<body>

<div class="wrapper">

<!-- HERO -->
<div class="hero">

  <img id="highlightImage">

  <!-- GRADIENT OVERLAY -->
  <div class="hero-overlay"></div>

  <!-- PROFILE FLOAT -->
  <div class="profile">
    <img id="profileImage">
  </div>

  <!-- TEXT -->
  <div class="hero-text">
    <div id="name" class="name"></div>
    <div id="position" class="position"></div>
    <div id="company" class="company"></div>
  </div>

</div>

<!-- ACTIONS -->
<div class="actions">

  <!-- PHONE -->
  <a id="phoneBtn" class="icon-btn">
    <svg viewBox="0 0 24 24">
      <path d="M22 16.92V21a2 2 0 0 1-2.18 2
      19.79 19.79 0 0 1-8.63-3.07
      19.5 19.5 0 0 1-6-6
      19.79 19.79 0 0 1-3.07-8.67
      A2 2 0 0 1 3 2h4.09
      a2 2 0 0 1 2 1.72
      c.12.9.37 1.78.73 2.6
      a2 2 0 0 1-.45 2.11L8.09 9.91
      a16 16 0 0 0 6 6l1.48-1.28
      a2 2 0 0 1 2.11-.45
      c.82.36 1.7.61 2.6.73
      A2 2 0 0 1 22 16.92z"/>
    </svg>
  </a>

  <!-- EMAIL -->
  <a id="emailBtn" class="icon-btn">
    <svg viewBox="0 0 24 24">
      <rect x="4" y="4" width="16" height="16"/>
      <path d="M22 6l-10 7L2 6"/>
    </svg>
  </a>

</div>

<!-- BUTTONS -->
<div class="center">
  <a id="saveContact" class="btn primary">Save Contact</a>
  <a id="portfolioBtn" class="btn secondary" target="_blank">View Portfolio</a>
</div>

<!-- PROJECTS -->
<div class="projects" id="projects"></div>

<!-- CTA -->
<div class="cta-wrap">
  <div class="cta">
    <a id="ctaBtn">Work With Me</a>
  </div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  
const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
let id = params.get("id");

// fallback to username
if(!id){
  const username = window.location.pathname.replace("/", "").toLowerCase();

  if(username){
    const q = query(collection(db, "clients"), where("username", "==", username));
    const snap = await getDocs(q);

    if(!snap.empty){
      id = snap.docs[0].id;
    }
  }
}

async function loadUser(){

  if(!id) return;

  const ref = doc(db, "clients", id);
  const snap = await getDoc(ref);
  if(!snap.exists()) return;

  const data = snap.data();
  window.currentData = data;
// 🔒 LOCK IF NOT PAID
const isUnlocked = data.status === "paid" || data.status === "completed";
if(!isUnlocked){
  document.body.innerHTML = `
    <div class="lock-premium">

      <div class="lock-card">

        <img src="../logo.png" class="lock-logo">

        <h2 class="lock-title">Card Not Active</h2>
        <p class="lock-sub">This digital card is not yet activated.</p>

        <div class="lock-loader">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <p class="lock-note">Please complete payment to activate.</p>

      </div>

    </div>
  `;
  return;
}
  /* BLOCK DISABLED */
  if (data.status === "disabled") {
    document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>Account Disabled</h2>";
    return;
  }

  /* PROFILE */
  document.getElementById("name").innerText = data.name || "";
  document.getElementById("position").innerText = data.position || "";
  document.getElementById("profileImage").src = data.profile || "";
  
    
  /* COMPANY */
  const companyEl = document.getElementById("company");
  
  if(data.company){
    companyEl.innerText = data.company;
  }else{
    companyEl.style.display = "none";
  }

  /* HERO */
  const heroImg = data.projectImages?.[0] || data.profile || "";

document.getElementById("highlightImage").src = heroImg;

  // slight zoom effect
  document.getElementById("highlightImage").style.transform = "scale(1.05)";
  document.getElementById("highlightImage").style.transition = "0.5s";

  /* ACTIONS */
  if(data.phone){
    document.getElementById("phoneBtn").href = "tel:" + data.phone;
  } else {
    document.getElementById("phoneBtn").style.display = "none";
  }

  if(data.email){
    document.getElementById("emailBtn").href = "mailto:" + data.email;
  } else {
    document.getElementById("emailBtn").style.display = "none";
  }

  /* PORTFOLIO BUTTON */
  if(data.website){
    document.getElementById("portfolioBtn").href = data.website;
  } else {
    document.getElementById("portfolioBtn").style.display = "none";
  }

  /* PROJECTS */
  const container = document.getElementById("projects");
container.innerHTML = "";

if(data.projectImages && data.projectImages.length){

  data.projectImages.forEach(img => {
    const div = document.createElement("div");
    div.className = "project-card";

    const image = document.createElement("img");
    image.src = img;

    // ✅ smooth hover effect
    image.style.boxShadow = "0 10px 25px rgba(0,0,0,0.15)";
    image.style.transition = "0.25s";

    image.onmouseenter = () => image.style.transform = "scale(1.03)";
    image.onmouseleave = () => image.style.transform = "scale(1)";

    // ✅ click to view
    image.onclick = () => window.open(img, "_blank");

    div.appendChild(image);
    container.appendChild(div);
  });

} else {
  container.innerHTML = "<p style='color:#777;font-size:13px;'>No projects yet</p>";
}

const projectContainer = document.getElementById("projects");

function updateActiveCard(){
  const cards = document.querySelectorAll(".project-card");

  let closest = null;
  let closestOffset = Infinity;

  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    const center = window.innerWidth / 2;
    const offset = Math.abs(rect.left + rect.width/2 - center);

    if(offset < closestOffset){
      closestOffset = offset;
      closest = card;
    }
  });

  cards.forEach(c => c.classList.remove("active"));
  if(closest) closest.classList.add("active");
}

projectContainer.addEventListener("scroll", updateActiveCard);

// run once after render
setTimeout(updateActiveCard, 300);

  let autoScroll;

function startAutoScroll(){
  autoScroll = setInterval(()=>{
    const cardWidth = projectContainer.offsetWidth * 0.8 + 14;

    projectContainer.scrollBy({
      left: cardWidth,
      behavior: "smooth"
    });
  }, 3500);
}

function stopAutoScroll(){
  clearInterval(autoScroll);
}

// start after load
setTimeout(startAutoScroll, 2000);

// stop when user interacts
projectContainer.addEventListener("touchstart", stopAutoScroll);
projectContainer.addEventListener("mousedown", stopAutoScroll);
  
  window.downloadVCard = async function(){

  if(!window.currentData){
    alert("No data available");
    return;
  }

  const name = window.currentData.name || "";
  const phone = window.currentData.phone || "";
  const email = window.currentData.email || "";
  const company = window.currentData.company || "";
  const photoUrl = window.currentData.profile || "";

  let photoBase64 = "";

  // 🔥 Convert image to base64
  if(photoUrl){
    try{
      const res = await fetch(photoUrl);
      const blob = await res.blob();

      const reader = new FileReader();
      photoBase64 = await new Promise(resolve => {
        reader.onloadend = () => {
          const base64 = reader.result.split(",")[1];
          resolve(base64);
        };
        reader.readAsDataURL(blob);
      });

    }catch(e){
      console.log("Image conversion failed:", e);
    }
  }

  const vcard = `BEGIN:VCARD
VERSION:3.0
FN:${name}
ORG:${company}
TEL;TYPE=CELL:${phone}
EMAIL:${email}
${photoBase64 ? `PHOTO;ENCODING=b;TYPE=JPEG:${photoBase64}` : ""}
END:VCARD`;

  const blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `${name || "contact"}.vcf`;

  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
};
  
}

loadUser().then(()=>{
  setTimeout(()=>{
    document.getElementById("loader").style.opacity = "0";

    setTimeout(()=>{
      document.getElementById("loader").style.display = "none";
    },500);

  },300);
});

</script>
<!-- LOADER -->
<div id="loader">
  <div class="loader-content">
    <img src="../logo.png" alt="Arkilogix">
    <p>Powered by <strong>Arkilogix</strong></p>
  </div>
</div>
</body>
</html>
