<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" sizes="32x32" href="/logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="/logo.png">
<link rel="apple-touch-icon" sizes="180x180" href="/logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Digital Card</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f5f5f7;
  color:#111;
}

/* ===== CONTAINER ===== */
.wrapper{
  max-width:430px;
  margin:auto;
  background:#fff;
  min-height:100vh;
  padding-bottom:120px;
}

/* ===== HERO ===== */
.hero{
  position:relative;
  height:220px;
  overflow:hidden;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.05);
}

/* 🔥 SMOOTH PREMIUM GRADIENT */
.hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0) 30%,
    rgba(0,0,0,0.4) 65%,
    rgba(0,0,0,0.75) 100%
  );
}

/* ===== PROFILE FLOAT ===== */
.profile{
  position:relative;
  margin-top:-55px;
  display:flex;
  justify-content:center;
}

.profile img{
  width:110px;
  height:110px;
  border-radius:50%;

  object-fit:cover;
  object-position:center;

  border:4px solid #fff;
  background:#fff;

  box-shadow:
    0 10px 25px rgba(0,0,0,0.15),
    0 2px 6px rgba(0,0,0,0.1);

  transition:transform 0.25s ease, box-shadow 0.25s ease;
}


/* ===== ACTIONS ===== */
.actions{
  display:flex;
  justify-content:center;
  gap:14px;
  margin:12px 20px 20px;
}

.icon-btn{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:#fff;border:1px solid #eee;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  transition:.2s;
}

.icon-btn svg{
  width:20px;
  height:20px;
  stroke:#5b6f8f;
  fill:none;
  stroke-width:2;
}

.icon-btn:active{
  transform:scale(0.95);
}

/* ===== BUTTONS ===== */
.center{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin:15px 20px;
}

.btn{
  padding:14px;
  border-radius:30px;
  text-align:center;
  text-decoration:none;
  font-size:14px;
}

.btn.primary{
  background:rgba(17,17,17,0.85);
  backdrop-filter:blur(10px);
  color:#fff;

  border:none;
  border-radius:999px;

  font-weight:500;
  letter-spacing:0.3px;

  box-shadow:
    0 6px 18px rgba(0,0,0,0.15),
    inset 0 1px 0 rgba(255,255,255,0.05);

  transition:
    transform 0.2s ease,
    box-shadow 0.2s ease,
    background 0.3s ease;
    -webkit-backdrop-filter:blur(10px);
}

/* HOVER (desktop) */
.btn.primary:hover{
  transform:translateY(-2px);
  box-shadow:
    0 10px 25px rgba(0,0,0,0.2),
    inset 0 1px 0 rgba(255,255,255,0.08);
}

/* PRESS (mobile feel) */
.btn.primary:active{
  transform:scale(0.96);
  box-shadow:
    0 4px 10px rgba(0,0,0,0.2) inset;
}

.btn.secondary{
  background:#f3f4f6;
  color:#111;
  border:1px solid #e5e7eb;
}

/* ===== PROJECTS SCROLL (ELITE) ===== */
.projects{
  margin-top:25px;
  padding:0 20px;

  display:flex;
  gap:14px;
  overflow-x:auto;

  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;

  scroll-behavior:smooth;
}

/* hide scrollbar */
.projects::-webkit-scrollbar{
  display:none;
}

/* ===== CARD ===== */
.project-card{
  min-width:80%;
  flex-shrink:0;
  scroll-snap-align:center;

  transition:transform .3s ease, opacity .3s ease;
  opacity:0.6;
  transform:scale(0.92);
}

/* ACTIVE CARD */
.project-card.active{
  opacity:1;
  transform:scale(1);
}

.project-card img{
  width:100%;
  height:210px;
  object-fit:cover;
  border-radius:18px;

  box-shadow:0 15px 35px rgba(0,0,0,0.2);
  transition:.25s;
}

.project-card img:active{
  transform:scale(0.97);
}

#loader{
  position:fixed;
  inset:0;
  background:#0f1115;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:opacity .5s ease;
}

.loader-content{
  text-align:center;
  color:#fff;
}

.loader-content img{
  width:60px;
  margin-bottom:10px;
}

.loader-content p{
  font-size:12px;
  letter-spacing:1px;
  color:#aaa;
}
  .lock-premium{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
}

.lock-card{
  text-align:center;
  padding:40px 30px;
  border-radius:20px;
  max-width:320px;
  width:90%;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(16px);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.lock-logo{
  width:50px;
  margin-bottom:15px;
}

.lock-title{
  font-size:20px;
  color:#fff;
}

.lock-sub{
  font-size:13px;
  color:#aaa;
}

.lock-note{
  font-size:12px;
  color:#777;
}

.lock-loader{
  display:flex;
  justify-content:center;
  gap:6px;
  margin-top:15px;
}

.lock-loader span{
  width:6px;
  height:6px;
  background:#fff;
  border-radius:50%;
  animation:pulse 1.2s infinite;
}

.lock-loader span:nth-child(2){animation-delay:.2s;}
.lock-loader span:nth-child(3){animation-delay:.4s;}

@keyframes pulse{
  0%{opacity:.3;}
  50%{opacity:1;}
  100%{opacity:.3;}
}
  /* ===== PROFILE INFO (NEW) ===== */
.profile-info{
  text-align:center;
  margin-top:20px;
  padding:0 20px;
}

.profile-info .name{
  font-size:20px;
  font-weight:600;
  color:#1f2937;
}

.profile-info .position{
  font-size:13px;
  color:#6b7280;
}

.profile-info .company{
  font-size:12px;
  color:#9ca3af;
}
  .projects-header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-top:25px;
  margin-bottom:10px;
}

.projects-header p{
  font-size:10px;
  letter-spacing:1.5px;
  color:#777;
}

.divider{
  height:1px;
  width:70px;
  background:rgba(0,0,0,0.15);
}
  /* ===== EDGE FADE WRAPPER ===== */
.projects-wrapper{
  position:relative;
}

/* LEFT FADE */
.projects-wrapper::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:40px;

  background:linear-gradient(
    to right,
    #fff 0%,
    rgba(255,255,255,0.9) 40%,
    rgba(255,255,255,0) 100%
  );

  z-index:2;
  pointer-events:none;
}

/* RIGHT FADE */
.projects-wrapper::after{
  content:"";
  position:absolute;
  right:0;
  top:0;
  bottom:0;
  width:40px;

  background:linear-gradient(
    to left,
    #fff 0%,
    rgba(255,255,255,0.9) 40%,
    rgba(255,255,255,0) 100%
  );

  z-index:2;
  pointer-events:none;
}
  /* ===== FOOTER BRAND ===== */
.footer-brand{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  margin:40px 0 20px;

  text-decoration:none;
  opacity:0.7;

  transition:0.25s ease;
}

.footer-brand img{
  width:36px;
  margin-bottom:6px;
  opacity:0.9;
}

.footer-brand span{
  font-size:11px;
  letter-spacing:1px;
  color:#6b7280;
}

/* HOVER */
.footer-brand:hover{
  opacity:1;
  transform:translateY(-2px);
}
  /* ===== SERVICES ===== */
.services{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  margin:10px 20px 0;
}

.services span{
  font-size:11px;
  padding:7px 14px;
  border-radius:999px;
  background:linear-gradient(135deg, #f3f4f6, #e5e7eb);
  color:#1f2937;
  border:1px solid rgba(0,0,0,0.05);
  letter-spacing:0.3px;
  box-shadow:
    0 4px 10px rgba(0,0,0,0.05),
    inset 0 1px 0 rgba(255,255,255,0.6);
  transition:all 0.2s ease;
}
  .services span:active{
  transform:scale(0.95);
  box-shadow:
    inset 0 2px 6px rgba(0,0,0,0.1);
    opacity:0;
  transform:translateY(5px);
  animation:fadeUp 0.4s ease forwards;
}
  .services span:nth-child(1){animation-delay:0.05s;}
.services span:nth-child(2){animation-delay:0.1s;}
.services span:nth-child(3){animation-delay:0.15s;}
.services span:nth-child(4){animation-delay:0.2s;}
.services span:nth-child(5){animation-delay:0.25s;}
.services span:nth-child(6){animation-delay:0.3s;}

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}
/* ===== SERVICES HEADER ===== */
.services-header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;

  margin-top:15px;
  margin-bottom:8px;
}

.services-header p{
  font-size:10px;
  letter-spacing:1.5px;
  color:#777;
}
  .section-divider{
  height:1px;
  width:60%;
  margin:12px auto;

  background:linear-gradient(
    to right,
    transparent,
    rgba(0,0,0,0.15),
    transparent
  );
}
</style>
</head>

<body>

<div class="wrapper">

<!-- HERO -->

  <!-- GRADIENT OVERLAY -->

</div>

<div class="actions">

</div>

<!-- BUTTONS -->
<div class="center">

  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>

  Save Contact
</a>
  <a id="portfolioBtn" class="btn secondary" target="_blank">View Portfolio</a>
</div>

<!-- PROJECTS HEADER -->
<div class="projects-header" id="projectsHeader">
  <div class="divider"></div>
  <p>HIGHLIGHT PROJECTS</p>
  <div class="divider"></div>
</div>

<!-- PROJECTS -->
<div class="projects-wrapper">
  <div class="projects" id="projects"></div>
</div>

  <!-- FOOTER -->
<a href="https://www.arkilogix.com" target="_blank" class="footer-brand">
  <img src="../logo.png" alt="Arkilogix">
  <span>Powered By Arkilogix</span>
</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  
const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
let id = params.get("id");

// fallback to username
if(!id){
  const username = window.location.pathname.replace("/", "").toLowerCase();

  if(username){
    const q = query(collection(db, "clients"), where("username", "==", username));
    const snap = await getDocs(q);

    if(!snap.empty){
      id = snap.docs[0].id;
    }
  }
}

async function loadUser(){

  if(!id) return;

  const ref = doc(db, "clients", id);
  const snap = await getDoc(ref);
  if(!snap.exists()) return;

  const data = snap.data();
    // 🔥 TRACK VIEW
  try{
    await updateDoc(ref, {
      "stats.views": (data?.stats?.views || 0) + 1
    });
  }catch(e){
    console.log("View tracking failed", e);
  }
  window.currentData = data;
// 🔒 LOCK IF NOT PAID
const isUnlocked = data.status === "paid" || data.status === "completed";
if(!isUnlocked){
  document.body.innerHTML = `
    <div class="lock-premium">

      <div class="lock-card">

        <img src="../logo.png" class="lock-logo">

        <h2 class="lock-title">Card Not Active</h2>
        <p class="lock-sub">This digital card is not yet activated.</p>

        <div class="lock-loader">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <p class="lock-note">Please complete payment to activate.</p>

      </div>

    </div>
  `;
  return;
}
  /* BLOCK DISABLED */
  if (data.status === "disabled") {
    document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>Account Disabled</h2>";
    return;
  }

  /* PROFILE */
  document.getElementById("name").innerText = data.name || "";
  document.getElementById("position").innerText = data.position || "";
  document.getElementById("profileImage").src = data.profile || "";
  
    
  /* COMPANY */
  const companyEl = document.getElementById("company");
  
  if(data.company){
    companyEl.innerText = data.company;
  }else{
    companyEl.style.display = "none";
  }

  /* SERVICES */
const servicesContainer = document.getElementById("services");
const servicesHeader = document.querySelector(".services-header");

if(data.services && data.services.length){

  servicesContainer.innerHTML = "";

  data.services.slice(0,6).forEach(s => {
    const span = document.createElement("span");
    span.innerText = s;
    servicesContainer.appendChild(span);
  });

} else {
  servicesContainer.style.display = "none";
  if(servicesHeader) servicesHeader.style.display = "none";
}
  

  // slight zoom effect
  document.getElementById("highlightImage").style.transform = "scale(1.05)";
  document.getElementById("highlightImage").style.transition = "0.5s";

  /* ACTIONS */
  
  /* PHONE */
  if(data.phone){
    document.getElementById("phoneBtn").href = "tel:" + data.phone;
  } else {
    document.getElementById("phoneBtn").style.display = "none";
  }
  
  /* EMAIL */
  if(data.email){
    document.getElementById("emailBtn").href = "mailto:" + data.email;
  } else {
    document.getElementById("emailBtn").style.display = "none";
  }

  /* INSTAGRAM */
if(data.instagram){
  if(data.instagram){
  let url = data.instagram;

  if(!url.startsWith("http")){
    url = "https://" + url;
  }

  document.getElementById("instagramBtn").href = url;
} else {
  document.getElementById("instagramBtn").style.display = "none";
}
} else {
  document.getElementById("instagramBtn").style.display = "none";
}

/* FACEBOOK */
if(data.facebook){
  if(data.facebook){
  let url = data.facebook;

  if(!url.startsWith("http")){
    url = "https://" + url;
  }

  document.getElementById("facebookBtn").href = url;
} else {
  document.getElementById("facebookBtn").style.display = "none";
}
} else {
  document.getElementById("facebookBtn").style.display = "none";
}
  
  /* PORTFOLIO BUTTON */
    if(data.website){
      let url = data.website;
    
      if(!url.startsWith("http")){
        url = "https://" + url;
      }
    
      document.getElementById("portfolioBtn").href = url;
    } else {
      document.getElementById("portfolioBtn").style.display = "none";
    }

 
/* PROJECTS */
const container = document.getElementById("projects");
const projectContainer = container;
container.innerHTML = "";

// 🔥 normalize images
let images = [];

if(Array.isArray(data.projectImages)){
  images = data.projectImages.filter(img => img);
}else if(typeof data.projectImages === "string"){
  images = [data.projectImages];
}

  // ✅ ADD HERO HERE (CORRECT PLACE)
const heroImg = images[0] || data.profile || "";
document.getElementById("highlightImage").src = heroImg;

  
  // fallback to always show 3
if(images.length === 1){
  images.push(images[0], images[0]);
}
if(images.length === 2){
  images.push(images[0]);
}
  
// ❌ NO PROJECTS
if(images.length === 0){
  document.getElementById("projectsHeader").style.display = "none";
  document.querySelector(".projects-wrapper").style.display = "none";
}

// ✅ HAS PROJECTS
else{

  images.slice(0,3).forEach(img => {
    const div = document.createElement("div");
    div.className = "project-card";

    const image = document.createElement("img");
    image.src = img;

    image.onclick = () => window.open(img, "_blank");

    div.appendChild(image);
    container.appendChild(div);
  });

}

/* ACTIVE CARD LOGIC */
function updateActiveCard(){
  const cards = document.querySelectorAll(".project-card");

  let closest = null;
  let closestOffset = Infinity;

  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    const center = window.innerWidth / 2;
    const offset = Math.abs(rect.left + rect.width/2 - center);

    if(offset < closestOffset){
      closestOffset = offset;
      closest = card;
    }
  });

  cards.forEach(c => c.classList.remove("active"));
  if(closest) closest.classList.add("active");
}

if(images.length){
  projectContainer.addEventListener("scroll", updateActiveCard);
}

setTimeout(updateActiveCard, 300);

    
  window.downloadVCard = async function(){

  if(!window.currentData){
    alert("No data available");
    return;
  }

  const name = window.currentData.name || "";
  const phone = window.currentData.phone || "";
  const email = window.currentData.email || "";
  const company = window.currentData.company || "";
  const photoUrl = window.currentData.profile || "";

  let photoBase64 = "";

  // 🔥 Convert image to base64
  if(photoUrl){
    try{
      const res = await fetch(photoUrl);
      const blob = await res.blob();

      const reader = new FileReader();
      photoBase64 = await new Promise(resolve => {
        reader.onloadend = () => {
          const base64 = reader.result.split(",")[1];
          resolve(base64);
        };
        reader.readAsDataURL(blob);
      });

    }catch(e){
      console.log("Image conversion failed:", e);
    }
  }

const fullName = name.split(" ");
const firstName = fullName[0] || "";
const lastName = fullName.slice(1).join(" ") || "";

const vcard = `BEGIN:VCARD
VERSION:3.0
N:${lastName};${firstName};;;
FN:${name}
ORG:${company}
TEL;TYPE=CELL:${phone}
EMAIL:${email}
${photoBase64 ? `PHOTO;ENCODING=b;TYPE=JPEG:${photoBase64}` : ""}
END:VCARD`;

  const blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `${name || "contact"}.vcf`;

  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
};
  document.getElementById("saveContact").onclick = downloadVCard;

window.addEventListener("scroll", () => {
  const overlay = document.querySelector(".hero-overlay");
  if(!overlay) return;
  const scrollY = window.scrollY;
  const opacity = Math.min(0.75 + scrollY * 0.001, 0.9);
  overlay.style.background = `
    linear-gradient(
      to bottom,
      rgba(0,0,0,0) 30%,
      rgba(0,0,0,0.4) 65%,
      rgba(0,0,0,${opacity}) 100%
    )
  `;
});

}

loadUser().then(()=>{
  setTimeout(()=>{
    document.getElementById("loader").style.opacity = "0";
