<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Digital Card</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f5f5f7;
  color:#111;
}

/* ===== CONTAINER ===== */
.wrapper{
  max-width:430px;
  margin:auto;
  background:#fff;
  min-height:100vh;
  padding-bottom:120px;
}

/* ===== HERO ===== */
.hero{
  position:relative;
  height:260px;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:16px;
  background:linear-gradient(transparent, rgba(0,0,0,0.6));
  color:#fff;
}

/* ===== PROFILE ===== */
.profile{
  text-align:center;
  margin-top:-60px;
}

.profile img{
  width:110px;
  height:110px;
  border-radius:50%;
  border:5px solid #fff;
  object-fit:cover;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.name{font-size:20px;font-weight:600;margin-top:10px;}
.position{font-size:13px;color:#666;}

/* ===== ACTIONS ===== */
.actions{
  display:flex;
  justify-content:center;
  gap:14px;
  margin:20px;
}

.icon-btn{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:#fff;border:1px solid #eee;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  transition:.2s;
}

.icon-btn svg{
  width:20px;
  height:20px;
  stroke:#5b6f8f;
  fill:none;
  stroke-width:2;
}

.icon-btn:active{
  transform:scale(0.95);
}

/* ===== BUTTONS ===== */
.center{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin:15px 20px;
}

.btn{
  padding:14px;
  border-radius:30px;
  text-align:center;
  text-decoration:none;
  font-size:14px;
}

.btn.primary{
  background:#111;
  color:#fff;
}

.btn.secondary{
  background:#f3f4f6;
  color:#111;
  border:1px solid #e5e7eb;
}

/* ===== PROJECTS ===== */
.projects{
  margin-top:25px;
  padding:0 20px;
}

.project-card{
  margin-bottom:16px;
}

.project-card img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:16px;
  cursor:pointer;
}

/* ===== CTA ===== */
.cta-wrap{
  position:fixed;
  bottom:0;
  width:100%;
  max-width:430px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(12px);
  padding:12px;
}

.cta a{
  display:block;
  background:#111;
  color:#fff;
  padding:16px;
  border-radius:50px;
  text-align:center;
  text-decoration:none;
  font-weight:600;
}

</style>
</head>

<body>

<div class="wrapper">

<!-- HERO -->
<div class="hero">
  <img id="highlightImage">
  <div class="hero-overlay">
    <div id="highlightTitle"></div>
    <div id="company"></div>
  </div>
</div>

<!-- PROFILE -->
<div class="profile">
  <img id="profileImage">
  <div id="name" class="name"></div>
  <div id="position" class="position"></div>
</div>

<!-- ACTIONS -->
<div class="actions">

  <!-- PHONE -->
  <a id="phoneBtn" class="icon-btn">
    <svg viewBox="0 0 24 24">
      <path d="M22 16.92V21a2 2 0 0 1-2.18 2
      19.79 19.79 0 0 1-8.63-3.07
      19.5 19.5 0 0 1-6-6
      19.79 19.79 0 0 1-3.07-8.67
      A2 2 0 0 1 3 2h4.09
      a2 2 0 0 1 2 1.72
      c.12.9.37 1.78.73 2.6
      a2 2 0 0 1-.45 2.11L8.09 9.91
      a16 16 0 0 0 6 6l1.48-1.28
      a2 2 0 0 1 2.11-.45
      c.82.36 1.7.61 2.6.73
      A2 2 0 0 1 22 16.92z"/>
    </svg>
  </a>

  <!-- EMAIL -->
  <a id="emailBtn" class="icon-btn">
    <svg viewBox="0 0 24 24">
      <rect x="4" y="4" width="16" height="16"/>
      <path d="M22 6l-10 7L2 6"/>
    </svg>
  </a>

</div>

<!-- BUTTONS -->
<div class="center">
  <a id="saveContact" class="btn primary">Save Contact</a>
  <a id="portfolioBtn" class="btn secondary" target="_blank">View Portfolio</a>
</div>

<!-- PROJECTS -->
<div class="projects" id="projects"></div>

<!-- CTA -->
<div class="cta-wrap">
  <div class="cta">
    <a id="ctaBtn">Work With Me</a>
  </div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function loadUser(){

  if(!id) return;

  const snap = await getDoc(doc(db, "clients", id));
  if(!snap.exists()) return;

  const data = snap.data();

  /* BLOCK DISABLED */
  if (data.status === "disabled") {
    document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>Account Disabled</h2>";
    return;
  }

  /* PROFILE */
  document.getElementById("name").innerText = data.name || "";
  document.getElementById("position").innerText = data.position || "";
  document.getElementById("profileImage").src = data.profile || "";

  /* HERO */
  document.getElementById("highlightImage").src =
    data.projectImages?.[0] || data.profile || "";

  document.getElementById("highlightTitle").innerText = data.position || "";
  document.getElementById("company").innerText = data.company || "";

  /* ACTIONS */
  if(data.phone){
    document.getElementById("phoneBtn").href = "tel:" + data.phone;
  } else {
    document.getElementById("phoneBtn").style.display = "none";
  }

  if(data.email){
    document.getElementById("emailBtn").href = "mailto:" + data.email;
  } else {
    document.getElementById("emailBtn").style.display = "none";
  }

  /* PORTFOLIO BUTTON */
  if(data.website){
    document.getElementById("portfolioBtn").href = data.website;
  } else {
    document.getElementById("portfolioBtn").style.display = "none";
  }

  /* PROJECTS */
  const container = document.getElementById("projects");
  container.innerHTML = "";

  (data.projectImages || []).forEach(img => {
    const div = document.createElement("div");
    div.className = "project-card";

    div.innerHTML = `<img src="${img}" onclick="window.open('${img}')">`;

    container.appendChild(div);
  });

}

loadUser();

</script>

</body>
</html>
