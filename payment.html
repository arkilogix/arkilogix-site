<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Activate Your NFC Card</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter', sans-serif;
  background:#f7f7f7;
  margin:0;
  padding:20px;
}

.container{
  max-width:420px;
  margin:auto;
  background:#fff;
  padding:24px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

h1{
  font-size:20px;
  margin-bottom:5px;
}

.sub{
  font-size:13px;
  color:#777;
  margin-bottom:20px;
}

.section{
  margin-bottom:20px;
}

.label{
  font-size:12px;
  color:#999;
  margin-bottom:5px;
}

.value{
  font-size:14px;
  font-weight:500;
}

.payment-box{
  border:1px solid #eee;
  border-radius:12px;
  padding:15px;
  margin-bottom:15px;
}

.qr{
  width:100%;
  border-radius:10px;
  margin:10px 0;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:999px;
  background:#000;
  color:#fff;
  font-size:14px;
  cursor:pointer;
}

.btn.secondary{
  background:#eee;
  color:#000;
}

.upload{
  margin-top:10px;
}

.status{
  font-size:12px;
  color:#666;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

  <h1>Activate Your NFC Card</h1>
  <p class="sub">Complete your payment to start production</p>

  <!-- ORDER SUMMARY -->
  <div class="section">
    <div class="label">Plan</div>
    <div class="value" id="plan">Loading...</div>

    <div class="label">Total</div>
    <div class="value" id="price">₱0</div>
  </div>

  <!-- GCASH -->
  <div class="payment-box">
    <div class="label">GCash</div>

    <!-- Replace with your real QR -->
    <img src="gcash-qr.png" class="qr">

    <div class="value">0917-XXX-XXXX</div>
    <div class="value">Your Name</div>

    <input type="file" id="proof" class="upload">

    <button class="btn" onclick="submitPayment()">Confirm Payment</button>

    <div class="status" id="status"></div>
  </div>

  <!-- BANK -->
  <div class="payment-box">
    <div class="label">Bank Transfer</div>

    <div class="value">BPI</div>
    <div class="value">1234 5678 90</div>
    <div class="value">Your Name</div>
  </div>

</div>

<script>

// GET CLIENT ID
const params = new URLSearchParams(window.location.search);
const clientId = params.get("clientId");

// TEMP DATA (replace with Firebase later)
document.getElementById("plan").innerText = "Pro";
document.getElementById("price").innerText = "₱1,199";

// SUBMIT PAYMENT
function submitPayment(){

  const file = document.getElementById("proof").files[0];

  if(!file){
    alert("Please upload payment proof");
    return;
  }

  document.getElementById("status").innerText = "Uploading...";

  // 🔥 TEMP SIMULATION
  setTimeout(() => {
    document.getElementById("status").innerText = 
      "Payment submitted. We’ll verify within 24 hours.";

    // 👉 Redirect to signup
    setTimeout(() => {
      window.location.href = "signup.html?clientId=" + clientId;
    }, 1500);

  }, 1500);
}

</script>

</body>
</html>
