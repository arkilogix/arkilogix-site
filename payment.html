<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Activate Your NFC Card</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter', sans-serif;
  background:#f7f7f7;
  margin:0;
  padding:20px;
}

.container{
  max-width:420px;
  margin:auto;
  background:#fff;
  padding:24px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

h1{
  font-size:20px;
  margin-bottom:5px;
}

.sub{
  font-size:13px;
  color:#777;
  margin-bottom:20px;
}

.section{
  margin-bottom:20px;
}

.label{
  font-size:12px;
  color:#999;
  margin-top:10px;
}

.value{
  font-size:14px;
  font-weight:500;
}

.payment-box{
  border:1px solid #eee;
  border-radius:12px;
  padding:15px;
  margin-bottom:15px;
}

.qr{
  width:100%;
  border-radius:10px;
  margin:10px 0;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:999px;
  background:#000;
  color:#fff;
  font-size:14px;
  cursor:pointer;
}

.upload{
  margin-top:10px;
}

.status{
  font-size:12px;
  color:#666;
  margin-top:10px;
}

.note{
  font-size:11px;
  color:#888;
  margin-top:10px;
  line-height:1.4;
}
</style>
</head>

<body>

<div class="container">

  <h1>Activate Your NFC Card</h1>
  <p class="sub">Complete your payment to start production</p>

  <!-- ORDER SUMMARY -->
  <div class="section">

    <div class="label">Plan</div>
    <div class="value" id="plan">Loading...</div>

    <div class="label">Card Type</div>
    <div class="value" id="card">Loading...</div>

    <div class="label">Total</div>
    <div class="value" id="price">₱0</div>

  </div>

  <!-- GCASH -->
  <div class="payment-box">

    <div class="label">GCash</div>

    <!-- 🔥 Replace with your real QR -->
    <img src="gcash-qr.png" class="qr">

    <div class="value">0917-XXX-XXXX</div>
    <div class="value">Your Name</div>

    <input type="file" id="proof" class="upload">

    <button class="btn" onclick="submitPayment()">Confirm Payment</button>

    <div class="status" id="status"></div>

    <div class="note">
      We’ll verify your payment within 24 hours.<br>
      Your NFC card will be processed after confirmation.
    </div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 Get clientId
const params = new URLSearchParams(window.location.search);
const clientId = params.get("clientId");

if(!clientId){
  alert("Invalid access");
  window.location.href = "index.html";
}

// 🔥 Load Data
async function loadData(){

  const docRef = doc(db, "clients", clientId);
  const snap = await getDoc(docRef);

  if(!snap.exists()){
    alert("Order not found");
    return;
  }

  const data = snap.data();

  document.getElementById("plan").innerText = data.plan?.toUpperCase() || "-";
  document.getElementById("card").innerText = data.card?.toUpperCase() || "-";
  document.getElementById("price").innerText = "₱" + (data.price || 0).toLocaleString();
}

loadData();


// 🔥 CLOUDINARY UPLOAD
async function uploadProof(file){

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "nfc_upload");
  formData.append("folder", `nfc-clients/${clientId}`);
  formData.append("public_id", "payment-proof");

  const res = await fetch("https://api.cloudinary.com/v1_1/dnlzwtkhs/image/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  return data.secure_url;
}


// 🔥 SUBMIT PAYMENT
window.submitPayment = async function(){

  const file = document.getElementById("proof").files[0];

  if(!file){
    alert("Please upload payment proof");
    return;
  }

  const status = document.getElementById("status");
  status.innerText = "Uploading proof...";

  try{

    const url = await uploadProof(file);

    status.innerText = "Saving payment...";

    // 🔥 SAVE TO FIREBASE
    await updateDoc(doc(db, "clients", clientId), {
      paymentStatus: "submitted",
      paymentProof: url
    });

    status.innerText = "Payment submitted! Redirecting...";

    setTimeout(() => {
      window.location.href = "signup.html?clientId=" + clientId;
    }, 1500);

  }catch(err){
    console.error(err);
    alert("Upload failed. Try again.");
  }
}

</script>

</body>
</html>
