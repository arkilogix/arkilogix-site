<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Your Payment</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
body{
  font-family:'Inter', sans-serif;
  background:
    radial-gradient(circle at 20% 0%, rgba(201,169,110,0.15), transparent 40%),
    radial-gradient(circle at 80% 100%, rgba(59,130,246,0.12), transparent 40%),
    linear-gradient(135deg,#020617,#000);
  margin:0;
  padding:20px;
  color:#fff;
}

/* ===== CONTAINER ===== */
.container{
  max-width:420px;
  margin:auto;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(20px);
  padding:24px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.06);

  box-shadow:
    0 20px 60px rgba(0,0,0,0.8),
    inset 0 1px 0 rgba(255,255,255,0.05);
}

/* TEXT */
h1{font-size:20px;margin-bottom:5px;color:#fff;}
.sub{font-size:13px;color:#94a3b8;margin-bottom:20px;}

/* SUMMARY */
.summary{
  background:rgba(255,255,255,0.03);
  padding:14px;
  border-radius:12px;
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,0.06);
}

.row{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-bottom:6px;
}

.total{
  font-size:16px;
  font-weight:600;
  margin-top:10px;
  color:#C9A96E;
}

/* ===== TABS ===== */
.tabs{
  display:flex;
  border-radius:999px;
  background:rgba(255,255,255,0.05);
  overflow:hidden;
  margin-bottom:15px;
}

.tabs div{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:13px;
  cursor:pointer;
  transition:.2s;
}

.tabs .active{
  background:linear-gradient(135deg,#C9A96E,#e6c88f);
  color:#111;
}

/* QR */
.qr{
  width:100%;
  border-radius:12px;
  margin:10px 0;
  border:1px solid rgba(255,255,255,0.05);
}

/* INPUT */
input[type="file"]{
  width:100%;
  margin-bottom:12px;
  color:#cbd5e1;
}

/* ===== BUTTON ===== */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:999px;
  font-size:14px;
  cursor:pointer;

  background:linear-gradient(135deg,#C9A96E,#e6c88f);
  color:#111;

  box-shadow:0 6px 20px rgba(201,169,110,0.25);
  transition:.2s;
}

.btn:hover{
  transform:translateY(-1px);
  box-shadow:0 10px 25px rgba(201,169,110,0.35);
}

/* STATUS */
.status{
  font-size:12px;
  color:#94a3b8;
  margin-top:10px;
}

/* SUCCESS */
.success{
  display:none;
  text-align:center;
}

.success-box{
  background:rgba(16,185,129,0.1);
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  border:1px solid rgba(16,185,129,0.3);
}

.note{
  font-size:12px;
  color:#94a3b8;
}

/* ===== LOADER ===== */
.app-loader{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 20%, rgba(201,169,110,0.15), transparent 50%),
    linear-gradient(135deg,#020617,#000);

  display:flex;
  align-items:center;
  justify-content:center;
  z-index:99999;
  transition:opacity .4s ease;
}

.loader-logo{
  width:70px;
  animation:pulseGlow 1.8s infinite ease-in-out;
}

.loader-text{
  margin-top:10px;
  font-size:12px;
  color:#94a3b8;
  letter-spacing:2px;
  text-align:center;
  width:100%;
}

@keyframes pulseGlow{
  0%{transform:scale(1);opacity:.7;}
  50%{transform:scale(1.1);opacity:1;}
  100%{transform:scale(1);opacity:.7;}
}

.app-loader.hide{
  opacity:0;
  pointer-events:none;
}
.btn:active{
  transform:scale(0.97);
}
  .btn:hover{
  filter:brightness(1.05);
}
.spinner{
  width:14px;
  height:14px;
  border:2px solid rgba(255,255,255,0.3);
  border-top:2px solid #fff;
  border-radius:50%;
  display:inline-block;
  margin-right:6px;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%) translateY(20px);

  background:rgba(0,0,0,0.8);
  color:#fff;
  padding:12px 18px;
  border-radius:12px;

  opacity:0;
  transition:.3s;
  z-index:99999;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
.fade{
  animation:fadeIn .3s ease;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</head>

<body>
  
<div id="appLoader" class="app-loader">
  <div class="loader-content">
    <img src="/logo.png" class="loader-logo">
    <p class="loader-text">ArkiLogix</p>
  </div>
</div>
  
<div class="container">

<h1>Complete Your Payment</h1>
<p class="sub">Activate your NFC card</p>

<!-- SUMMARY -->
<div class="summary">
  <div class="row"><span>Plan</span><strong id="plan"></strong></div>
  <div class="row"><span>Card</span><strong id="card"></strong></div>
  <div class="row total"><span>Total</span><strong id="price"></strong></div>
</div>

<!-- PAYMENT -->
<div id="paymentBox">

  <div class="tabs">
    <div class="active" onclick="switchMethod('gcash',this)">GCash</div>
    <div onclick="switchMethod('bpi',this)">BPI</div>
  </div>

  <img id="qrImage" src="gcash-qr.jpeg" class="qr">

  <div style="font-size:13px;text-align:center;margin-bottom:10px;">
    Upload proof after payment
  </div>

  <input type="file" id="proof">

  <button class="btn" onclick="submitPayment()">I've Paid</button>

  <div class="status" id="status"></div>

</div>

<!-- SUCCESS -->
<div id="successBox" class="success">
  <div class="success-box">
    <strong>✅ Payment Submitted</strong><br>
    <span style="font-size:13px;">We are verifying your payment</span>
  </div>

  <div class="note">
    Status: Pending Verification<br>
    ETA: Within 24 hours
  </div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 EMAILJS INIT
(function(){
  emailjs.init("Wp1sOcLJH-dg_dkLs");
})();

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// GET CLIENT ID
const params = new URLSearchParams(window.location.search);
const clientId = params.get("clientId");
  if(!clientId){
  showToast("Invalid access. No client ID.");
  window.location.href = "/";
}

// LOAD ORDER DATA
async function loadData(){
  const snap = await getDoc(doc(db,"clients",clientId));
  if(!snap.exists()){
    showToast("Order not found.");
    hideLoader();
    return;
  }
  const data = snap.data();
  document.getElementById("plan").innerText = data.plan || "-";
  document.getElementById("card").innerText = data.card || "-";
  document.getElementById("price").innerText =
    "₱" + (data.price || 0).toLocaleString();
hideLoader();
}
loadData();

// SWITCH PAYMENT METHOD
window.switchMethod = function(method,el){
  document.querySelectorAll(".tabs div").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  document.getElementById("qrImage").src =
    method === "gcash" ? "gcash-qr.jpeg" : "bpi-qr.png";
}

// CLOUDINARY UPLOAD
async function uploadProof(file){

  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset","nfc_upload");
  fd.append("folder",`nfc-clients/${clientId}`);

  const res = await fetch("https://api.cloudinary.com/v1_1/dnlzwtkhs/image/upload",{
    method:"POST",
    body:fd
  });

  if(!res.ok){
    throw new Error("Upload failed");
  }

  const data = await res.json();

  if(!data.secure_url){
    throw new Error("Invalid upload response");
  }

  return data.secure_url;
}

// 🔥 SEND EMAILS (ADMIN + CLIENT)
async function sendEmails(data){
  try{

    // ADMIN EMAIL
    await emailjs.send(
      "service_gxckvp8",
      "template_dbofkzz",
      {
        name: data.name,
        email: data.email,
        phone: data.phone,
        plan: data.plan,
        card: data.card,
        price: data.price,
        proof: data.proof,
        clientId: data.clientId
      }
    );

    // CLIENT EMAIL
    await emailjs.send(
      "service_gxckvp8",
      "template_07td6mf",
      {
        name: data.name,
        email: data.email,
        plan: data.plan,
        card: data.card,
        price: data.price
      }
    );

  }catch(err){
    console.log("Email error:", err);
  }
}

// SUBMIT PAYMENT
window.submitPayment = async function(){

  const file = document.getElementById("proof").files[0];
  if(!file) return showToast("Upload proof first");

  const status = document.getElementById("status");
  const btn = document.querySelector(".btn");
  if(btn.disabled) return;
  
  btn.disabled = true;
  btn.innerHTML = "<span class='spinner'></span> Processing...";

  try{

    status.innerText = "Uploading proof...";
    const proofUrl = await uploadProof(file);

    status.innerText = "Saving...";

    const snap = await getDoc(doc(db,"clients",clientId));
    const data = snap.data();

    await updateDoc(doc(db,"clients",clientId),{
      paymentProof: proofUrl,
      status: "pending_verification",
      paidAt: new Date()
    });

    // SEND EMAILS
    await sendEmails({
      name: data.name,
      email: data.email,
      phone: data.phone,
      plan: data.plan,
      card: data.card,
      price: "₱" + data.price,
      proof: proofUrl,
      clientId: clientId
    });
    
    showToast("Payment submitted successfully!");

    // SUCCESS UI
    const paymentBox = document.getElementById("paymentBox");
    const successBox = document.getElementById("successBox");
    
    paymentBox.style.display="none";
    
    successBox.style.display="block";
    successBox.classList.add("fade");
    setTimeout(() => {
      window.location.href = `/auth/signup.html?clientId=${clientId}`;
    }, 1500);

  }catch(e){
    showToast("Something went wrong");
    btn.disabled = false;
    btn.innerText = "I've Paid";
  }

}
  
function hideLoader(){
  const loader = document.getElementById("appLoader");
  if(!loader) return;

  setTimeout(()=>{
    loader.classList.add("hide");
    setTimeout(()=> loader.remove(), 400);
  },300);
}
  function showToast(msg){

  const t = document.getElementById("toast");
  if(!t) return;

  t.innerText = msg;
  t.classList.add("show");

  setTimeout(()=>{
    t.classList.remove("show");
  },2500);
}
</script>
<div id="toast" class="toast"></div>
  
</body>
</html>
