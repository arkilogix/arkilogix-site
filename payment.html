<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Your Payment</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
body{
  font-family:'Inter', sans-serif;
  background:#f6f6f6;
  margin:0;
  padding:20px;
}
.container{
  max-width:420px;
  margin:auto;
  background:#fff;
  padding:24px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
}
h1{font-size:20px;margin-bottom:5px;}
.sub{font-size:13px;color:#777;margin-bottom:20px;}
.summary{background:#fafafa;padding:14px;border-radius:12px;margin-bottom:20px;}
.row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
.total{font-size:16px;font-weight:600;margin-top:10px;}

.tabs{display:flex;border-radius:999px;background:#eee;overflow:hidden;margin-bottom:15px;}
.tabs div{flex:1;text-align:center;padding:10px;font-size:13px;cursor:pointer;}
.tabs .active{background:#000;color:#fff;}

.qr{width:100%;border-radius:12px;margin:10px 0;}

.btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:999px;
  background:#000;
  color:#fff;
  font-size:14px;
  cursor:pointer;
}

.status{font-size:12px;color:#666;margin-top:10px;}

.success{display:none;text-align:center;}
.success-box{background:#ecfdf5;padding:15px;border-radius:12px;margin-bottom:10px;}
.note{font-size:12px;color:#666;}
</style>
</head>

<body>

<div class="container">

<h1>Complete Your Payment</h1>
<p class="sub">Activate your NFC card</p>

<!-- SUMMARY -->
<div class="summary">
  <div class="row"><span>Plan</span><strong id="plan"></strong></div>
  <div class="row"><span>Card</span><strong id="card"></strong></div>
  <div class="row total"><span>Total</span><strong id="price"></strong></div>
</div>

<!-- PAYMENT -->
<div id="paymentBox">

  <div class="tabs">
    <div class="active" onclick="switchMethod('gcash',this)">GCash</div>
    <div onclick="switchMethod('bpi',this)">BPI</div>
  </div>

  <img id="qrImage" src="gcash-qr.jpeg" class="qr">

  <div style="font-size:13px;text-align:center;margin-bottom:10px;">
    Upload proof after payment
  </div>

  <input type="file" id="proof">

  <button class="btn" onclick="submitPayment()">I've Paid</button>

  <div class="status" id="status"></div>

</div>

<!-- SUCCESS -->
<div id="successBox" class="success">
  <div class="success-box">
    <strong>✅ Payment Submitted</strong><br>
    <span style="font-size:13px;">We are verifying your payment</span>
  </div>

  <div class="note">
    Status: Pending Verification<br>
    ETA: Within 24 hours
  </div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 EMAILJS INIT
(function(){
  emailjs.init("Wp1sOcLJH-dg_dkLs");
})();

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// GET CLIENT ID
const params = new URLSearchParams(window.location.search);
const clientId = params.get("clientId");

// LOAD ORDER DATA
async function loadData(){
  const snap = await getDoc(doc(db,"clients",clientId));
  const data = snap.data();

  document.getElementById("plan").innerText = data.plan || "-";
  document.getElementById("card").innerText = data.card || "-";
  document.getElementById("price").innerText = "₱" + (data.price || 0).toLocaleString();
}
loadData();

// SWITCH PAYMENT METHOD
window.switchMethod = function(method,el){
  document.querySelectorAll(".tabs div").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  document.getElementById("qrImage").src =
    method === "gcash" ? "gcash-qr.jpeg" : "bpi-qr.png";
}

// CLOUDINARY UPLOAD
async function uploadProof(file){
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset","nfc_upload");
  fd.append("folder",`nfc-clients/${clientId}`);

  const res = await fetch("https://api.cloudinary.com/v1_1/dnlzwtkhs/image/upload",{
    method:"POST",
    body:fd
  });

  const data = await res.json();
  return data.secure_url;
}

// 🔥 SEND EMAILS (ADMIN + CLIENT)
async function sendEmails(data){
  try{

    // ADMIN EMAIL
    await emailjs.send(
      "service_gxckvp8",
      "template_dbofkzz",
      {
        name: data.name,
        email: data.email,
        phone: data.phone,
        plan: data.plan,
        card: data.card,
        price: data.price,
        proof: data.proof,
        clientId: data.clientId
      }
    );

    // CLIENT EMAIL
    await emailjs.send(
      "service_gxckvp8",
      "template_07td6mf",
      {
        name: data.name,
        email: data.email,
        plan: data.plan,
        card: data.card,
        price: data.price
      }
    );

  }catch(err){
    console.log("Email error:", err);
  }
}

// SUBMIT PAYMENT
window.submitPayment = async function(){

  const file = document.getElementById("proof").files[0];
  if(!file) return alert("Upload proof first");

  const status = document.getElementById("status");
  const btn = document.querySelector(".btn");

  btn.innerText = "Processing...";
  btn.disabled = true;

  try{

    status.innerText = "Uploading...";
    const proofUrl = await uploadProof(file);

    status.innerText = "Saving...";

    const snap = await getDoc(doc(db,"clients",clientId));
    const data = snap.data();

    await updateDoc(doc(db,"clients",clientId),{
      paymentProof: proofUrl,
      status: "pending_verification",
      paidAt: new Date()
    });

    // SEND EMAILS
    await sendEmails({
      name: data.name,
      email: data.email,
      phone: data.phone,
      plan: data.plan,
      card: data.card,
      price: "₱" + data.price,
      proof: proofUrl,
      clientId: clientId
    });

    // SUCCESS UI
    document.getElementById("paymentBox").style.display="none";
    document.getElementById("successBox").style.display="block";
    setTimeout(() => {
      window.location.href = `/auth/signup.html?clientId=${clientId}`;
    }, 1500);

  }catch(e){
    alert("Something went wrong");
    btn.innerText="I've Paid";
    btn.disabled=false;
  }

}

</script>

</body>
</html>
