<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* ===== BASE (FROM CLIENT UI STYLE) ===== */
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(circle at 20% 0%, rgba(201,169,110,0.18), transparent 40%),
    radial-gradient(circle at 80% 100%, rgba(59,130,246,0.15), transparent 40%),
    linear-gradient(135deg,#020617,#020617,#000);
  color:#e5e7eb;
}

/* ===== HEADER ===== */
.header{
  padding:20px;
  font-weight:600;
  font-size:18px;
}

/* ===== FILTERS ===== */
.filters{
  display:flex;
  gap:10px;
  padding:0 20px;
  flex-wrap:wrap;
}

.filter{
  padding:8px 14px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  cursor:pointer;
  font-size:12px;
}

.filter.active{
  background:#C9A96E;
  color:#000;
}

/* ===== MAIN ===== */
.main{
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* ===== CARD ===== */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:16px;
  display:flex;
  gap:12px;
  align-items:center;
  cursor:pointer;
  border:1px solid rgba(255,255,255,0.08);
  transition:.2s;
}

.card:hover{
  transform:translateY(-2px);
  background:rgba(255,255,255,0.08);
}

/* ===== AVATAR ===== */
.avatar{
  width:48px;
  height:48px;
  border-radius:12px;
  object-fit:cover;
}

/* ===== TEXT ===== */
.name{
  font-weight:600;
}

.sub{
  font-size:12px;
  color:#94a3b8;
}

/* ===== STATUS ===== */
.badge{
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
}

.paid{background:#2563eb}
.pending{background:#f59e0b}
.processing{background:#9333ea}
.completed{background:#16a34a}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.show{
  display:flex;
}

.modal-box{
  background:rgba(15,23,42,0.98);
  border-radius:20px;
  padding:20px;
  width:90%;
  max-width:380px;
  max-height:90%;
  overflow:auto;
}

/* ===== BUTTON ===== */
.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  cursor:pointer;
}

.primary{
  background:#C9A96E;
  color:#000;
}

.glass{
  background:rgba(255,255,255,0.05);
  color:#fff;
}
  .kpi{
  display:flex;
  gap:10px;
  padding:0 20px;
  margin-bottom:10px;
  overflow-x:auto;
}

.kpi-box{
  min-width:120px;
  padding:12px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
}

.kpi-title{
  font-size:11px;
  color:#94a3b8;
}

.kpi-value{
  font-size:18px;
  font-weight:600;
}
</style>
</head>

<body>

<div class="header">Orders</div>
<div class="kpi" id="kpi"></div>
  <div style="padding:0 20px;margin-bottom:10px">
  <input 
    id="search"
    placeholder="Search name, email, phone..."
    style="width:100%;padding:12px;border-radius:12px;border:none;background:rgba(255,255,255,0.05);color:#fff"
  >
</div>
<div class="filters">
<div class="filter" onclick="setFilter('needs_action',this)">Needs Action</div>
<div class="filter active" onclick="setFilter('all',this)">All</div>
<div class="filter" onclick="setFilter('pending_verification',this)">Verify</div>
<div class="filter" onclick="setFilter('pending_payment',this)">Pending</div>
<div class="filter" onclick="setFilter('paid',this)">Paid</div>
<div class="filter" onclick="setFilter('processing',this)">Processing</div>
<div class="filter" onclick="setFilter('completed',this)">Completed</div>
</div>

<div class="main" id="list"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box" id="modalBox"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
<script src="/firebase-init.js"></script>

<script src="admin.js"></script>

</body>
</html>
