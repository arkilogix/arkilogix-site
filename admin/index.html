<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
:root{
--bg:#0b0b0c;
--panel:#0f0f10;
--border:rgba(255,255,255,0.08);
--muted:#888;
}

body{margin:0;font-family:Inter;background:var(--bg);color:#fff;display:flex}

/* SIDEBAR */
.sidebar{
width:220px;height:100vh;border-right:1px solid var(--border);
padding:20px;display:flex;flex-direction:column;justify-content:space-between;
}

.logo{width:120px}

.nav a{display:block;margin:10px 0;color:var(--muted);text-decoration:none}
.nav a.active{color:#fff}

/* LOGOUT */
.logout{color:var(--muted);cursor:pointer;font-size:13px}
.logout:hover{color:#fff}

/* MAIN */
.main{flex:1;padding:30px}

/* TABS */
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tabs div{
padding:8px 14px;border:1px solid var(--border);
border-radius:999px;font-size:12px;color:var(--muted);cursor:pointer;
}
.tabs .active{background:#fff;color:#000}

/* TABLE */
table{width:100%;border-collapse:collapse}
td,th{padding:12px;border-bottom:1px solid var(--border);font-size:13px}
tr:hover{background:rgba(255,255,255,0.03);cursor:pointer}

/* THUMB */
.thumb{width:40px;height:40px;border-radius:8px;background:#222;object-fit:cover}

/* PANEL */
.panel{
position:fixed;
right:-420px;
top:0;
width:420px;
height:100%;
background:var(--panel);
border-left:1px solid var(--border);
padding:20px;
transition:.3s;
overflow-y:auto;

/* 🔥 FIX: ensure visibility */
z-index:9999;
}
.panel.open{right:0}

/* CLOSE BTN */
.close-btn{
position:absolute;top:15px;right:15px;
cursor:pointer;color:var(--muted);
}
.close-btn:hover{color:#fff}

/* BUTTONS */
.btn{
margin-top:10px;
padding:10px;
border:1px solid var(--border);
border-radius:8px;
background:none;
color:#fff;
cursor:pointer;
font-size:13px;
}

.btn:hover{
background:#fff;
color:#000;
}

/* MODAL */
.modal{
position:fixed;inset:0;background:rgba(0,0,0,.9);
display:none;align-items:center;justify-content:center;
}
.modal.show{display:flex}
.modal img{max-width:90%;max-height:90%}
</style>
</head>

<body>

<div class="sidebar">
<div>
<img src="/logo.png" class="logo">
<div class="nav"><a class="active">Orders</a></div>
</div>

<div class="logout" onclick="logout()">Logout</div>
</div>

<div class="main">

<div class="tabs">
<div class="active" onclick="setFilter('pending_verification',this)">For Verification</div>
<div onclick="setFilter('all',this)">All</div>
<div onclick="setFilter('pending_payment',this)">Pending</div>
<div onclick="setFilter('paid',this)">Paid</div>
<div onclick="setFilter('processing',this)">Processing</div>
<div onclick="setFilter('completed',this)">Completed</div>
</div>

<table>
<thead>
<tr>
<th></th>
<th>Name</th>
<th>Plan</th>
<th>Price</th>
<th>Status</th>
<th>Shipping</th> <!-- 🔥 ADDED -->
<th>Date</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<div class="panel" id="panel"></div>

<div class="modal" id="modal" onclick="closeModal()">
<img id="modalImg">
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
<script src="/firebase-init.js"></script>

<script src="admin.js"></script>

</body>
</html>
