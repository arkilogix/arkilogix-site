<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0b0b0c;
--card:#111;
--border:rgba(255,255,255,0.08);
--muted:#888;
}

body{
margin:0;
font-family:Inter;
background:var(--bg);
color:#fff;
}

/* HEADER */
.header{
padding:20px;
font-size:18px;
font-weight:600;
}

/* TABS */
.tabs{
display:flex;
gap:8px;
padding:0 20px;
flex-wrap:wrap;
margin-bottom:20px;
}

.tabs div{
padding:8px 14px;
border:1px solid var(--border);
border-radius:999px;
font-size:12px;
color:var(--muted);
cursor:pointer;
}

.tabs .active{
background:#fff;
color:#000;
}

/* TABLE */
.table{
width:100%;
padding:0 20px;
box-sizing:border-box;
}

.row{
display:grid;
grid-template-columns:50px 1.5fr 1fr 1fr 1fr 1fr 1fr;
align-items:center;
padding:12px;
border-bottom:1px solid var(--border);
font-size:13px;
}

.row.header{
color:#888;
font-size:11px;
}

.row.data{
background:#111;
border-radius:10px;
margin-bottom:8px;
cursor:pointer;
}

.row.data:hover{
background:#161616;
}

/* PROFILE */
.avatar{
width:36px;
height:36px;
border-radius:8px;
object-fit:cover;
background:#222;
}

/* STATUS */
.status{
padding:4px 10px;
border-radius:999px;
font-size:11px;
font-weight:600;
display:inline-block;
}

.paid{background:#2563eb}
.pending{background:#f59e0b}
.processing{background:#9333ea}
.completed{background:#16a34a}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.modal.show{
display:flex;
}

.modal-box{
background:#111;
padding:20px;
width:90%;
max-width:400px;
border-radius:12px;
max-height:90%;
overflow:auto;
}

/* BUTTON */
.btn{
margin-top:10px;
padding:10px;
border:1px solid var(--border);
border-radius:8px;
background:none;
color:#fff;
cursor:pointer;
width:100%;
}
</style>
</head>

<body>

<div class="header">Orders</div>

<div class="tabs">
<div class="active" onclick="setFilter('all',this)">All</div>
<div onclick="setFilter('pending_verification',this)">For Verification</div>
<div onclick="setFilter('pending_payment',this)">Pending</div>
<div onclick="setFilter('paid',this)">Paid</div>
<div onclick="setFilter('processing',this)">Processing</div>
<div onclick="setFilter('completed',this)">Completed</div>
</div>

<div class="table">

<div class="row header">
<div></div>
<div>Name</div>
<div>Plan</div>
<div>Price</div>
<div>Status</div>
<div>Shipping</div>
<div>Date</div>
</div>

<div id="table"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box" id="modalBox"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
<script src="/firebase-init.js"></script>

<script src="admin.js"></script>

</body>
</html>
