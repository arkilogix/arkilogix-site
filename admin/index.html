<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0b0b0c;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
  --text: #ffffff;
  --muted: #a1a1aa;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  height: 100vh;
  border-right: 1px solid var(--border);
  padding: 20px;
}

.logo {
  width: 140px;
  margin-bottom: 30px;
}

.nav {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.nav a {
  color: var(--muted);
  text-decoration: none;
  font-size: 14px;
}

.nav a.active {
  color: white;
}

/* MAIN */
.main {
  flex: 1;
  padding: 30px;
}

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 30px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 20px;
  border-radius: 14px;
}

.card h3 {
  font-size: 12px;
  color: var(--muted);
}

.card h1 {
  font-size: 28px;
}

/* SEARCH */
.search {
  margin-bottom: 20px;
}

.search input {
  width: 100%;
  padding: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  color: white;
  border-radius: 10px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  padding: 14px;
  border-bottom: 1px solid var(--border);
  text-align: left;
}

th {
  color: var(--muted);
  font-size: 12px;
}

button {
  padding: 6px 10px;
  border: none;
  background: #1f1f22;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* PANEL */
.panel {
  position: fixed;
  top: 0;
  right: -400px;
  width: 400px;
  height: 100%;
  background: #111;
  border-left: 1px solid var(--border);
  padding: 20px;
  transition: 0.3s;
}

.panel.open {
  right: 0;
}

.panel h2 {
  margin-bottom: 10px;
}

.close {
  cursor: pointer;
  margin-bottom: 20px;
  color: var(--muted);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <img src="/logo.png" class="logo">

  <div class="nav">
    <a class="active">Users</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- STATS -->
  <div class="stats">
    <div class="card"><h3>Total Users</h3><h1 id="total">0</h1></div>
    <div class="card"><h3>Basic</h3><h1 id="basic">0</h1></div>
    <div class="card"><h3>Pro</h3><h1 id="pro">0</h1></div>
    <div class="card"><h3>Elite</h3><h1 id="elite">0</h1></div>
  </div>

  <!-- SEARCH -->
  <div class="search">
    <input type="text" id="search" placeholder="Search users...">
  </div>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Plan</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>

</div>

<!-- USER PANEL -->
<div class="panel" id="panel">
  <div class="close" onclick="closePanel()">← Back</div>

  <h2 id="pName"></h2>
  <p id="pEmail"></p>
  <p id="pPhone"></p>
  <p id="pPlan"></p>
  <p id="pStatus"></p>
  <p id="pPayment"></p>

  <br>

  <!-- ACTIONS -->
  <button onclick="viewCard()">🔗 View Card</button>
  <button onclick="copyLink()">📋 Copy Link</button>

  <br><br>

  <button onclick="toggleStatus()" id="statusBtn">Disable User</button>

  <br><br>

  <button onclick="updatePlan('basic')">Set Basic</button>
  <button onclick="updatePlan('pro')">Set Pro</button>
  <button onclick="updatePlan('elite')">Set Elite</button>

  <br><br>

  <h3>Manual Payment</h3>
  <button onclick="approvePayment('pro')">Approve Pro</button>
  <button onclick="approvePayment('elite')">Approve Elite</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script src="/firebase-init.js"></script>
<script src="admin.js"></script>

</body>
</html>
