<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0b0b0c;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
  --text: #ffffff;
  --muted: #a1a1aa;
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body {
  background:var(--bg);
  color:var(--text);
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  height:100vh;
  border-right:1px solid var(--border);
  padding:20px;
}

.logo {
  width:130px;
  margin-bottom:30px;
}

.nav a {
  display:block;
  margin-bottom:10px;
  color:var(--muted);
  text-decoration:none;
  font-size:14px;
}

.nav a.active {
  color:#fff;
}

/* MAIN */
.main {
  flex:1;
  padding:30px;
}

/* TABS */
.tabs {
  display:flex;
  gap:8px;
  margin-bottom:20px;
}

.tabs div {
  padding:8px 14px;
  font-size:12px;
  color:var(--muted);
  border:1px solid var(--border);
  border-radius:999px;
  cursor:pointer;
}

.tabs .active {
  background:#fff;
  color:#000;
}

/* STATS */
.stats {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-bottom:20px;
}

.card {
  padding:15px;
  border:1px solid var(--border);
  border-radius:12px;
  background:var(--card);
}

.card h3 {
  font-size:11px;
  color:var(--muted);
}

.card h1 {
  font-size:22px;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
}

td, th {
  padding:12px;
  border-bottom:1px solid var(--border);
  font-size:13px;
}

th {
  color:var(--muted);
  text-align:left;
}

tr:hover {
  background:rgba(255,255,255,0.03);
  cursor:pointer;
}

/* IMAGE */
.thumb {
  width:40px;
  height:40px;
  border-radius:8px;
  object-fit:cover;
  background:#222;
}

/* STATUS DOT */
.status {
  display:flex;
  align-items:center;
  gap:6px;
}

.dot {
  width:8px;
  height:8px;
  border-radius:50%;
}

.pending_payment { background:#facc15; }
.pending_verification { background:#60a5fa; }
.paid { background:#4ade80; }
.processing { background:#a78bfa; }
.completed { background:#9ca3af; }

/* ICONS */
.actions {
  display:flex;
  gap:10px;
}

.actions svg {
  width:16px;
  height:16px;
  stroke:var(--muted);
  cursor:pointer;
}

.actions svg:hover {
  stroke:#fff;
}

/* PANEL */
.panel {
  position:fixed;
  right:-400px;
  top:0;
  width:400px;
  height:100%;
  background:#111;
  border-left:1px solid var(--border);
  padding:20px;
  transition:.3s;
}

.panel.open {
  right:0;
}

.section {
  margin-bottom:20px;
}

.section h3 {
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
}

.proof {
  width:100%;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <img src="/logo.png" class="logo">
  <div class="nav">
    <a class="active">Orders</a>
  </div>
</div>

<div class="main">

<!-- TABS -->
<div class="tabs">
  <div class="active" onclick="setFilter('pending_verification', this)">For Verification</div>
  <div onclick="setFilter('all', this)">All</div>
  <div onclick="setFilter('pending_payment', this)">Pending</div>
  <div onclick="setFilter('paid', this)">Paid</div>
  <div onclick="setFilter('processing', this)">Processing</div>
  <div onclick="setFilter('completed', this)">Completed</div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="card"><h3>Total</h3><h1 id="total">0</h1></div>
  <div class="card"><h3>For Verification</h3><h1 id="verify">0</h1></div>
  <div class="card"><h3>Paid</h3><h1 id="paid">0</h1></div>
  <div class="card"><h3>Revenue</h3><h1 id="revenue">₱0</h1></div>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th></th>
<th>Name</th>
<th>Plan</th>
<th>Price</th>
<th>Status</th>
<th>Date</th>
<th></th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<!-- PANEL -->
<div class="panel" id="panel"></div>

<!-- SVG ICONS -->
<svg style="display:none">
<symbol id="eye" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></symbol>
<symbol id="check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></symbol>
<symbol id="x" viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></symbol>
</svg>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
<script src="/firebase-init.js"></script>

<script src="admin.js"></script>

</body>
</html>
