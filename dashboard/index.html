<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ArkiLogix Admin</title>

<link rel="icon" href="../logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="dashboard.css">
</head>

<body>

<div class="dashboard">

  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <img src="../logo.png" class="logo-img">
      <div>
        <h2>ArkiLogix</h2>
        <span>Admin Panel</span>
      </div>
    </div>

    <input id="search" class="search" placeholder="Search clients...">

    <button class="btn primary" onclick="openModal()">+ New Client</button>
  </div>

  <!-- ANALYTICS -->
  <div class="analytics">
    <div class="glass stat"><h3>Total Clients</h3><p id="totalClients">0</p></div>
    <div class="glass stat"><h3>Total Views</h3><p id="totalViews">0</p></div>
    <div class="glass stat"><h3>Total Taps</h3><p id="totalTaps">0</p></div>
    <div class="glass stat"><h3>Top Client</h3><p id="topClient">-</p></div>
  </div>

  <!-- CLIENT GRID -->
  <div id="clientsContainer" class="clients"></div>

</div>

<!-- CREATE / EDIT MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <input id="name" placeholder="Name">
    <input id="position" placeholder="Position">
    <input id="email" placeholder="Email">
    <input id="phone" placeholder="Phone">

    <select id="plan">
      <option value="basic">Basic</option>
      <option value="pro">Pro</option>
      <option value="elite">Elite</option>
    </select>

    <button class="btn primary" onclick="saveClient()">Save</button>
    <button class="btn" onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- UPGRADE MODAL -->
<div id="upgradeModal" class="modal">
  <div class="modal-content">
    <h3>Upgrade Plan</h3>

    <select id="upgradePlan">
      <option value="basic">Basic</option>
      <option value="pro">Pro</option>
      <option value="elite">Elite</option>
    </select>

    <button class="btn gold" onclick="confirmUpgrade()">Confirm</button>
    <button class="btn" onclick="closeUpgrade()">Cancel</button>
  </div>
</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
