<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFC Dashboard</title>

  <link rel="stylesheet" href="dashboard.css">

  <style>
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: #f5f5f5;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: black;
      color: white;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #clientsContainer {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .modal-content input,
    .modal-content select {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .modal-actions {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>NFC Dashboard</h1>
  <button onclick="openCreateModal()">+ New Client</button>
</header>
<!-- ANALYTICS -->
<section id="analytics" style="padding:20px; display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px;">

  <div class="card">
    <h3>Total Clients</h3>
    <p id="totalClients">0</p>
  </div>

  <div class="card">
    <h3>Total Views</h3>
    <p id="totalViews">0</p>
  </div>

  <div class="card">
    <h3>Total Taps</h3>
    <p id="totalTaps">0</p>
  </div>

  <div class="card">
    <h3>Top Client</h3>
    <p id="topClient">-</p>
  </div>

</section>
<section id="clientsContainer"></section>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">

    <h2>Create Client</h2>

    <input id="name" placeholder="Name">
    <input id="position" placeholder="Position">
    <input id="email" placeholder="Email">
    <input id="phone" placeholder="Phone">

    <select id="plan">
      <option value="basic">Basic</option>
      <option value="pro">Pro</option>
      <option value="elite">Elite</option>
    </select>

    <div class="modal-actions">
      <button onclick="saveClient()">Save</button>
      <button onclick="closeModal()">Cancel</button>
    </div>

  </div>
</div>

<!-- MODULE SCRIPT (IMPORTANT) -->
<script type="module" src="dashboard.js"></script>

<!-- MODAL LOGIC (GLOBAL FUNCTIONS) -->
<script>
  function openCreateModal() {
    document.getElementById("modal").style.display = "flex";
  }

  function closeModal() {
    document.getElementById("modal").style.display = "none";
  }

  // Close when clicking outside modal
  window.onclick = function(e) {
    const modal = document.getElementById("modal");
    if (e.target === modal) {
      modal.style.display = "none";
    }
  };
</script>
<!-- DELETE MODAL -->
<div id="deleteModal" class="modal">
  <div class="modal-content">
    <h3>Delete Client</h3>
    <p>Are you sure you want to delete this client?</p>

    <div class="modal-actions">
      <button onclick="confirmDelete()">Yes, Delete</button>
      <button onclick="closeDeleteModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- UNDO TOAST -->
<div id="undoToast" style="
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:#fff;
  padding:12px 20px;
  border-radius:30px;
  display:none;
  gap:10px;
  align-items:center;
">
  Client deleted
  <button onclick="undoDelete()" style="margin-left:10px;">UNDO</button>
</div>
</body>
</html>
