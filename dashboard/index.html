<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFC Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f7f8fa;
}

/* ===== LAYOUT ===== */
.layout {
  display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 220px;
  background: #111;
  color: white;
  height: 100vh;
  padding: 20px;
}

.sidebar h2 {
  font-size: 18px;
  margin-bottom: 30px;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  border: none;
  background: #222;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

/* ===== MAIN ===== */
.main {
  flex: 1;
  padding: 30px;
}

/* ===== ANALYTICS ===== */
.analytics {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.analytics-card {
  background: white;
  padding: 20px;
  border-radius: 12px;
}

.analytics-card h3 {
  font-size: 14px;
  color: #777;
}

.analytics-card p {
  font-size: 22px;
  font-weight: 600;
}

/* ===== CLIENT CARDS ===== */
.clients {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 12px;
}

.card h3 {
  margin: 0;
}

.card p {
  margin: 4px 0;
  font-size: 13px;
  color: #666;
}

.card-actions {
  margin-top: 10px;
  display: flex;
  gap: 6px;
}

.card button {
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.delete { background: #ff4d4f; color: white; }
.edit { background: #1677ff; color: white; }

/* ===== MODAL ===== */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 300px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ===== TOAST ===== */
#undoToast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  color: white;
  padding: 12px 20px;
  border-radius: 30px;
  display: none;
}
</style>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Arkilogix</h2>
    <button onclick="openCreateModal()">+ New Client</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- ANALYTICS -->
    <div class="analytics">
      <div class="analytics-card">
        <h3>Total Clients</h3>
        <p id="totalClients">0</p>
      </div>

      <div class="analytics-card">
        <h3>Total Views</h3>
        <p id="totalViews">0</p>
      </div>

      <div class="analytics-card">
        <h3>Total Taps</h3>
        <p id="totalTaps">0</p>
      </div>

      <div class="analytics-card">
        <h3>Top Client</h3>
        <p id="topClient">-</p>
      </div>
    </div>

    <!-- CLIENTS -->
    <div id="clientsContainer" class="clients"></div>

  </div>

</div>

<!-- CREATE MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <input id="name" placeholder="Name">
    <input id="position" placeholder="Position">
    <input id="email" placeholder="Email">
    <input id="phone" placeholder="Phone">

    <select id="plan">
      <option value="basic">Basic</option>
      <option value="pro">Pro</option>
      <option value="elite">Elite</option>
    </select>

    <button onclick="saveClient()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- DELETE MODAL -->
<div id="deleteModal" class="modal">
  <div class="modal-content">
    <p>Delete this client?</p>
    <button onclick="confirmDelete()">Yes</button>
    <button onclick="closeDeleteModal()">Cancel</button>
  </div>
</div>

<!-- TOAST -->
<div id="undoToast">
  Client deleted
  <button onclick="undoDelete()">UNDO</button>
</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
