<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Your Card</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f5f7fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  background:white;
  padding:30px;
  border-radius:12px;
  width:350px;
}

h2 { margin-bottom:20px; }

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

button {
  width:100%;
  padding:12px;
  background:#111;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.progress {
  height:6px;
  background:#eee;
  margin-bottom:20px;
  border-radius:10px;
}

.progress-bar {
  height:100%;
  width:20%;
  background:#111;
  border-radius:10px;
  transition:0.3s;
}
</style>
</head>

<body>

<div class="container">

  <div class="progress">
    <div id="progressBar" class="progress-bar"></div>
  </div>

  <h2 id="title">Let’s build your card</h2>

  <!-- STEP 1 -->
  <div id="step1">
    <input id="name" placeholder="Your Name">
    <input id="position" placeholder="Your Position">
    <input id="company" placeholder="Company">
  </div>

  <!-- STEP 2 -->
  <div id="step2" style="display:none;">
    <input id="phone" placeholder="Phone">
    <input id="email" placeholder="Email">
  </div>

  <!-- STEP 3 -->
  <div id="step3" style="display:none;">
    <p>Add your services</p>

    <div id="servicesContainer"></div>

    <button type="button" onclick="addService()">+ Add Service</button>
  </div>

  <button id="continueBtn">Continue</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let step = 1;
let currentUser = null;

// 🔐 WAIT FOR USER
onAuthStateChanged(auth, (user) => {
  if (!user) {
    alert("Please login first");
    window.location.href = "../auth/login.html";
    return;
  }
  currentUser = user;
});

// BUTTON
document.getElementById("continueBtn").addEventListener("click", nextStep);

// MAIN FLOW
async function nextStep() {

  if (!currentUser) {
    alert("User not ready yet");
    return;
  }

  const clientId = currentUser.uid;

  // STEP 1
  if (step === 1) {

    await setDoc(doc(db, "clients", clientId), {
      name: document.getElementById("name").value,
      position: document.getElementById("position").value,
      company: document.getElementById("company").value,
      plan: "basic",
      views: 0,
      taps: 0,
      createdAt: new Date()
    });

    await setDoc(doc(db, "users", clientId), {
      clientId: clientId
    }, { merge: true });

    document.getElementById("step1").style.display = "none";
    document.getElementById("step2").style.display = "block";

    document.getElementById("progressBar").style.width = "40%";
    document.getElementById("title").innerText = "Add your contact info";

    step = 2;
    return;
  }

  // STEP 2
  if (step === 2) {

    await setDoc(doc(db, "clients", clientId), {
      phone: document.getElementById("phone").value,
      email: document.getElementById("email").value
    }, { merge: true });

    document.getElementById("step2").style.display = "none";
    document.getElementById("step3").style.display = "block";

    document.getElementById("progressBar").style.width = "60%";
    document.getElementById("title").innerText = "Add your services";

    step = 3;
    return;
  }

  // STEP 3
  if (step === 3) {

    const inputs = document.querySelectorAll(".serviceInput");
    const services = [];

    inputs.forEach(input => {
      if (input.value.trim()) {
        services.push(input.value.trim());
      }
    });

    await setDoc(doc(db, "clients", clientId), {
      services: services
    }, { merge: true });

    alert("Services saved!");

    console.log("Next: Promo Step");

    step = 4;
  }
}

// ADD SERVICE
function addService(value = "") {
  const div = document.createElement("div");
  div.style.display = "flex";
  div.style.gap = "5px";
  div.style.marginBottom = "5px";

  div.innerHTML = `
    <input class="serviceInput" placeholder="Service" value="${value}">
    <button type="button" onclick="this.parentElement.remove()">X</button>
  `;

  document.getElementById("servicesContainer").appendChild(div);
}

// DEFAULT INPUT
addService();

</script>

</body>
</html>
