<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Your Card</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f5f7fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  background:white;
  padding:30px;
  border-radius:12px;
  width:350px;
}

h2 {
  margin-bottom:20px;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

button {
  width:100%;
  padding:12px;
  background:#111;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.progress {
  height:6px;
  background:#eee;
  margin-bottom:20px;
  border-radius:10px;
}

.progress-bar {
  height:100%;
  width:20%;
  background:#111;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="progress">
    <div id="progressBar" class="progress-bar"></div>
  </div>

  <h2 id="title">Let’s build your card</h2>

  <!-- STEP 1 -->
  <div id="step1">
    <input id="name" placeholder="Your Name">
    <input id="position" placeholder="Your Position">
    <input id="company" placeholder="Company">
  </div>
  
  <!-- STEP 2 -->
  <div id="step2" style="display:none;">
    <input id="phone" placeholder="Phone">
    <input id="email" placeholder="Email">
  </div>

  <button onclick="nextStep()">Continue</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let step = 1;

async function nextStep() {

  const user = auth.currentUser;

  if (!user) {
    alert("Not logged in");
    return;
  }

  const clientId = user.uid;

  // STEP 1
  if (step === 1) {

    await setDoc(doc(db, "clients", clientId), {
      name: document.getElementById("name").value,
      position: document.getElementById("position").value,
      company: document.getElementById("company").value,
      plan: "basic",
      views: 0,
      taps: 0,
      createdAt: new Date()
    });

    await setDoc(doc(db, "users", user.uid), {
      clientId: clientId
    }, { merge: true });

    document.getElementById("step1").style.display = "none";
    document.getElementById("step2").style.display = "block";

    document.getElementById("progressBar").style.width = "40%";
    document.getElementById("title").innerText = "Add your contact info";

    step = 2;
    return;
  }

  // STEP 2
  if (step === 2) {

    await setDoc(doc(db, "clients", clientId), {
      phone: document.getElementById("phone").value,
      email: document.getElementById("email").value
    }, { merge: true });

    alert("Step 2 complete!");
  }
}

window.nextStep = nextStep;

</script>

</body>
</html>
