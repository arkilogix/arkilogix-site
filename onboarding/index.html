<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Your Digital Card</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #111;
  --accent: #2563eb;
  --border: #e5e7eb;
  --bg: #f9fafb;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: var(--bg);
  height: 100vh;
  display: flex;
}

/* LAYOUT */
.container {
  display: flex;
  width: 100%;
}

.left, .right {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.left {
  background: #fff;
}

.right {
  background: linear-gradient(135deg, #f1f5f9, #ffffff);
}

/* FORM CARD */
.card {
  width: 100%;
  max-width: 420px;
  padding: 28px;
}

/* PROGRESS */
.progress {
  height: 4px;
  background: #eee;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 24px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
  transition: 0.4s ease;
}

/* TEXT */
h1 {
  font-size: 20px;
  font-weight: 600;
}

.subtitle {
  font-size: 13px;
  color: #666;
  margin-bottom: 20px;
}

/* STEPS */
.step {
  display: none;
  opacity: 0;
  transform: translateX(20px);
  transition: 0.3s ease;
}

.step.active {
  display: block;
  opacity: 1;
  transform: translateX(0);
}

/* INPUTS */
.input-group {
  margin-bottom: 14px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
}

input:focus {
  border-color: var(--accent);
  outline: none;
  box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}

/* BUTTONS */
.actions {
  margin-top: 20px;
  display: flex;
  justify-content: space-between;
}

button {
  border: none;
  padding: 12px 18px;
  border-radius: 10px;
  cursor: pointer;
}

.btn-primary {
  background: var(--primary);
  color: white;
}

.btn-secondary {
  background: transparent;
  color: #777;
}

/* SERVICES */
.service-item {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.service-item input {
  flex: 1;
}

.remove-btn {
  background: #f3f4f6;
  padding: 0 10px;
  border-radius: 8px;
  cursor: pointer;
}

.add-service {
  font-size: 13px;
  color: var(--accent);
  cursor: pointer;
}

/* PREVIEW CARD */
.preview-card {
  width: 300px;
  padding: 24px;
  border-radius: 18px;
  background: #111;
  color: #fff;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  transition: 0.3s ease;
}

.preview-name {
  font-size: 18px;
  font-weight: 600;
}

.preview-position {
  font-size: 13px;
  opacity: 0.7;
  margin-bottom: 12px;
}

.preview-contact {
  font-size: 12px;
  margin-bottom: 12px;
}

.preview-services {
  margin-top: 10px;
}

.preview-service {
  font-size: 11px;
  background: rgba(255,255,255,0.1);
  padding: 6px 10px;
  border-radius: 999px;
  display: inline-block;
  margin: 4px 4px 0 0;
}

/* MOBILE */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .right {
    padding: 20px;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <div class="card">

      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <!-- STEP 1 -->
      <div class="step active" id="step1">
        <h1>Your Identity</h1>
        <p class="subtitle">Let’s start with the basics</p>

        <div class="input-group">
          <input id="name" placeholder="Full Name" oninput="updatePreview()">
        </div>

        <div class="input-group">
          <input id="position" placeholder="Position" oninput="updatePreview()">
        </div>

        <div class="actions">
          <div></div>
          <button class="btn-primary" onclick="nextStep()">Continue</button>
        </div>
      </div>

      <!-- STEP 2 -->
      <div class="step" id="step2">
        <h1>Contact</h1>
        <p class="subtitle">How can people reach you?</p>

        <div class="input-group">
          <input id="email" placeholder="Email" oninput="updatePreview()">
        </div>

        <div class="input-group">
          <input id="phone" placeholder="Phone" oninput="updatePreview()">
        </div>

        <div class="actions">
          <button class="btn-secondary" onclick="prevStep()">Back</button>
          <button class="btn-primary" onclick="nextStep()">Continue</button>
        </div>
      </div>

      <!-- STEP 3 -->
      <div class="step" id="step3">
        <h1>Services</h1>
        <p class="subtitle">What do you offer?</p>

        <div id="servicesContainer"></div>

        <div class="add-service" onclick="addService()">+ Add Service</div>

        <div class="actions">
          <button class="btn-secondary" onclick="prevStep()">Back</button>
          <button class="btn-primary" onclick="submitForm()">Finish</button>
        </div>
      </div>

    </div>
  </div>

  <!-- RIGHT PREVIEW -->
  <div class="right">
    <div class="preview-card" id="previewCard">
      <div class="preview-name" id="previewName">Your Name</div>
      <div class="preview-position" id="previewPosition">Your Position</div>

      <div class="preview-contact" id="previewContact">
        Email • Phone
      </div>

      <div class="preview-services" id="previewServices"></div>
    </div>
  </div>

</div>

<script>
let currentStep = 1;

function updateProgress() {
  const percent = (currentStep - 1) / 2 * 100;
  document.getElementById("progressBar").style.width = percent + "%";
}

function showStep(step) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById("step" + step).classList.add("active");
  updateProgress();
}

function nextStep() {
  if (currentStep < 3) {
    currentStep++;
    showStep(currentStep);
  }
}

function prevStep() {
  if (currentStep > 1) {
    currentStep--;
    showStep(currentStep);
  }
}

/* SERVICES */
function addService(value = "") {
  const container = document.getElementById("servicesContainer");

  const div = document.createElement("div");
  div.className = "service-item";

  div.innerHTML = `
    <input type="text" placeholder="Service" value="${value}" oninput="updatePreview()">
    <div class="remove-btn" onclick="this.parentElement.remove(); updatePreview()">×</div>
  `;

  container.appendChild(div);
}

/* PREVIEW UPDATE */
function updatePreview() {
  document.getElementById("previewName").innerText =
    document.getElementById("name").value || "Your Name";

  document.getElementById("previewPosition").innerText =
    document.getElementById("position").value || "Your Position";

  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;

  document.getElementById("previewContact").innerText =
    `${email || "Email"} • ${phone || "Phone"}`;

  const servicesDiv = document.getElementById("previewServices");
  servicesDiv.innerHTML = "";

  document.querySelectorAll("#servicesContainer input").forEach(i => {
    if (i.value) {
      const span = document.createElement("div");
      span.className = "preview-service";
      span.innerText = i.value;
      servicesDiv.appendChild(span);
    }
  });
}

/* INIT */
addService();

/* SUBMIT */
function submitForm() {
  // KEEP YOUR FIREBASE LOGIC
  alert("Saved!");
}
</script>

</body>
</html>
