<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Your Card</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f5f7fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  background:white;
  padding:30px;
  border-radius:12px;
  width:350px;
}

h2 {
  margin-bottom:20px;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

button {
  width:100%;
  padding:12px;
  background:#111;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.progress {
  height:6px;
  background:#eee;
  margin-bottom:20px;
  border-radius:10px;
}

.progress-bar {
  height:100%;
  width:20%;
  background:#111;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="progress">
    <div class="progress-bar"></div>
  </div>

  <h2>Let’s build your card</h2>

  <input id="name" placeholder="Your Name">
  <input id="position" placeholder="Your Position">
  <input id="company" placeholder="Company">

  <button onclick="nextStep()">Continue</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// STEP 1 SAVE
async function nextStep() {
  const user = auth.currentUser;

  if (!user) {
    alert("Not logged in");
    return;
  }

  const clientId = user.uid;

  await setDoc(doc(db, "clients", clientId), {
    name: document.getElementById("name").value,
    position: document.getElementById("position").value,
    company: document.getElementById("company").value,
    plan: "basic",
    views: 0,
    taps: 0,
    createdAt: new Date()
  });

  // 🔥 LINK USER → CLIENT
  await setDoc(doc(db, "users", user.uid), {
    clientId: clientId
  }, { merge: true });

  alert("Step 1 saved!");

  // NEXT STEP COMES NEXT MESSAGE
}

window.nextStep = nextStep;

</script>

</body>
</html>
