<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Your Card</title>
<link rel="icon" type="image/png" href="../logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f1115;
  --card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --text:#ffffff;
  --muted:#9ca3af;
  --accent:#C9A96E;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  display:flex;
  height:100vh;
  background:radial-gradient(circle at top,#1a1d24,#0f1115);
  color:var(--text);
  
  overflow:hidden;
}

.container{display:flex;width:100%;}

/* LEFT */
.left{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:100%;
  max-width:420px;
  padding:32px;
  border-radius:18px;
  background:var(--card);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* BRAND */
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:18px;
}
.brand img{width:32px;}
.brand div{font-weight:600;font-size:14px;}

/* STEP */
.step-indicator{
  font-size:12px;
  color:#6b7280;
  margin-bottom:18px;
}

/* PROGRESS */
.progress{
  height:3px;
  background:rgba(255,255,255,0.05);
  margin-bottom:24px;
  border-radius:10px;
}
.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#C9A96E,#e6c78f);
  border-radius:10px;
  transition:.4s;
}

/* STEPS */
.step{display:none;}
.step.active{display:block;}

.slide-in{
  animation:slideIn .35s ease;
}
@keyframes slideIn{
  from{opacity:0;transform:translateX(20px);}
  to{opacity:1;transform:translateX(0);}
}

h1{font-size:22px;font-weight:600;margin-bottom:6px;}
.sub{font-size:13px;color:var(--muted);margin-bottom:18px;}

/* INPUT */
input{
  width:100%;
  padding:14px;
  margin-bottom:14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:white;
  font-size:14px;
  transition:.25s;
}
input::placeholder{color:#6b7280;}
input:focus{
  outline:none;
  border-color:var(--accent);
  background:rgba(255,255,255,0.06);
  transform:scale(1.02);
}

/* BUTTONS */
.actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  padding:14px 18px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:500;
  transition:.25s;
}
button:active{transform:scale(.97);}

.btn-primary{
  background:linear-gradient(135deg,#C9A96E,#e6c78f);
  color:#111;
}
.btn-primary:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(201,169,110,0.25);
}

.btn-secondary{
  background:none;
  color:#9ca3af;
}

.skip{
  font-size:12px;
  color:#6b7280;
  cursor:pointer;
}

/* SERVICES */
.service-item{display:flex;gap:8px;margin-bottom:10px;}
.service-item input{flex:1;}
/* SERVICE REMOVE BUTTON (CIRCLE) */
.remove-btn{
width:28px;
height:28px;
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.12);

color:#9ca3af;
font-size:14px;
cursor:pointer;

transition:.2s;
}

/* HOVER */
.remove-btn:hover{
background:#ef4444;
color:#fff;
border-color:#ef4444;
transform:scale(1.1);
}

.add-service-btn{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px dashed var(--border);
  background:transparent;
  font-size:12px;
  cursor:pointer;
  color:var(--muted);
  margin-bottom:12px;
}

/* RIGHT */
.right{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* PREVIEW */
.preview-card{
  width:360px;
  padding:40px 24px;
  border-radius:22px;
  text-align:center;
  background:linear-gradient(145deg,#ffffffcc,#e5e7ebcc);
  backdrop-filter:blur(14px);
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  color:#111;
}

/* PROFILE */
.profile-wrap{
  width:110px;height:110px;margin:auto;border-radius:50%;
  overflow:hidden;border:2px solid rgba(255,255,255,0.1);
  margin-bottom:20px;cursor:pointer;
}
.profile-wrap img{
  width:100%;height:100%;object-fit:contain;
  padding:14px;background:#fff;
}
  .profile-wrap{
  cursor:pointer;
  position:relative;
}

.profile-wrap::after{
  content:"Upload";
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.6);
  color:white;
  font-size:11px;
  padding:6px;
  opacity:0;
  transition:.2s;
}

.profile-wrap:hover::after{
  opacity:1;
}

/* TEXT */
.preview-name{
  font-size:22px;
  font-weight:600;
  color:#111;
}

.preview-position{
  font-size:13px;
  color:#555;
}

/* SERVICES */
.preview-services{
  margin-top:26px;
  text-align:center;
}

.services-title{
display:flex;
align-items:center;
justify-content:center;
gap:10px;

font-size:10px;
letter-spacing:3px;
color:#6b7280;
margin-bottom:14px;
}

.services-title span{
opacity:0.8;
}

/* DIVIDER LINES */
.divider{
height:1px;
width:40px;
background:rgba(0,0,0,0.15);
}

#previewServices{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
}

/* LOADING */
.loading{
  position:fixed;inset:0;background:#0f1115;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;opacity:0;pointer-events:none;transition:.3s;
}
.loading.active{opacity:1;pointer-events:auto;}

@media(max-width:900px){
  .right{display:none;}
}
/* ===== PREMIUM ICON SYSTEM ===== */

.actions-preview{
display:flex;
justify-content:center;
gap:14px;
margin:24px 0 14px;
flex-wrap:wrap;
}

.socials{
display:flex;
justify-content:center;
gap:14px;
margin-bottom:22px;
}

/* ICON BUTTON (UPGRADED) */
.icon-btn{
width:48px;
height:48px;
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

background:rgba(255,255,255,0.6);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.8);

box-shadow:
0 8px 20px rgba(0,0,0,0.12),
inset 0 1px 0 rgba(255,255,255,0.9);

cursor:pointer;
transition:.25s ease;
}

/* ICON INSIDE */
.icon{
width:20px;
height:20px;
stroke:#374151;
stroke-width:1.8;
fill:none;
stroke-linecap:round;
stroke-linejoin:round;
}

/* HOVER */
.icon-btn:hover{
transform:translateY(-3px) scale(1.05);
background:rgba(255,255,255,0.75);
}

/* BUTTON GROUP */
.preview-actions{
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
margin-top:8px;
}

/* PRIMARY BUTTON */
.btn-pill.primary{
padding:13px 26px;
border-radius:999px;
font-size:13px;
font-weight:500;

background:#111;
color:#fff;
border:none;

box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* SECONDARY BUTTON */
.btn-pill{
padding:12px 24px;
border-radius:999px;
font-size:13px;

background:rgba(255,255,255,0.6);
backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,0.8);

box-shadow:
0 6px 16px rgba(0,0,0,0.1),
inset 0 1px 0 rgba(255,255,255,0.9);

transition:.2s;
}

.btn-pill:hover{
transform:translateY(-2px);
}

.divider{
height:1px;
width:25%;
background:rgba(0,0,0,0.15);
flex-shrink:0;
}
  .left{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
}

  .powered-by{
margin-top:24px;
display:flex;
flex-direction:column;
align-items:center;
gap:6px;

font-size:10px;
color:#6b7280;
opacity:0.8;
}

.powered-by img{
width:30px;
opacity:0.9;
}
  
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
  
<div class="card">
<div class="brand">
  <img src="/logo.png">
  <div>ArkiLogix</div>
</div>

<div class="step-indicator" id="stepIndicator">Step 1 of 3</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<!-- STEP 1 -->
<div class="step active slide-in" id="step1">
<h1>Identity</h1>
<div class="sub">Tell people who you are</div>
<input id="name" placeholder="Full Name" oninput="updatePreview()">
<input id="position" placeholder="Position" oninput="updatePreview()">
<button class="btn-primary" onclick="nextStep()">Next</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
<h1>How can people reach you?</h1>
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="facebook" placeholder="Facebook Profile Link (optional)" oninput="updatePreview()">
<input id="instagram" placeholder="Instagram Profile Link (optional)" oninput="updatePreview()">
  
<div class="actions">
<button class="btn-secondary" onclick="prevStep()">Back</button>
<button class="btn-primary" onclick="nextStep()">Next</button>
</div>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
<h1>What do you offer?</h1>
<div class="sub">You're almost done ✨</div>

<div id="servicesContainer"></div>
<button class="add-service-btn" onclick="addService()">+ Add Service</button>

<div class="actions">
<div class="skip" onclick="submitForm()">Skip for now</div>
<button class="btn-primary" onclick="submitForm()">Create My Card</button>
</div>
</div>

</div>
</div>
<!-- RIGHT -->
<div class="right">
<div class="preview-card">

<div class="profile-wrap" onclick="document.getElementById('imageInput').click()">
  <img id="previewImage" src="/logo.png">
</div>

<input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">

<div class="preview-name" id="previewName">Your Name</div>
<div class="preview-position" id="previewPosition">Your Position</div>

  <!-- ====== PLACE THIS INSIDE YOUR PREVIEW CARD (REPLACE ACTIONS + SOCIALS + BUTTONS) ====== -->

<!-- ICON ACTIONS -->
<div class="actions-preview">

  <!-- CALL -->
  <div class="icon-btn" onclick="fakeAction()">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M22 16.92V21a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3 2h4.09a2 2 0 0 1 2 1.72c.12.9.37 1.78.73 2.6a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.48-1.28a2 2 0 0 1 2.11-.45c.82.36 1.7.61 2.6.73A2 2 0 0 1 22 16.92z"/>
    </svg>
  </div>

  <!-- SMS -->
  <div class="icon-btn" onclick="fakeAction()">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M21 15a4 4 0 0 1-4 4H7l-4 4V5a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
    </svg>
  </div>

  <!-- EMAIL -->
  <div class="icon-btn" onclick="fakeAction()">
    <svg class="icon" viewBox="0 0 24 24">
      <rect x="4" y="4" width="16" height="16"/>
      <path d="M22 6l-10 7L2 6"/>
    </svg>
  </div>

  <!-- SAVE CONTACT ICON -->
  <div class="icon-btn" onclick="fakeAction()">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
      <path d="M17 21v-8H7v8"/>
      <path d="M7 3v5h8"/>
    </svg>
  </div>

  <!-- PORTFOLIO / STAR -->
  <div class="icon-btn" onclick="fakeAction()">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M12 2l3 6 6 .5-4.5 4 1.5 6.5-6-3.5-6 3.5 1.5-6.5L3 8.5 9 8z"/>
    </svg>
  </div>

</div>

<!-- SOCIALS -->
<div class="socials" id="previewSocials"></div>
<!-- ACTION BUTTONS -->
<div class="preview-actions">

  <div class="btn-pill primary" onclick="fakeAction()">
    Save Contact
  </div>

  <div class="btn-pill" onclick="fakeAction()">
    View Portfolio
  </div>

</div>
  <div class="preview-services">
<div class="services-title">
  <div class="divider"></div>
  <span>SERVICES</span>
  <div class="divider"></div>
</div>
<div id="previewServices"></div>

    <div class="powered-by">
  <img src="/logo.png">
  <div>Powered by ArkiLogix</div>
</div>
    
</div>
</div>



</div>
</div>
</div>

<!-- LOADING -->
<div id="loading" class="loading">
Creating your card...
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  
  const firebaseConfig = {
  apiKey: "AIzaSyCUw-qxeRg8YaihNcJPmJDHL2z6zBE6PK4",
  authDomain: "arkilogix-clients.firebaseapp.com",
  projectId: "arkilogix-clients",
  storageBucket: "arkilogix-clients.firebasestorage.app",
  messagingSenderId: "1074947351840",
  appId: "1:1074947351840:web:b077eb79963fff59316345"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

  
let currentStep=1;

function nextStep(){
  if(currentStep<3){
    currentStep++;
    showStep();
  }
}

function prevStep(){
  if(currentStep>1){
    currentStep--;
    showStep();
  }
}

function showStep(){
  document.querySelectorAll(".step").forEach(s=>{
    s.classList.remove("active","slide-in");
  });

  const stepEl = document.getElementById("step"+currentStep);
  stepEl.classList.add("active","slide-in");

  document.getElementById("progressBar").style.width=((currentStep-1)/2)*100+"%";
  document.getElementById("stepIndicator").innerText = `Step ${currentStep} of 3`;

  const input = stepEl.querySelector("input");
  if(input) input.focus();
}

function addService(){
const div=document.createElement("div");
div.className="service-item";
div.innerHTML=`<input oninput="updatePreview()"><div class="remove-btn" onclick="this.parentElement.remove();updatePreview()">×</div>`;
document.getElementById("servicesContainer").appendChild(div);
}

function updatePreview(){

// NAME + POSITION
document.getElementById("previewName").innerText = name.value || "Your Name";
document.getElementById("previewPosition").innerText = position.value || "Your Position";

// SERVICES
previewServices.innerHTML="";
document.querySelectorAll("#servicesContainer input").forEach(i=>{
if(i.value){
const d=document.createElement("div");
d.className="preview-service";
d.innerText=i.value;
previewServices.appendChild(d);
}
});

// SOCIALS
const socials = document.getElementById("previewSocials");
socials.innerHTML = "";

if(document.getElementById("facebook").value){
socials.innerHTML += `
<div class="icon-btn" onclick="fakeAction()">
<svg class="icon" viewBox="0 0 24 24">
<path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
</svg>
</div>
`;
}

if(document.getElementById("instagram").value){
socials.innerHTML += `
<div class="icon-btn" onclick="fakeAction()">
<svg class="icon" viewBox="0 0 24 24">
<rect x="2" y="2" width="20" height="20" rx="5"/>
<circle cx="12" cy="12" r="4"/>
<circle cx="17.5" cy="6.5" r="1"/>
</svg>
</div>
`;
}

}

  async function submitForm(){

  document.getElementById("loading").classList.add("active");

  const name = document.getElementById("name").value;
  const position = document.getElementById("position").value;

  const services = [];
  document.querySelectorAll("#servicesContainer input").forEach(i=>{
    if(i.value) services.push(i.value);
  });

  const user = auth.currentUser;

  if(!user){
    alert("User not logged in");
    return;
  }

  try{

    await setDoc(doc(db, "clients", user.uid), {
      name: name || "",
      position: position || "",
      services: services || [],
      plan: "basic",
    
      stats: {
        views: 0,
        taps: 0,
        clicks: 0
      },
    
      links: [],
    
      theme: "default",
    
      createdAt: new Date(),
      updatedAt: new Date()
    }, { merge: true });

    // ✅ REDIRECT AFTER SAVE
    window.location.href = "../dashboard/index.html";

  }catch(err){
    alert(err.message);
  }
}

document.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    e.preventDefault();
    if(currentStep<3){nextStep();}
    else{submitForm();}
  }
});

addService();
  
  document.getElementById("name").addEventListener("input", updatePreview);
  document.getElementById("position").addEventListener("input", updatePreview);
  
updatePreview();
  
  function handleImageUpload(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    document.getElementById("previewImage").src = e.target.result;
  };

  reader.readAsDataURL(file);
}

  function fakeAction(){
alert("Available after setup ✨");
}

  window.submitForm = submitForm;
  window.updatePreview = updatePreview;
  window.addService = addService;
  window.nextStep = nextStep;
  window.prevStep = prevStep;
</script>

</body>
</html>
