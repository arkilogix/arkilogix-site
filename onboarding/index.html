<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Your Card</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f1115;
  --card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --text:#ffffff;
  --muted:#9ca3af;
  --accent:#C9A96E;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  display:flex;
  height:100vh;
  background:radial-gradient(circle at top,#1a1d24,#0f1115);
  color:var(--text);
}

.container{display:flex;width:100%;}

/* LEFT */
.left{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:100%;
  max-width:420px;
  padding:32px;
  border-radius:18px;
  background:var(--card);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* BRAND */
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:18px;
}
.brand img{width:32px;}
.brand div{font-weight:600;font-size:14px;}

/* STEP */
.step-indicator{
  font-size:12px;
  color:#6b7280;
  margin-bottom:18px;
}

/* PROGRESS */
.progress{
  height:3px;
  background:rgba(255,255,255,0.05);
  margin-bottom:24px;
  border-radius:10px;
}
.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#C9A96E,#e6c78f);
  border-radius:10px;
  transition:.4s;
}

/* STEPS */
.step{display:none;}
.step.active{display:block;}

.slide-in{
  animation:slideIn .35s ease;
}
@keyframes slideIn{
  from{opacity:0;transform:translateX(20px);}
  to{opacity:1;transform:translateX(0);}
}

h1{font-size:22px;font-weight:600;margin-bottom:6px;}
.sub{font-size:13px;color:var(--muted);margin-bottom:18px;}

/* INPUT */
input{
  width:100%;
  padding:14px;
  margin-bottom:14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:white;
  font-size:14px;
  transition:.25s;
}
input::placeholder{color:#6b7280;}
input:focus{
  outline:none;
  border-color:var(--accent);
  background:rgba(255,255,255,0.06);
  transform:scale(1.02);
}

/* BUTTONS */
.actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  padding:14px 18px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:500;
  transition:.25s;
}
button:active{transform:scale(.97);}

.btn-primary{
  background:linear-gradient(135deg,#C9A96E,#e6c78f);
  color:#111;
}
.btn-primary:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(201,169,110,0.25);
}

.btn-secondary{
  background:none;
  color:#9ca3af;
}

.skip{
  font-size:12px;
  color:#6b7280;
  cursor:pointer;
}

/* SERVICES */
.service-item{display:flex;gap:8px;margin-bottom:10px;}
.service-item input{flex:1;}
.remove-btn{
  background:rgba(255,255,255,0.05);
  padding:0 12px;
  border-radius:10px;
  cursor:pointer;
}

.add-service-btn{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px dashed var(--border);
  background:transparent;
  font-size:12px;
  cursor:pointer;
  color:var(--muted);
  margin-bottom:12px;
}

/* RIGHT */
.right{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* PREVIEW */
.preview-card{
  width:340px;
  padding:36px 26px;
  border-radius:26px;
  text-align:center;
  background:linear-gradient(145deg,#ffffff0f,#ffffff05);
  backdrop-filter:blur(18px);
  border:1px solid var(--border);
  box-shadow:0 25px 60px rgba(0,0,0,0.6);
}

/* PROFILE */
.profile-wrap{
  width:110px;height:110px;margin:auto;border-radius:50%;
  overflow:hidden;border:2px solid rgba(255,255,255,0.1);
  margin-bottom:20px;cursor:pointer;
}
.profile-wrap img{
  width:100%;height:100%;object-fit:contain;
  padding:14px;background:#fff;
}

/* TEXT */
.preview-name{font-size:24px;font-weight:600;margin-bottom:4px;}
.preview-position{font-size:14px;color:#9ca3af;}

/* SERVICES */
.preview-services{margin-top:24px;}
.services-title{
  font-size:11px;letter-spacing:2px;color:#6b7280;margin-bottom:12px;
}
.preview-service{
  display:inline-block;padding:6px 14px;border-radius:999px;
  font-size:11px;background:rgba(255,255,255,0.08);margin:4px;
}

/* LOADING */
.loading{
  position:fixed;inset:0;background:#0f1115;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;opacity:0;pointer-events:none;transition:.3s;
}
.loading.active{opacity:1;pointer-events:auto;}

@media(max-width:900px){
  .right{display:none;}
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
<div class="card">

<div class="brand">
  <img src="/logo.png">
  <div>ArkiLogix</div>
</div>

<div class="step-indicator" id="stepIndicator">Step 1 of 3</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<!-- STEP 1 -->
<div class="step active slide-in" id="step1">
<h1>Identity</h1>
<div class="sub">Tell people who you are</div>
<input id="name" placeholder="Full Name" oninput="updatePreview()">
<input id="position" placeholder="Position" oninput="updatePreview()">
<button class="btn-primary" onclick="nextStep()">Next</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
<h1>How can people reach you?</h1>
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<div class="actions">
<button class="btn-secondary" onclick="prevStep()">Back</button>
<button class="btn-primary" onclick="nextStep()">Next</button>
</div>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
<h1>What do you offer?</h1>
<div class="sub">You're almost done ✨</div>

<div id="servicesContainer"></div>
<button class="add-service-btn" onclick="addService()">+ Add Service</button>

<div class="actions">
<div class="skip" onclick="submitForm()">Skip for now</div>
<button class="btn-primary" onclick="submitForm()">Create My Card</button>
</div>
</div>

</div>
</div>

<!-- RIGHT -->
<div class="right">
<div class="preview-card">

<div class="profile-wrap">
<img id="previewImage" src="/logo.png">
</div>

<div class="preview-name" id="previewName">Your Name</div>
<div class="preview-position" id="previewPosition">Your Position</div>

<div class="preview-services">
<div class="services-title">SERVICES</div>
<div id="previewServices"></div>
</div>

</div>
</div>

</div>

<!-- LOADING -->
<div id="loading" class="loading">
Creating your card...
</div>

<script>
let currentStep=1;

function nextStep(){
  if(currentStep<3){
    currentStep++;
    showStep();
  }
}

function prevStep(){
  if(currentStep>1){
    currentStep--;
    showStep();
  }
}

function showStep(){
  document.querySelectorAll(".step").forEach(s=>{
    s.classList.remove("active","slide-in");
  });

  const stepEl = document.getElementById("step"+currentStep);
  stepEl.classList.add("active","slide-in");

  document.getElementById("progressBar").style.width=((currentStep-1)/2)*100+"%";
  document.getElementById("stepIndicator").innerText = `Step ${currentStep} of 3`;

  const input = stepEl.querySelector("input");
  if(input) input.focus();
}

function addService(){
const div=document.createElement("div");
div.className="service-item";
div.innerHTML=`<input oninput="updatePreview()"><div class="remove-btn" onclick="this.parentElement.remove();updatePreview()">×</div>`;
document.getElementById("servicesContainer").appendChild(div);
}

function updatePreview(){
previewName.innerText=name.value||"Your Name";
previewPosition.innerText=position.value||"Your Position";

previewServices.innerHTML="";
document.querySelectorAll("#servicesContainer input").forEach(i=>{
if(i.value){
const d=document.createElement("div");
d.className="preview-service";
d.innerText=i.value;
previewServices.appendChild(d);
}
});
}

function submitForm(){
document.getElementById("loading").classList.add("active");

setTimeout(()=>{
window.location.href="../upgrade.html?id=demo";
},900);
}

document.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    e.preventDefault();
    if(currentStep<3){nextStep();}
    else{submitForm();}
  }
});

addService();
</script>

</body>
</html>
