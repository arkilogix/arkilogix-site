*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', -apple-system, sans-serif;
}

body{
  background:#fff;
  color:#111;
}

/* ===== BANNER ===== */
.banner{
  width:100%;
  height:260px;
  background:url("https://res.cloudinary.com/dnlzwtkhs/image/upload/q_auto/f_auto/v1775110755/Profile_Banner_fsmns0.png") center/cover no-repeat;
  position:relative;
}

.banner::after{
  content:"";
  position:absolute;
  bottom:0;
  width:100%;
  height:120px;
  background:linear-gradient(to bottom, transparent, #fff);
}

/* ===== PROFILE ===== */
.profile{
  text-align:center;
  margin-top:-120px;
  padding:0 20px;
  position:relative;
  z-index:2;
}

.profile img{
  width:145px;
  height:145px;
  border-radius:50%;
  border:6px solid #fff;
  object-fit:cover;
  box-shadow:0 15px 40px rgba(0,0,0,0.12);
}

.name{
  margin-top:16px;
  font-size:26px;
  font-weight:600;
  letter-spacing:-0.3px;
}

.role{
  font-size:14px;
  color:#6b7280;
  font-weight:500;
  margin-top:6px;
}

/* ===== ACTION BUTTONS ===== */
.actions{
  margin-top:22px;
  display:flex;
  justify-content:center;
  gap:16px;
}

.icon-btn{
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;

  background:linear-gradient(145deg,#ffffff,#e9edf3);
  border:1px solid rgba(0,0,0,0.06);

  box-shadow:
    inset 0 2px 4px rgba(255,255,255,0.9),
    inset 0 -3px 6px rgba(0,0,0,0.08),
    0 8px 20px rgba(0,0,0,0.08);

  transition:.25s;
}

.icon-btn:hover{
  transform:translateY(-2px) scale(1.05);
}

.icon-btn:active{
  transform:scale(0.95);
}

.icon-btn svg{
  width:22px;
  height:22px;
  stroke:#5b6f8f;
}

/* ===== BUTTON SYSTEM ===== */
.btn{
  display:inline-block;
  padding:12px 26px;
  border-radius:30px;

  background:linear-gradient(145deg,#ffffff,#e9edf3);
  border:1px solid rgba(0,0,0,0.06);

  box-shadow:
    inset 0 2px 4px rgba(255,255,255,0.9),
    inset 0 -3px 6px rgba(0,0,0,0.08),
    0 8px 20px rgba(0,0,0,0.08);

  text-decoration:none;
  color:#111;
  font-size:14px;
  font-weight:500;

  transition:.25s;
}

.btn:hover{
  transform:translateY(-2px);
}

/* ===== CENTERED BUTTON GROUP ===== */
.center{
  display:flex;
  justify-content:center;
  margin-top:20px;
}

/* ===== PROJECTS ===== */
.projects{
  margin-top:30px;
  display:flex;
  gap:18px;
  overflow-x:auto;
  padding:0 20px 30px;
}

.projects img{
  height:210px;
  border-radius:20px;
  object-fit:cover;
  box-shadow:0 12px 35px rgba(0,0,0,0.12);
}

/* ===== CTA ===== */
.cta{
  position:fixed;
  bottom:20px;
  left:20px;
  right:20px;
}

.cta a{
  display:block;
  text-align:center;
  padding:18px;
  border-radius:50px;
  background:#111;
  color:#fff;
  text-decoration:none;
  font-weight:600;
  letter-spacing:-0.2px;
  box-shadow:0 18px 45px rgba(0,0,0,0.25);
  transition:.25s;
}

.cta a:hover{
  transform:translateY(-2px);
}

/* ===== FOOTER ===== */
.footer{
  text-align:center;
  padding:50px 20px 120px;
  color:#888;
  font-size:12px;
}

.footer img{
  width:120px;
  margin-bottom:10px;
  opacity:0.85;
}
  /* PHONE CONTAINER */

  max-width:430px;
  margin:0 auto;
  background:#fff;
  min-height:100vh;
  box-shadow:0 0 0 1px rgba(0,0,0,0.04);
}
