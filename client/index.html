<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArkiLogix Dashboard</title>

<link rel="stylesheet" href="client.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">
  <div class="logo">
    <img src="/logo.png">
    <span>ArkiLogix</span>
  </div>

  <div class="user-mini">
    <img id="headerProfile" src="/logo.png">
  </div>
</header>

<main class="main">

  <!-- PROFILE CARD -->
  <section class="card">

    <div id="statusChip" class="status">Processing</div>

    <img id="heroProfile" class="avatar" src="/logo.png">

    <h2 id="cardName">Name</h2>
    <p id="cardPosition">Position</p>

    <div id="cardServices" class="services"></div>

  </section>

  <!-- PRIMARY -->
  <button class="btn primary" onclick="viewCard()">View My Card</button>

  <!-- ACTIONS -->
  <div class="row">
    <button class="btn glass" onclick="shareCard()">Share</button>
    <button class="btn glass" onclick="resetPassword()">Reset Password</button>
  </div>

  <!-- UPGRADE -->
  <button class="btn glass" onclick="upgradeToPro()">Upgrade to Pro</button>

  <!-- STATS -->
  <div class="stats">
    <div><small>Views</small><br><b>0</b></div>
    <div><small>Taps</small><br><b>0</b></div>
    <div><small>Clicks</small><br><b>0</b></div>
  </div>

  <!-- LOGOUT -->
  <button class="btn glass" onclick="logout()">Logout</button>

</main>

<!-- LOCK SCREEN -->
<div id="lockScreen" class="lock">
  <div class="lock-box">
    <h3>Setting up your card</h3>
    <p>We’re verifying your activation.<br>Dashboard will unlock shortly.</p>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script src="/firebase-init.js"></script>
<script type="module" src="client.js"></script>

</body>
</html>
