<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArkiLogix Dashboard</title>

<link rel="stylesheet" href="client.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">
  <a href="https://arkilogix.com" class="logo-link">
    <img src="/logo.png">
    <span>ArkiLogix</span>
  </a>

  <div class="user-mini">
    <img id="headerProfile" src="/logo.png">
  </div>
</header>

<main class="main">

  <!-- PROFILE CARD -->
  <section class="profile-card">

    <div class="status" id="statusChip">Processing</div>

    <img id="heroProfile" class="avatar" src="/logo.png">

    <h2 id="cardName">Name</h2>
    <p id="cardPosition">Position</p>

    <div id="cardServices" class="services"></div>

  </section>

  <!-- PRIMARY ACTION -->
  <button class="btn primary full" onclick="viewCard()">
    View My Card
  </button>

  <!-- SECONDARY ACTIONS -->
  <div class="action-row">
    <button class="btn" onclick="shareCard()">Share</button>
    <button class="btn" onclick="openModal()">Edit</button>
  </div>

  <!-- UPGRADE -->
  <button class="btn upgrade full" onclick="upgradeToPro()">
    Upgrade to Pro
  </button>

  <!-- STATS -->
  <div class="stats-row">
    <div><small>Views</small><b>0</b></div>
    <div><small>Taps</small><b>0</b></div>
    <div><small>Clicks</small><b>0</b></div>
  </div>

  <!-- CTA -->
  <button class="btn subtle full" onclick="viewOffers()">
    View More Offers
  </button>

  <button class="btn logout full">Logout</button>

</main>

<!-- LOCK -->
<div id="lockScreen" class="lock">
  <div>
    <h3>⏳ Setting up your card</h3>
    <p>This usually takes a few minutes.<br>We’ll unlock your dashboard automatically.</p>
  </div>
</div>

<!-- MODAL (same as before, keep your steps) -->

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script src="/firebase-init.js"></script>
<script src="client.js"></script>

</body>
</html>
