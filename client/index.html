<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Dashboard</title>

<link rel="icon" type="image/png" href="../logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="client.css">
</head>

<body>

<div class="dashboard">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">ArkiLogix</div>

    <div class="user-area">
      <div class="user-profile">
        <img id="headerProfile" src="/logo.png">
      </div>

      <div class="user-info">
        <span id="userName">...</span>
        <span id="planBadge" class="badge">BASIC</span>
      </div>
    </div>
  </header>

  <!-- HERO (CARD-FIRST) -->
  <section class="hero">

    <div class="card-preview">
      <img id="heroProfile" src="/logo.png">

      <h2 id="cardName">Name</h2>
      <p id="cardPosition">Position</p>

      <div id="cardServices"></div>

      <p id="statusText" class="status">Status: Processing</p>

      <div class="actions">
        <button class="btn primary" onclick="viewCard()">View My Card</button>
        <button class="btn" onclick="openModal()">Edit Profile</button>

        <div class="sub-actions">
          <span>Share</span>
          <span>vCard</span>
        </div>
      </div>
    </div>

  </section>

  <!-- ANALYTICS -->
  <section class="analytics">
    <div class="stat">
      <p>Views</p>
      <h3 id="views">0</h3>
    </div>
    <div class="stat">
      <p>Taps</p>
      <h3 id="taps">0</h3>
    </div>
    <div class="stat">
      <p>Clicks</p>
      <h3 id="clicks">0</h3>
    </div>
  </section>

  <!-- SETTINGS -->
  <section class="section">
    <button class="btn logout">Logout</button>
  </section>

</div>

<script type="module" src="client.js"></script>

</body>
</html>
