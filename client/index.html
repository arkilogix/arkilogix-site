<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArkiLogix Dashboard</title>

<link rel="stylesheet" href="client.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">
  <div class="logo">
    <img src="/logo.png">
    <span>ArkiLogix</span>
  </div>

</header>

<main class="main">

  <!-- PROFILE CARD -->
  <section class="card">

<div class="profile-center">

  <div class="avatar-wrap elite-ring">
    <img id="heroProfile" class="avatar" src="/logo.png">
  </div>

  <div id="statusChip" class="status verified"></div>

  <div id="planBadge" class="plan-badge"></div>
  <div id="upgradeHint" class="upgrade-hint"></div>

</div>
  <h2 id="cardName">Name</h2>
  <p id="cardPosition">Position</p>
  
  <div id="cardServices" class="services"></div>
    
  </section>
  <!-- PAYMENT VERIFICATION -->
  <button id="activateBtn" class="btn primary" style="display:none;">
  Activate My Card
</button>
  
  <!-- PRIMARY -->
  <button class="btn primary" onclick="viewCard()">View My Card</button>
   <!-- EDIT PROFILE -->
  <button class="btn glass" onclick="editProfile()">Edit Profile</button>
  
  <!-- ACTIONS -->
  <div class="row">
    <button class="btn glass" onclick="shareCard()">Share</button>
    <button class="btn glass" onclick="resetPassword()">Reset Password</button>
  </div>

  <!-- UPGRADE -->
  <button class="btn upgrade-btn" onclick="upgradeToPro()">Upgrade to Pro</button>

  <!-- STATS -->
  <div class="stats">
    <div><small>Views</small><br><b id="views">0</b></div>
    <div><small>Taps</small><br><b id="taps">0</b></div>
    <div><small>Clicks</small><br><b id="clicks">0</b></div>
  </div>

  <!-- LOGOUT -->
  <button class="btn glass" onclick="logout()">Logout</button>

</main>

<!-- LOCK SCREEN -->
<div id="lockScreen" class="lock">
  <div class="lock-box">
    <h3>Setting up your card</h3>
    <p>We’re verifying your activation.<br>Dashboard will unlock shortly.</p>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script src="/firebase-init.js"></script>
<script type="module" src="client.js"></script>

  <!-- EDIT MODAL -->
<div id="editModal" class="edit-modal">

  <div class="edit-box">
    <h3 style="margin-bottom:10px;">Edit Profile</h3>
    
    <!-- PROFILE -->
    <label class="input-label">Profile Photo</label>
    <input type="file" id="editProfilePhoto" class="input-file">
    
    <!-- NAME -->
    <label class="input-label">Name</label>
    <input id="editName" class="input-field">
    
    <!-- PROFESSION -->
    <label class="input-label">Profession</label>
    <input id="editPosition" class="input-field">
    
    <!-- COMPANY -->
    <label class="input-label">Company</label>
    <input id="editCompany" class="input-field">
    
    <!-- PHONE -->
    <label class="input-label">Phone</label>
    <input id="editPhone" class="input-field">
    
    <!-- EMAIL -->
    <label class="input-label">Email</label>
    <input id="editEmail" class="input-field">
    
    <!-- SERVICES -->
    <label class="input-label">Services</label>
    
    <div id="servicesContainer" class="services-box"></div>
    
    <button onclick="addServiceField()" class="add-service-btn">
      + Add Service
    </button>
    
    <p id="serviceLimitMsg" class="limit-text"></p>
    
    <!-- ACTIONS -->
    <div class="edit-actions">
      <button onclick="saveEdit()" class="btn primary">Save</button>
      <button onclick="closeEdit()" class="btn glass">Cancel</button>
    </div>
  </div>
</div>
  
</body>
</html>
