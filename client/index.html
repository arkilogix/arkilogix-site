<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArkiLogix Dashboard</title>

<link rel="stylesheet" href="client.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">
  <div class="logo">ArkiLogix</div>

  <div class="user-area">
    <img id="headerProfile" src="/logo.png">
    <div class="user-info">
      <div id="userName">User</div>
      <div id="planBadge" class="badge">BASIC</div>
    </div>
  </div>
</header>

<!-- ================= MAIN ================= -->
<main class="main">

  <div class="dashboard-grid">

    <!-- ===== LEFT: PROFILE CARD ===== -->
    <section class="card-preview">

      <div class="status-chip" id="statusChip">Processing</div>

      <img id="heroProfile" src="/logo.png">

      <h2 id="cardName">Name</h2>
      <p id="cardPosition">Position</p>

      <div id="cardServices"></div>

      <p class="edit-meta">
        Edits used: <span id="editCount">0</span>/2
      </p>

      <div class="card-actions">
        <button class="btn primary" onclick="openModal()">Edit Profile</button>
        <button class="btn upgrade" onclick="openUpgradeModal()">Unlock Unlimited Edits</button>
      </div>

    </section>

    <!-- ===== RIGHT: ANALYTICS ===== -->
    <aside class="side-panel">

      <div class="stat-box">
        <p>Views</p>
        <h2 id="views">0</h2>
      </div>

      <div class="stat-box">
        <p>Taps</p>
        <h2 id="taps">0</h2>
      </div>

      <div class="stat-box">
        <p>Clicks</p>
        <h2 id="clicks">0</h2>
      </div>

      <!-- LOGOUT INSIDE PANEL -->
      <button class="btn logout">Logout</button>

    </aside>

  </div>

</main>

<!-- ================= EDIT MODAL ================= -->
<div id="editModal" class="modal">
  <div class="modal-content">

    <h3>Edit Profile</h3>

    <input id="editName" placeholder="Full Name">
    <input id="editPosition" placeholder="Profession">

    <div class="modal-actions">
      <button class="btn primary" onclick="saveProfile()">Save</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>

  </div>
</div>

<!-- ================= UPGRADE MODAL ================= -->
<div id="upgradeModal" class="modal">
  <div class="modal-content">

    <h3>Unlock Unlimited Edits</h3>

    <p class="modal-desc">
      You’ve used your free edits.<br>
      Upgrade to continue editing anytime.
    </p>

    <div class="price-box">
      <h2>₱99</h2>
      <p>One-time unlock</p>
    </div>

    <div class="modal-actions">
      <button class="btn primary" onclick="processUnlock()">Unlock Now</button>
      <button class="btn" onclick="closeUpgradeModal()">Cancel</button>
    </div>

  </div>
</div>

<!-- ================= FIREBASE ================= -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script src="/firebase-init.js"></script>
<script src="client.js"></script>

</body>
</html>
