<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Client Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="client.css">

</head>

<body>

<div class="container">

  <!-- HEADER -->
  <header class="header glass">
    <div>
      <h2 id="userName">User</h2>
      <span id="planBadge" class="badge">BASIC</span>
    </div>

    <button class="logout">Logout</button>
  </header>

  <!-- CARD PREVIEW -->
  <section class="card-preview glass">

    <div class="profile">
      <img id="profileImage" src="/logo.png">
    </div>

    <h3 id="cardName">Your Name</h3>
    <p id="cardPosition">Your Position</p>

    <div id="cardServices" class="services"></div>

  </section>

</div>

<script type="module" src="client.js"></script>

</body>
</html>
