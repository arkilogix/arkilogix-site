<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Dashboard</title>
<link rel="icon" type="image/png" href="../logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="client.css">
</head>

<body>

<div class="dashboard">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">ArkiLogix</div>

    <div class="user-area">

      <!-- PROFILE IMAGE -->
      <div class="user-profile">
        <img id="headerProfile" src="/logo.png">
      </div>

      <!-- USER INFO -->
      <div class="user-info">
        <span id="userName">...</span>
        <span id="planBadge" class="badge">BASIC</span>
      </div>

      <!-- UPGRADE -->
      <button id="upgradeBtn" class="upgrade-btn">Upgrade</button>

    </div>
  </header>

  <!-- HERO -->
  <section class="hero">

    <!-- CARD PREVIEW -->
    <div class="card-preview glass">
      <h3 id="cardName">Name</h3>
      <p id="cardPosition">Position</p>
      <div id="cardServices"></div>
    </div>

    <!-- ACTIONS -->
    <div class="actions glass">
      <button class="btn">Edit Profile</button>
      <button class="btn">Share Card</button>
      <button class="btn">Download vCard</button>
      <button class="btn" onclick="viewCard()">View My Card</button>
    </div>

  </section>

  <!-- ANALYTICS -->
  <section id="analytics" class="analytics">

    <div class="stat glass">
      <h4>Views</h4>
      <p id="views">0</p>
      <div class="bar"><div id="viewsBar"></div></div>
    </div>

    <div class="stat glass">
      <h4>Taps</h4>
      <p id="taps">0</p>
      <div class="bar"><div id="tapsBar"></div></div>
    </div>

    <div class="stat glass">
      <h4>Clicks</h4>
      <p id="clicks">0</p>
      <div class="bar"><div id="clicksBar"></div></div>
    </div>

  </section>

  <!-- LINKS -->
  <section class="links-section glass">
    <h3>Manage Links</h3>

    <div id="linksContainer"></div>

    <div style="display:flex; gap:10px; margin-top:10px;">
      <button class="btn" onclick="addLink()">+ Add Link</button>
      <button class="btn primary" onclick="saveLinks()">Save Links</button>
    </div>
  </section>

  <!-- THEMES -->
  <section class="themes">

    <div class="theme glass active">
      <h4>Basic</h4>
      <p>Default</p>
    </div>

    <div class="theme glass locked" data-plan="pro">
      <h4>Pro Theme</h4>
      <p>Upgrade to Pro</p>
    </div>

    <div class="theme glass locked" data-plan="elite">
      <h4>Elite Custom</h4>
      <p>Upgrade to Elite</p>
    </div>

  </section>

  <!-- SETTINGS -->
  <section class="section glass">
    <h3>Settings</h3>
    <button class="btn logout">Logout</button>
  </section>

</div>

<script type="module" src="client.js"></script>

<!-- EDIT PROFILE MODAL -->
<div id="editModal" class="modal">
  <div class="modal-content glass">

    <h2>Edit Profile</h2>

    <!-- PROFILE IMAGE -->
    <div class="profile-upload" onclick="document.getElementById('imageInput').click()">
      <img id="modalImage" src="" />
      <div class="upload-label">Change Photo</div>
    </div>
    <input type="file" id="imageInput" accept="image/*" hidden>

    <!-- NAME -->
    <input id="editName" placeholder="Full Name">

    <!-- POSITION -->
    <input id="editPosition" placeholder="Position">

    <!-- SERVICES -->
    <div id="servicesEdit"></div>
    <button class="add-service-btn" onclick="addServiceField()">+ Add Service</button>
    <small class="helper">Add services people might search for</small>

    <!-- PROFILE STRENGTH -->
    <div class="strength">
      Profile Strength: <span id="strengthValue">0%</span>
    </div>

    <!-- ACTIONS -->
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal()">Cancel</button>
      <button id="saveBtn" class="btn primary" onclick="saveProfile()">Save</button>
    </div>

  </div>
</div>

</body>
</html>
